    function getDensityAlt(altFt, oatC) {
      // Precise density altitude per ICAO ISA model
      // Pressure ratio at pressure altitude using ISA lapse rate (0.0019812 K/ft)
      const T0 = 288.15;
      const T_isa_K = T0 - 0.0019812 * altFt;
      const T_oat_K = oatC + 273.15;
      const pressureRatio = Math.pow(T_isa_K / T0, 5.2561);
      // Density ratio: rho/rho0 = (P/P0) * (T0/T_actual)
      const densityRatio = pressureRatio * (T0 / T_oat_K);
      return Math.round(145366 * (1 - Math.pow(densityRatio, 0.235)));

    function tfdFuelInterpOAT(entries, oat) {
      const oats = entries.map(e => e[0]), vals = entries.map(e => e[1]);

      for (let i = 0; i < oats.length-1; i++) {

      return vals[vals.length-1];

      const clamped = Math.max(altKeys[0], Math.min(altKeys[altKeys.length-1], altFt));
      for (let i = 0; i < altKeys.length-1; i++) {
        if (clamped >= altKeys[i] && clamped <= altKeys[i+1]) {
          const lo = tfdFuelInterpOAT(desFuelData[altKeys[i]], oat);
          const hi = tfdFuelInterpOAT(desFuelData[altKeys[i+1]], oat);
          return lo + (hi - lo) * (clamped - altKeys[i]) / (altKeys[i+1] - altKeys[i]);
        }
      }
      return tfdFuelInterpOAT(desFuelData[altKeys[altKeys.length-1]], oat);
    }

    function calculateDescent(cruiseAlt, destAlt, oatCruiseC, oatDestC) {
      const timeMin = Math.max(0, tfdInterpAltOAT(desTimeData, cruiseAlt, oatCruiseC) - tfdInterpAltOAT(desTimeData, destAlt, oatDestC));
      const fuelGal = Math.max(0, desFuelInterp(cruiseAlt, oatCruiseC) - desFuelInterp(destAlt, oatDestC));
      const distNM  = Math.max(0, tfdInterpAltOAT(desDistData, cruiseAlt, oatCruiseC) - tfdInterpAltOAT(desDistData, destAlt, oatDestC));
      return { timeMin, fuelGal, distNM };
    }
    // ROC = 742.1 - (49.31 × alt_thousands) - (3.06 × OAT_celsius)
    // ============================================================
    function calculateROC(altFt, oatC) {
      const roc = Math.max(0, 742.1 - (49.31 * altFt / 1000) - (3.06 * oatC));
      return { roc, isaDeviation: getISADeviation(altFt, oatC), isaTemp: getISATemp(altFt) };
    }

    function calculateCruise(altFt, oatC, wheelPants, power) {
      const cfg = cruiseConfigs[power];
      const altKeys = Object.keys(cfg.table).map(Number).sort((a,b) => a-b);
      const clampedAlt = Math.max(0, Math.min(cfg.maxAlt, altFt));
      let lowerAlt = altKeys[0], upperAlt = altKeys[0];
      for (let i = 0; i < altKeys.length - 1; i++) {
        if (clampedAlt >= altKeys[i] && clampedAlt <= altKeys[i+1]) { lowerAlt = altKeys[i]; upperAlt = altKeys[i+1]; break; }
        if (clampedAlt >= altKeys[altKeys.length-1]) { lowerAlt = upperAlt = altKeys[altKeys.length-1]; }
      }
      const altFrac = lowerAlt === upperAlt ? 0 : (clampedAlt - lowerAlt) / (upperAlt - lowerAlt);

      function interpRPM(altKey) {
        const entries = cfg.table[altKey];
        if (!entries) return null;
        const clampedOAT = Math.max(entries[0].oat, Math.min(entries[entries.length-1].oat, oatC));
        for (let i = 0; i < entries.length-1; i++) {
          if (clampedOAT >= entries[i].oat && clampedOAT <= entries[i+1].oat) {
            const t = (clampedOAT - entries[i].oat) / (entries[i+1].oat - entries[i].oat);
            return lerp(entries[i].rpm, entries[i+1].rpm, t);
          }
        }
        return entries[entries.length-1].rpm;
      }
      function interpTAS(altKey) {
        const t = cfg.tas[altKey];
        if (!t) return null;
        const dev = getISADeviation(altFt, oatC);
        const clampedDev = Math.max(t.lowDev, Math.min(t.highDev, dev));
        return lerp(t.low, t.high, (clampedDev - t.lowDev) / (t.highDev - t.lowDev));
      }

      const rpm = Math.round(lerp(interpRPM(lowerAlt), interpRPM(upperAlt), altFrac));
      const tasBase = lerp(interpTAS(lowerAlt) ?? interpTAS(upperAlt), interpTAS(upperAlt) ?? interpTAS(lowerAlt), altFrac);
      const tas = Math.round(tasBase) - (wheelPants ? 0 : 3);
      const isaDeviation = getISADeviation(altFt, oatC);

      function interpAltPoints(points, alt) {
        const a = Math.max(points[0][0], Math.min(points[points.length-1][0], alt));
        for (let i = 0; i < points.length-1; i++) {
          if (a >= points[i][0] && a <= points[i+1][0]) {
            const t = (a - points[i][0]) / (points[i+1][0] - points[i][0]);
            return points[i][1] + t * (points[i+1][1] - points[i][1]);
          }
        }
        return points[points.length-1][1];
      }
      function interpER(sl, top, topAlt) {
        const a = Math.min(clampedAlt, topAlt);
        return sl + (top - sl) * (a / topAlt);
      }
      const noReserve = {
        e75: interpER(4.24, 4.14, 6500),  r75: interpER(512, 514, 6500),
        e65: interpER(4.91, 4.59, 10000), r65: interpAltPoints([[0,560],[2000,556],[4000,552],[6000,547.6],[8000,542],[9000,539],[10000,536]], clampedAlt),
        e55: interpER(5.70, 5.19, 10000), r55: interpAltPoints([[0,601],[2000,594],[4000,587],[6000,579],[8000,570],[9000,565],[10000,560]], clampedAlt),
      };
      const reserve45 = {
        e75: interpER(3.68, 3.58, 6500),  r75: interpER(444, 443, 6500),
        e65: interpER(4.26, 3.94, 10000), r65: interpER(487, 459, 10000),
        e55: interpER(4.95, 4.43, 10000), r55: interpER(522, 479, 10000),
      };
      return { rpm, tas, fuelFlow: cfg.gph, power, altFt: clampedAlt, wheelPants, noReserve, reserve45, isaDeviation, isaTemp: getISATemp(altFt) };
    }

                flex: 1, padding: "10px",
                background: value === opt.val ? C.green : C.input,
                border: `1px solid ${value === opt.val ? C.green : C.border}`,
                borderRadius: "3px", color: value === opt.val ? C.btnText : C.dim,
                fontFamily: mono, fontSize: "18px", letterSpacing: "2px", cursor: "pointer",
              }}>{opt.label}</button>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // TAB 1: TIME, FUEL, DISTANCE
    // ============================================================
    function TimeFuelDistTab({ savedState, onStateChange }) {
      const C = useC();
      const [departAlt, setDepartAlt] = useState(savedState.departAlt || "");
      const [cruiseAlt, setCruiseAlt] = useState(savedState.cruiseAlt || "");
      const [destAlt, setDestAlt] = useState(savedState.destAlt || "");
      const [oatDep, setOatDep] = useState(savedState.oatDep || "");
      const [oatCruise, setOatCruise] = useState(savedState.oatCruise || "");
      const [oatDest, setOatDest] = useState(savedState.oatDest || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [showDescent, setShowDescent] = useState(savedState.showDescent || false);
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ departAlt, cruiseAlt, destAlt, oatDep, oatCruise, oatDest, tempUnit, showDescent, result });
      }, [departAlt, cruiseAlt, destAlt, oatDep, oatCruise, oatDest, tempUnit, showDescent, result]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const dep = parseFloat(departAlt), cruise = parseFloat(cruiseAlt);
        const dest = parseFloat(destAlt) || 0;
        let oatDepC = parseFloat(oatDep), oatCruiseC = parseFloat(oatCruise);
        let oatDestC = parseFloat(oatDest);
        if (isNaN(dep) || isNaN(cruise) || isNaN(oatDepC) || isNaN(oatCruiseC)) { setError("Please fill in departure, cruise altitude and both OATs."); return; }
        if (tempUnit === "F") { oatDepC = (oatDepC-32)*5/9; oatCruiseC = (oatCruiseC-32)*5/9; if (!isNaN(oatDestC)) oatDestC = (oatDestC-32)*5/9; }
        if (dep >= cruise) { setError("Cruise altitude must be above departure altitude."); return; }
        if (dep < 0 || cruise > 12000) { setError("Altitudes must be between 0 and 12,000 ft."); return; }
        if (oatDepC < -25 || oatDepC > 50 || oatCruiseC < -25 || oatCruiseC > 50) { setError("OAT out of chart range (approx −25°C to 50°C)."); return; }
        const climb = calculateTimeFuelDist(dep, cruise, oatDepC, oatCruiseC);
        let descent = null;
        if (showDescent && !isNaN(oatDestC) && !isNaN(dest) && dest < cruise) {
          descent = calculateDescent(cruise, dest, oatCruiseC, oatDestC);
        }
        setResult({ ...climb, descent });
      }, [departAlt, cruiseAlt, destAlt, oatDep, oatCruise, oatDest, tempUnit, showDescent]);

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.green, marginBottom: "10px" }}>CLIMB · FIG 5-17</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
              <AltOATRow altLabel="DEPARTURE ALT." altValue={departAlt} onAltChange={setDepartAlt} altHint="0 – 12,000 ft" altPlaceholder="e.g. 800" oatValue={oatDep} onOatChange={setOatDep} unit={tempUnit} onUnitChange={setTempUnit} />
              <AltOATRow altLabel="CRUISE ALT." altValue={cruiseAlt} onAltChange={setCruiseAlt} altHint="Above departure" altPlaceholder="e.g. 6000" oatValue={oatCruise} onOatChange={setOatCruise} unit={tempUnit} onUnitChange={setTempUnit} />
            </div>
          </div>
          <div style={{ marginBottom: "28px" }}>
            <button onClick={() => setShowDescent(s => !s)} style={{
              display: "flex", alignItems: "center", gap: "8px", background: "none", border: "none",
              cursor: "pointer", padding: "0", marginBottom: showDescent ? "14px" : "0",
            }}>
              <div style={{
                width: "18px", height: "18px", borderRadius: "50%",
                border: `1px solid ${showDescent ? C.cool : C.borderDim}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                color: showDescent ? C.cool : C.dim, fontSize: "14px", lineHeight: 1, flexShrink: 0,
              }}>{showDescent ? "−" : "+"}</div>
              <div style={{ fontSize: "12px", letterSpacing: "3px", color: showDescent ? C.cool : C.dim }}>
                DESCENT · FIG 5-37
              </div>
            </button>
            {showDescent && (
              <AltOATRow altLabel="DESTINATION ALT." altValue={destAlt} onAltChange={setDestAlt} altHint="Below cruise alt" altPlaceholder="e.g. 1000" oatValue={oatDest} onOatChange={setOatDest} unit={tempUnit} onUnitChange={setTempUnit} />
            )}
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                <div style={{ fontSize: "18px", letterSpacing: "3px", color: C.green }}>RESULTS</div>
                <div style={{ display: "flex", gap: "6px" }}>
                  <div style={{ fontSize: "13px", letterSpacing: "1px", color: result.isaDevDep > 5 ? C.warm : result.isaDevDep < -5 ? C.cool : C.dim, background: C.input, border: `1px solid ${C.border}`, padding: "3px 8px", borderRadius: "2px" }}>DEP {formatISA(result.isaDevDep)}</div>
                  <div style={{ fontSize: "13px", letterSpacing: "1px", color: result.isaDevCruise > 5 ? C.warm : result.isaDevCruise < -5 ? C.cool : C.dim, background: C.input, border: `1px solid ${C.border}`, padding: "3px 8px", borderRadius: "2px" }}>CRZ {formatISA(result.isaDevCruise)}</div>
                </div>
              </div>

              {/* Climb results */}
              <div style={{ fontSize: "11px", letterSpacing: "3px", color: C.green, marginBottom: "8px" }}>CLIMB · FIG 5-17</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", marginBottom: "12px" }}>
                <ResultCard label="TIME" value={result.timeMin.toFixed(1)} unit="MIN" color={C.green} />
                <ResultCard label="FUEL" value={result.fuelGal.toFixed(2)} unit="GAL" color={C.green} />
                <ResultCard label="DIST" value={result.distNM.toFixed(1)} unit="NM" color={C.green} />
              </div>
              {(() => {
                const climbFuel = Math.max(0, result.fuelGal - 1.2);
                const climbHrs = result.timeMin / 60;
                const gph = climbHrs > 0 ? climbFuel / climbHrs : 0;
                return (
                  <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "10px 16px", marginBottom: "16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "2px" }}>AVG CLIMB FUEL FLOW</div>
                      <div style={{ fontSize: "11px", color: C.dimmest, letterSpacing: "1px" }}>{result.fuelGal.toFixed(2)} gal − 1.2 gal ground = {climbFuel.toFixed(2)} gal ÷ {result.timeMin.toFixed(1)} min</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <span style={{ fontSize: "28px", fontWeight: "bold", color: C.green }}>{gph.toFixed(1)}</span>
                      <span style={{ fontSize: "13px", color: C.dim, marginLeft: "6px" }}>GPH</span>
                    </div>
                  </div>
                );
              })()}

              {/* Descent results */}
              {result.descent && (<>
                <div style={{ fontSize: "11px", letterSpacing: "3px", color: C.cool, marginBottom: "8px" }}>DESCENT · FIG 5-37</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", marginBottom: "12px" }}>
                  <ResultCard label="TIME" value={result.descent.timeMin.toFixed(1)} unit="MIN" color={C.cool} />
                  <ResultCard label="FUEL" value={result.descent.fuelGal.toFixed(2)} unit="GAL" color={C.cool} />
                  <ResultCard label="DIST" value={result.descent.distNM.toFixed(1)} unit="NM" color={C.cool} />
                </div>
                {(() => {
                  const desHrs = result.descent.timeMin / 60;
                  const gph = desHrs > 0 ? result.descent.fuelGal / desHrs : 0;
                  return (
                    <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "10px 16px", marginBottom: "16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "2px" }}>AVG DESCENT FUEL FLOW</div>
                        <div style={{ fontSize: "11px", color: C.dimmest, letterSpacing: "1px" }}>{result.descent.fuelGal.toFixed(2)} gal ÷ {result.descent.timeMin.toFixed(1)} min</div>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <span style={{ fontSize: "28px", fontWeight: "bold", color: C.cool }}>{gph.toFixed(1)}</span>
                        <span style={{ fontSize: "13px", color: C.dim, marginLeft: "6px" }}>GPH</span>
                      </div>
                    </div>
                  );
                })()}
              </>)}

              <NoteBox text="Climb fuel includes start, taxi & takeoff allowance (Fig 5-17). Descent: 2500 RPM, 122 KIAS, flaps UP (Fig 5-37). Always verify against official charts." />
            </div>
          )}
        </Card>
      );
    }

    // ============================================================
    // TAB 2: RATE OF CLIMB
    // ============================================================
    function RateOfClimbTab({ savedState, onStateChange }) {
      const C = useC();
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");
      const [gradFtNm, setGradFtNm] = useState(savedState.gradFtNm || "");
      const [gradGs, setGradGs] = useState(savedState.gradGs || "");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, result, gradFtNm, gradGs });
      }, [alt, oat, tempUnit, result, gradFtNm, gradGs]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in all fields."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        if (altVal < 0 || altVal > 14000) { setError("Altitude must be between 0 and 14,000 ft."); return; }
        if (oatC < -25 || oatC > 50) { setError("OAT out of chart range (approx −25°C to 50°C)."); return; }
        setResult(calculateROC(altVal, oatC));
      }, [alt, oat, tempUnit]);

      const rocColor = result ? (result.roc > 500 ? C.green : result.roc > 300 ? "#8ab87a" : result.roc > 150 ? C.warm : "#cc5555") : C.text;
      const rocLabel = result ? (result.roc > 500 ? "EXCELLENT" : result.roc > 300 ? "GOOD" : result.roc > 150 ? "MARGINAL" : result.roc > 0 ? "POOR — NEAR CEILING" : "AT / ABOVE CEILING") : "";

      const gradFtNmVal = parseFloat(gradFtNm);
      const gradGsVal = parseFloat(gradGs);
      const reqFpm = (!isNaN(gradFtNmVal) && !isNaN(gradGsVal) && gradGsVal > 0)
        ? Math.round(gradFtNmVal * gradGsVal / 60) : null;
      const canMeet = result && reqFpm !== null ? Math.round(result.roc) >= reqFpm : null;

      return (
        <Card>
          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <AltOATRow altLabel="PRESS. ALT." altValue={alt} onAltChange={setAlt} altHint="0 – 14,000 ft" altPlaceholder="e.g. 4000" oatValue={oat} onOatChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} />
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />
              <div style={{ background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "28px", textAlign: "center", marginBottom: "12px" }}>
                <div style={{ fontSize: "18px", letterSpacing: "3px", color: C.green, marginBottom: "12px" }}>RATE OF CLIMB</div>
                <div style={{ fontSize: "60px", color: rocColor, lineHeight: 1, fontWeight: "bold" }}>{Math.round(result.roc)}</div>
                <div style={{ fontSize: "14px", color: C.dimmer, marginTop: "8px", letterSpacing: "3px" }}>FT / MIN</div>
              </div>
              <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
                <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.dimmer }}>CLIMB RATE</div>
                <div style={{ fontSize: "15px", letterSpacing: "2px", color: rocColor }}>{rocLabel}</div>
              </div>
              <NoteBox text="Interpolated from Figure 5-15. Full Throttle, Flaps UP, 76 KIAS, A/C OFF. Service ceiling ~14,085 ft. Always verify against official charts." />
            </div>
          )}

          {/* Gradient checker — always visible */}
          <div style={{ marginTop: "24px", paddingTop: "20px", borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "13px", letterSpacing: "3px", color: C.green, marginBottom: "14px" }}>CLIMB GRADIENT CHECKER</div>
            <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "1px", marginBottom: "14px" }}>Convert ft/nm departure procedure gradient to required FPM</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "14px" }}>
              <div>
                <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>GRADIENT</div>
                <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                  <input type="number" value={gradFtNm} onChange={e => setGradFtNm(e.target.value)} placeholder="e.g. 200"
                    style={{ flex: 1, minWidth: 0, background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "10px 12px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  <div style={{ padding: "10px 8px", background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", color: C.dim, fontSize: "11px", letterSpacing: "1px", flexShrink: 0 }}>FT/NM</div>
                </div>
              </div>
              <div>
                <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>GROUNDSPEED</div>
                <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                  <input type="number" value={gradGs} onChange={e => setGradGs(e.target.value)} placeholder="e.g. 90"
                    style={{ flex: 1, minWidth: 0, background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "10px 12px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  <div style={{ padding: "10px 8px", background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", color: C.dim, fontSize: "11px", letterSpacing: "1px", flexShrink: 0 }}>KT</div>
                </div>
              </div>
            </div>
            {reqFpm !== null && (
              <div style={{ background: C.input, border: `2px solid ${canMeet === null ? C.border : canMeet ? C.green : C.error}`, borderRadius: "4px", overflow: "hidden" }}>
                <div style={{ padding: "16px", textAlign: "center", borderBottom: `1px solid ${C.borderDim}` }}>
                  <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>REQUIRED CLIMB RATE</div>
                  <div style={{ fontSize: "48px", fontWeight: "bold", color: C.text, lineHeight: 1 }}>{reqFpm}</div>
                  <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "2px" }}>FT / MIN</div>
                  <div style={{ fontSize: "11px", color: C.dim, marginTop: "4px" }}>{gradFtNm} ft/nm × {gradGs} kt ÷ 60</div>
                </div>
                {canMeet !== null && (
                  <div style={{ padding: "12px 16px", background: canMeet ? C.green + "22" : C.errorBg, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: "13px", letterSpacing: "2px", color: canMeet ? C.green : C.error, fontWeight: "bold" }}>
                      {canMeet ? "GRADIENT MET" : "GRADIENT NOT MET"}
                    </div>
                    <div style={{ fontSize: "12px", color: canMeet ? C.green : C.error }}>
                      {Math.round(result.roc)} FPM available · {reqFpm} FPM required
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </Card>
      );
    }

    // ============================================================
    // TAB 3: CRUISE PERFORMANCE (65%)
    // ============================================================
    function CruiseTab({ savedState, onStateChange }) {
      const C = useC();
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [power, setPower] = useState(savedState.power || "65");
      const [wheelPants, setWheelPants] = useState(savedState.wheelPants !== undefined ? savedState.wheelPants : true);
      const [reserve, setReserve] = useState(savedState.reserve || "none");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, power, wheelPants, reserve, result });
      }, [alt, oat, tempUnit, power, wheelPants, reserve, result]);

      const runCalc = useCallback((pwr, pants) => {
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        if (isNaN(altVal) || isNaN(oatC)) return;
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        setResult(calculateCruise(altVal, oatC, pants, pwr));
      }, [alt, oat, tempUnit]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in all fields."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        const cfg = cruiseConfigs[power];
        if (altVal < 0 || altVal > cfg.maxAlt) { setError(`Altitude must be 0 – ${cfg.maxAlt.toLocaleString()} ft for ${cfg.label}.`); return; }
        setResult(calculateCruise(altVal, oatC, wheelPants, power));
      }, [alt, oat, tempUnit, wheelPants, power]);

      useEffect(() => { if (result) runCalc(power, wheelPants); }, [power, wheelPants]);

      const cfg = cruiseConfigs[power];

      return (
        <Card>
          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <ToggleRow label="POWER SETTING" value={power} onChange={setPower}
              options={[{ val: "75", label: "75% · 11.0 GPH" }, { val: "65", label: "65% · 9.5 GPH" }, { val: "55", label: "55% · 8.2 GPH" }]} />
            <AltOATRow altLabel="CRUISE PRESS. ALT." altValue={alt} onAltChange={setAlt} altHint={`0 – ${cfg.maxAlt.toLocaleString()} ft · Fig ${cfg.fig}`} altPlaceholder="e.g. 6000" oatValue={oat} onOatChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} />
            <ToggleRow label="WHEEL PANTS" value={wheelPants} onChange={setWheelPants}
              options={[{ val: true, label: "INSTALLED" }, { val: false, label: "REMOVED" }]} />
            <ToggleRow label="FUEL RESERVE" value={reserve} onChange={setReserve}
              options={[{ val: "none", label: "NO RESERVE" }, { val: "45min", label: "45 MIN RESERVE" }]} />
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <ISABadgeRow label={`${cfg.label} RESULTS`} isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", marginBottom: "12px" }}>
                <ResultCard label="RPM" value={result.rpm} unit="RPM" />
                <ResultCard label="TAS" value={result.tas} unit="KTS" />
                <ResultCard label="FUEL FLOW" value={result.fuelFlow.toFixed(1)} unit="GPH" />
              </div>
              <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "12px 14px", marginBottom: "12px" }}>
                <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.green, marginBottom: "10px" }}>
                  ENDURANCE & RANGE · {reserve === "45min" ? "45 MIN RESERVE" : "NO RESERVE"}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "6px", marginBottom: "6px" }}>
                  {["POWER", "GPH", "ENDURANCE", "RANGE"].map(h => (
                    <div key={h} style={{ fontSize: "12px", color: C.dimmer, letterSpacing: "1px", textAlign: "center" }}>{h}</div>
                  ))}
                </div>
                {(reserve === "45min" ? [
                  { pwr: "75%", key: "75", gph: 11.0, endurance: result.reserve45.e75, rangeNM: result.reserve45.r75 },
                  { pwr: "65%", key: "65", gph:  9.5, endurance: result.reserve45.e65, rangeNM: result.reserve45.r65 },
                  { pwr: "55%", key: "55", gph:  8.2, endurance: result.reserve45.e55, rangeNM: result.reserve45.r55 },
                ] : [
                  { pwr: "75%", key: "75", gph: 11.0, endurance: result.noReserve.e75, rangeNM: result.noReserve.r75 },
                  { pwr: "65%", key: "65", gph:  9.5, endurance: result.noReserve.e65, rangeNM: result.noReserve.r65 },
                  { pwr: "55%", key: "55", gph:  8.2, endurance: result.noReserve.e55, rangeNM: result.noReserve.r55 },
                ]).map(row => {
                  const isActive = row.key === result.power;
                  const displayRange = Math.round(row.rangeNM * (result.wheelPants ? 1 : 0.97));
                  return (
                    <div key={row.pwr} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "6px", marginBottom: "4px", background: isActive ? "rgba(90,138,106,0.12)" : "transparent", borderRadius: "2px", padding: "4px 2px", borderLeft: isActive ? `2px solid ${C.green}` : "2px solid transparent" }}>

    function toInterpList(list, x) {
      const xs = list.map(d => d[0]), ys = list.map(d => d[1]);
      const clamped = Math.max(xs[0], Math.min(xs[xs.length-1], x));
      for (let i = 0; i < xs.length-1; i++) {

          const t = (clamped - xs[i]) / (xs[i+1] - xs[i]);
          return ys[i] + t * (ys[i+1] - ys[i]);

          const lo = toInterpList(panelObj[refs[i]], x);

          const t = (clamped - refs[i]) / (refs[i+1] - refs[i]);

    function MetarFetch({ onFill }) {
      const C = useC();
      const [icao, setIcao] = useState("");
      const [status, setStatus] = useState(null);
      const [metar, setMetar] = useState(null);
      const [msg, setMsg] = useState("");
      const [mode, setMode] = useState("current"); // "current" | "forecast"
      const [forecast, setForecast] = useState(null); // array of hourly objects
      const [selectedHour, setSelectedHour] = useState(0); // index into forecast array
      const [latLon, setLatLon] = useState(null);

      function getFlightCategory(raw, visib, clouds) {
        let ceiling = 99999;
        if (clouds && Array.isArray(clouds)) {
          clouds.forEach(c => {
            if ((c.cover === "BKN" || c.cover === "OVC") && c.base !== null && c.base < ceiling) {
              ceiling = c.base;
            }
          });
        } else if (raw) {
          const cldMatch = raw.match(/(?:BKN|OVC)(\d{3})/g);
          if (cldMatch) {
            cldMatch.forEach(m => {
              const base = parseInt(m.slice(3)) * 100;
              if (base < ceiling) ceiling = base;
            });
          }
        }
        const vis = visib !== null && visib !== undefined ? parseFloat(visib) : 99;
        if (ceiling < 500  || vis < 1) return { cat: "LIFR", color: "#cc44cc" };
        if (ceiling < 1000 || vis < 3) return { cat: "IFR",  color: "#dd4444" };
        if (ceiling < 3000 || vis < 5) return { cat: "MVFR", color: "#4488dd" };
        return { cat: "VFR", color: C.green };
      }

      async function fetchAll() {
        const id = icao.trim().toUpperCase();
        if (!id || id.length < 3) { setMsg("Enter a valid airport identifier."); setStatus("error"); return; }
        setStatus("loading"); setMetar(null); setForecast(null); setMsg("");
        try {
          // Fetch METAR, airport data, and runways in parallel
          const [metarRes, airportRes, runwayRes] = await Promise.all([
            fetch("https://metar-proxy.mamillh01.workers.dev/?id=" + id),
            fetch("https://metar-proxy.mamillh01.workers.dev/?id=" + id + "&type=airport"),
            fetch("https://metar-proxy.mamillh01.workers.dev/?id=" + id + "&type=runways"),
          ]);

          if (!metarRes.ok) throw new Error("failed");
          const metarData = await metarRes.json();
          if (!metarData || metarData.length === 0) { setMsg("No METAR found for " + id + "."); setStatus("error"); return; }
          const m = metarData[0];

          let elevFt = null, lat = null, lon = null, runways = [];
          if (airportRes.ok) {
            const airportData = await airportRes.json();
            if (airportData && airportData.length > 0) {
              if (airportData[0].elev !== undefined) elevFt = Math.round(parseFloat(airportData[0].elev) * 3.28084);
              if (airportData[0].lat !== undefined) lat = parseFloat(airportData[0].lat).toFixed(4);
              if (airportData[0].lon !== undefined) lon = parseFloat(airportData[0].lon).toFixed(4);
            }
          }
          if (runwayRes.ok) {
            const rwyData = await runwayRes.json();
            if (Array.isArray(rwyData) && rwyData.length > 0) {
              runways = rwyData.map(r => ({
                num: r.num,
                heading: parseInt(r.num.replace(/[LRC]/g,"")) * 10,
                length: r.length || null,
              }));
            }
          }

          const ll = lat && lon ? { lat, lon, elevFt } : null;
          if (ll) setLatLon(ll);

          // Parse METAR
          const raw = m.rawOb || m.rawObservation || "";
          const isVRB = raw.toUpperCase().includes("VRB");
          const wd  = (!isVRB && m.wdir !== undefined && m.wdir !== null) ? parseInt(m.wdir) : null;
          const ws  = (!isVRB && m.wspd !== undefined && m.wspd !== null) ? parseInt(m.wspd) : null;
          const tp  = (m.temp !== undefined && m.temp !== null) ? parseFloat(m.temp) : null;
          const vis = m.visib !== undefined ? m.visib : null;
          const clouds = m.clouds || null;
          const altim = m.altim !== undefined && m.altim !== null ? parseFloat(m.altim) : null;
          const altimInHg = altim !== null ? Math.round(altim * 0.02953 * 100) / 100 : null;
          const obsTime = m.obsTime ? new Date(m.obsTime * 1000) : null;
          const ageMin = obsTime ? Math.round((Date.now() - obsTime.getTime()) / 60000) : null;
          const pressureAlt = (altimInHg !== null && elevFt !== null)
            ? Math.round(elevFt + (29.92 - altimInHg) * 1000) : null;
          const fc = getFlightCategory(raw, vis, clouds);
          const metarObj = { wd, ws, tp, raw, vis, fc, altimInHg, elevFt, pressureAlt, ageMin, runways, isVRB };
          setMetar(metarObj);

          // Auto-fill from METAR if in current mode
          if (mode === "current") {
            onFill({ windDir: wd, windSpeed: ws, oat: tp, pressureAlt, runways });
          }

          // Fetch forecast from Open-Meteo in parallel if we have coords
          if (ll) {
            try {
              const omUrl = "https://api.open-meteo.com/v1/forecast" +
                "?latitude=" + ll.lat +
                "&longitude=" + ll.lon +
                "&hourly=temperature_2m,pressure_msl,windspeed_10m,winddirection_10m" +
                "&wind_speed_unit=kn" +
                "&models=best_match" +
                "&forecast_days=2" +
                "&timeformat=unixtime" +
                "&timezone=UTC";
              const omRes = await fetch(omUrl);
              if (omRes.ok) {
                const omData = await omRes.json();
                const h = omData.hourly;
                if (h && h.time && h.time.length > 0) {
                  const now = Date.now();
                  const cutoff = now + 24 * 3600000;
                  const hourly = [];
                  for (let i = 0; i < h.time.length; i++) {
                    const t = h.time[i] * 1000;
                    if (t < now || t > cutoff) continue;
                    const presHpa = h.pressure_msl[i];
                    const altimInHg2 = presHpa != null ? Math.round(presHpa * 0.02953 * 100) / 100 : null;
                    const windKt = h.windspeed_10m[i] != null ? Math.round(h.windspeed_10m[i]) : null;
                    const windDir2 = h.winddirection_10m[i] != null ? Math.round(h.winddirection_10m[i]) : null;
                    const tempC = h.temperature_2m[i] != null ? Math.round(h.temperature_2m[i] * 10) / 10 : null;
                    hourly.push({ time: new Date(t).toISOString(), tempC, altimInHg: altimInHg2, windKt, windDir: windDir2 });
                  }
                  if (hourly.length > 0) {
                    setForecast(hourly);
                    setSelectedHour(0);
                    if (mode === "forecast") fillFromForecastHour(hourly, 0, ll, metarObj);
                  }
                }
              }
            } catch(e) { /* forecast optional, don't fail the whole fetch */ }
          }

          setStatus("ok");
        } catch(e) {
          setMsg("Failed to fetch. Check connection or try 4-letter ICAO (e.g. KLAF).");
          setStatus("error");
        }
      }


      function fillFromForecastHour(hours, idx, ll, metarObj) {
        const h = hours[idx];
        if (!h) return;
        const loc = ll || latLon;
        const elevFt = loc ? loc.elevFt : null;
        const pressureAlt = (h.altimInHg != null && elevFt != null)
          ? Math.round(elevFt + (29.92 - h.altimInHg) * 1000) : null;
        const met = metarObj || metar;
        const runways = met ? met.runways : [];
        const isCalm = h.windKt != null && h.windKt <= 3;
        onFill({
          windDir: (!isCalm && h.windDir != null && h.windDir !== 0) ? h.windDir : null,
          windSpeed: (!isCalm && h.windKt != null) ? h.windKt : null,
          oat: h.tempC != null ? h.tempC : null,
          pressureAlt,
          runways,
        });
      }

      function formatHourLabel(isoTime) {
        const d = new Date(isoTime);
        const now = new Date();
        const diffH = Math.round((d - now) / 3600000);
        const localHH = d.getHours().toString().padStart(2, "0");
        const localMM = d.getMinutes().toString().padStart(2, "0");
        const utcHH = d.getUTCHours().toString().padStart(2, "0");
        const offset = diffH === 0 ? "NOW" : "+" + diffH + "h";
        return offset + " · " + localHH + ":" + localMM + " local · " + utcHH + "Z";
      }

      const selHour = forecast ? forecast[selectedHour] : null;

      return (
        <div style={{ background:C.input, border:"1px solid " + C.border, borderRadius:"3px", padding:"12px 14px", marginBottom:"8px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
            <div style={{ fontSize:"12px", letterSpacing:"3px", color:C.green }}>WEATHER AUTO-FILL</div>
            <div style={{ display:"flex", gap:"0px", borderRadius:"3px", overflow:"hidden", border:"1px solid " + C.border }}>
              {["current","forecast"].map(m2 => (
                <button key={m2} onClick={() => setMode(m2)} style={{
                  padding:"4px 10px", background: mode === m2 ? C.green : C.bg,
                  border:"none", color: mode === m2 ? C.btnText : C.dim,
                  fontFamily:mono, fontSize:"10px", letterSpacing:"1px", cursor:"pointer", textTransform:"uppercase",
                }}>{m2 === "current" ? "METAR" : "FORECAST"}</button>
              ))}
            </div>
          </div>

          <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
            <input value={icao} onChange={e => setIcao(e.target.value.toUpperCase().slice(0,4))}
              onKeyDown={e => { if (e.key === "Enter") fetchAll(); }}
              placeholder="e.g. KLAF"
              style={{ flex:1, minWidth:0, background:C.bg, border:"1px solid " + C.border, borderRadius:"3px", padding:"10px 12px", color:C.text, fontFamily:mono, fontSize:"18px", letterSpacing:"3px", boxSizing:"border-box" }} />
            <button onClick={fetchAll}
              style={{ flexShrink:0, background:C.green, border:"none", borderRadius:"3px", padding:"10px 16px", color:C.btnText, fontFamily:mono, fontSize:"12px", letterSpacing:"2px", cursor:"pointer", fontWeight:"bold", whiteSpace:"nowrap", minWidth:"64px" }}>
              {status === "loading"
                ? <span style={{ display:"flex", gap:"4px", alignItems:"center", justifyContent:"center" }}>
                    <span className="dot1" style={{ display:"inline-block", width:"6px", height:"6px", borderRadius:"50%", background:C.btnText }} />
                    <span className="dot2" style={{ display:"inline-block", width:"6px", height:"6px", borderRadius:"50%", background:C.btnText }} />
                    <span className="dot3" style={{ display:"inline-block", width:"6px", height:"6px", borderRadius:"50%", background:C.btnText }} />
                  </span>
                : "FETCH"}
            </button>
          </div>

          {msg && <div style={{ fontSize:"12px", color:C.error, letterSpacing:"1px", marginBottom:"6px" }}>{msg}</div>}

          {/* CURRENT METAR display */}
          {mode === "current" && metar && status === "ok" && (
            <div>
              <div style={{ fontSize:"10px", color:C.text, letterSpacing:"1px", marginBottom:"8px", wordBreak:"break-all", lineHeight:"1.4" }}>{metar.raw}</div>
              {metar.ageMin !== null && metar.ageMin > 50 && (
                <div style={{ background:C.errorBg, border:"1px solid " + C.warm, borderRadius:"3px", padding:"6px 10px", marginBottom:"8px", fontSize:"11px", color:C.warm, letterSpacing:"1px" }}>
                  METAR is {metar.ageMin} min old — may not reflect current conditions
                </div>
              )}
              {metar.ageMin !== null && metar.ageMin <= 50 && (
                <div style={{ fontSize:"10px", color:C.dimmest, letterSpacing:"1px", marginBottom:"6px" }}>Observed {metar.ageMin} min ago</div>
              )}
              <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
                <div style={{ background:metar.fc.color, borderRadius:"3px", padding:"3px 10px", fontSize:"13px", fontWeight:"bold", color:C.btnText, letterSpacing:"2px" }}>{metar.fc.cat}</div>
                {metar.vis !== null && <div style={{ fontSize:"11px", color:C.note }}>VIS <span style={{color:C.text}}>{metar.vis}sm</span></div>}
                {metar.isVRB && <div style={{ fontSize:"11px", color:C.warm, letterSpacing:"1px" }}>WIND VARIABLE — enter manually</div>}
                {metar.altimInHg !== null && <div style={{ fontSize:"11px", color:C.note }}>ALTIM <span style={{color:C.text}}>{metar.altimInHg.toFixed(2)}"</span></div>}
                {metar.elevFt !== null && <div style={{ fontSize:"11px", color:C.note }}>FIELD ELEV <span style={{color:C.text}}>{metar.elevFt}ft</span></div>}
                {metar.pressureAlt !== null && <div style={{ fontSize:"11px", color:C.note }}>PRESS ALT <span style={{color:C.green, fontWeight:"bold"}}>{metar.pressureAlt.toLocaleString()}ft</span></div>}
              </div>
            </div>
          )}

          {/* FORECAST display */}
          {mode === "forecast" && forecast && status === "ok" && (
            <div>
              {!latLon && <div style={{ fontSize:"11px", color:C.warm, marginBottom:"6px" }}>Fetch METAR first to enable forecast</div>}
              <div style={{ fontSize:"11px", letterSpacing:"2px", color:C.dim, marginBottom:"6px" }}>DEPARTURE TIME (NWS HOURLY FORECAST)</div>
              <input type="range" min="0" max={forecast.length - 1} step="1" value={selectedHour}
                onChange={e => {
                  const idx = parseInt(e.target.value);
                  setSelectedHour(idx);
                  fillFromForecastHour(forecast, idx, null, null);
                }}
                style={{ width:"100%", accentColor:C.green, marginBottom:"4px" }} />
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:"10px", color:C.dim, marginBottom:"8px" }}>
                <span>NOW</span>
                <span style={{ color:C.green, fontWeight:"bold" }}>{formatHourLabel(forecast[selectedHour].time)}</span>
                <span>+{forecast.length - 1}h</span>
              </div>

              {selHour && (
                <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
                  {selHour.tempC != null && <div style={{ fontSize:"11px", color:C.note }}>OAT <span style={{color:C.text}}>{selHour.tempC}°C</span></div>}
                  {selHour.windDir != null && <div style={{ fontSize:"11px", color:C.note }}>WIND <span style={{color:C.text}}>{selHour.windDir}° @ {selHour.windKt}kt</span></div>}
                  {selHour.altimInHg != null && <div style={{ fontSize:"11px", color:C.note }}>ALTIM <span style={{color:C.text}}>{selHour.altimInHg.toFixed(2)}"</span></div>}
                  {selHour.altimInHg != null && latLon && latLon.elevFt != null && (
                    <div style={{ fontSize:"11px", color:C.note }}>PRESS ALT <span style={{color:C.green, fontWeight:"bold"}}>{(Math.round(latLon.elevFt + (29.92 - selHour.altimInHg) * 1000)).toLocaleString()}ft</span></div>
                  )}
                </div>
              )}
              <div style={{ fontSize:"10px", color:C.dimmest, marginTop:"6px", letterSpacing:"1px" }}>NWS gridded forecast · drag slider to select departure time · auto-fills OAT, wind, pressure alt</div>
            </div>
          )}

          
          {mode === "forecast" && !forecast && status !== "loading" && (
            <div style={{ fontSize:"11px", color:C.dim, letterSpacing:"1px" }}>Enter airport ICAO and hit FETCH to load METAR and forecast together</div>
          )}
        </div>
      );
    }

    function TakeoffTab({ savedState, onStateChange }) {
      const C = useC();
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [wind, setWind] = useState(savedState.wind || "");
      const [metarFilled, setMetarFilled] = useState([]);
      const [airportRunways, setAirportRunways] = useState([]);
      const [windDir, setWindDir] = useState(savedState.windDir || "head");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [runwayFull, setRunwayFull] = useState(savedState.runwayFull || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [flaps, setFlaps] = useState(savedState.flaps || "25");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight, wind, windDir, runway, windHeading, windSpeed, flaps, result });
      }, [alt, oat, tempUnit, weight, wind, windDir, runway, windHeading, windSpeed, flaps, result]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum * 10) % 360;
        const angle = (windHdg - rwyHdg + 360) % 360;
        const rad = angle * Math.PI / 180;
        const headwind = Math.round(windSpd * Math.cos(rad) * 10) / 10;
        const crosswind = Math.round(Math.abs(windSpd * Math.sin(rad)) * 10) / 10;
        const crossDir = (angle > 0 && angle < 180) ? "R" : "L";
        return { headwind, crosswind, crossDir, angle, rwyHdg };
      }

      const windSpd = parseFloat(windSpeed) || 0;
      const rwyNum = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum) && !isNaN(windHdg) && windSpd > 0 && rwyNum >= 1 && rwyNum <= 36)
        ? getWindComponents(rwyNum, windHdg, windSpd) : null;

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 2550;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        if (altVal > 8000) { setError("Altitude must be at or below 8,000 ft."); return; }
        const altCalc = Math.max(0, altVal);
        const altWasClamped = altVal < 0;
        if (weightVal < 2000 || weightVal > 2550) { setError("Weight must be between 2,000 and 2,550 lbs."); return; }
        if (isNaN(rwyNum) || rwyNum < 1 || rwyNum > 36) { setError("Please enter a valid runway number (01–36)."); return; }
        if (isNaN(windHdg) || windHdg < 0 || windHdg > 360) { setError("Please enter a valid wind direction (0–360°)."); return; }

        const wc = windComponents || { headwind: 0, crosswind: 0, crossDir: "R", angle: 0, rwyHdg: rwyNum * 10 };
        const hwKt = wc.headwind;
        const wDir = hwKt >= 0 ? "head" : "tail";
        const windActual = Math.abs(hwKt);
        const MAX_HEAD = 15, MAX_TAIL = 5;
        const windClamped = wDir === "head" ? Math.min(windActual, MAX_HEAD) : Math.min(windActual, MAX_TAIL);
        const windWasClamped = windActual > windClamped;

        let res;
        if (flaps === "up") {
          res = calculateTakeoffFlapsUp(altCalc, oatC, weightVal, windClamped, wDir);
        } else {
          res = calculateTakeoff(altCalc, oatC, weightVal, windClamped, wDir, "50ft");
        }
        setResult({ ...res, flaps, windComponents: wc, windSpd, windActual, windClamped, windWasClamped, windDir: wDir, rwyNum, weightLbs: weightVal, densityAlt: getDensityAlt(altVal, oatC), altWasClamped, altVal });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, flaps, windComponents, windSpd, rwyNum, windHdg]);

      return (
        <Card>
          <div style={{ marginBottom: "20px", paddingBottom: "16px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "18px", letterSpacing: "4px", color: C.green, marginBottom: "10px" }}>TAKEOFF PERFORMANCE</div>
            <div style={{ display: "flex", gap: "8px" }}>
              {[{val:"up", label:"FLAPS UP", fig:"5-7"},{val:"25", label:"FLAPS 25°", fig:"5-9 · 5-13"}].map(opt => (
                <button key={opt.val} onClick={() => { setFlaps(opt.val); setResult(null); }} style={{
                  flex: 1, padding: "10px 8px", background: flaps === opt.val ? C.green : C.input,
                  border: `1px solid ${flaps === opt.val ? C.green : C.border}`, borderRadius: "3px",
                  color: flaps === opt.val ? C.btnText : C.dim, fontFamily: mono, cursor: "pointer",
                }}>
                  <div style={{ fontSize: "13px", letterSpacing: "2px", fontWeight: "bold" }}>{opt.label}</div>
                  <div style={{ fontSize: "10px", color: flaps === opt.val ? C.btnText + "bb" : C.dimmest, marginTop: "2px" }}>FIG {opt.fig}</div>
                </button>
              ))}
            </div>
            {flaps === "up" && <div style={{ fontSize: "11px", color: C.dim, marginTop: "8px", letterSpacing: "1px" }}>Full throttle before brake release · 50ft dist: Fig 5-7 · Ground roll: Fig 5-11</div>}
          </div>
          <MetarFetch onFill={({ windDir: wd, windSpeed: ws, oat: o, pressureAlt: pa, runways: rws }) => {
              const filled = [];
              if (wd !== null) { setWindHeading(String(wd)); filled.push("wind"); } else { setWindHeading(""); }
              if (ws !== null) { setWindSpeed(String(ws)); filled.push("wind"); } else { setWindSpeed(""); }
              if (o  !== null) { setOat(String(o)); setTempUnit("C"); filled.push("oat"); }
              if (pa !== null && pa !== undefined) { setAlt(String(pa)); filled.push("alt"); }
              if (rws && rws.length > 0) setAirportRunways(rws);
              setMetarFilled(filled);
            }} />

          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <AltOATRow altLabel="PRESSURE ALTITUDE" altValue={alt} onAltChange={setAlt} altHint="0 – 8,000 ft" altPlaceholder="e.g. 2000" altFilled={metarFilled.includes("alt")} oatValue={oat} onOatChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} oatFilled={metarFilled.includes("oat")} />
            <InputField label="GROSS WEIGHT" unit="LBS" value={weight} onChange={setWeight} placeholder="e.g. 2400" hint="2,000 – 2,550 lbs (leave blank for 2,550)" />
            <div>
              <div style={{ fontSize: "12px", letterSpacing: "3px", color: C.green, marginBottom: "8px", display:"flex", alignItems:"center", gap:"8px" }}>WIND{metarFilled.includes("wind") && <span style={{ fontSize:"11px", background:C.green, color:C.btnText, borderRadius:"3px", padding:"2px 6px", letterSpacing:"1px", fontWeight:"bold" }}>✓ METAR</span>}</div>
              <Grid3 style={{ marginBottom: "8px" }}>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>RUNWAY</div>
                  {airportRunways.length > 0 ? (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
                      {(() => {
                        const wHdg = parseFloat(windHeading);
                        const wSpd = parseFloat(windSpeed) || 0;
                        // Compute headwind for each runway, find best
                        const withWind = airportRunways.map(r => {
                          if (!isNaN(wHdg) && wSpd > 0) {
                            const angle = (wHdg - r.heading + 360) % 360;
                            const hw = Math.round(wSpd * Math.cos(angle * Math.PI / 180) * 10) / 10;
                            const xw = Math.abs(Math.round(wSpd * Math.sin(angle * Math.PI / 180) * 10) / 10);
                            return { num: r.num, heading: r.heading, length: r.length, hw: hw, xw: xw };
                          }
                          return { num: r.num, heading: r.heading, length: r.length, hw: null, xw: null };
                        });
                        const bestHW = withWind.reduce((best, r) => r.hw !== null && (best === null || r.hw > best.hw) ? r : best, null);
                        return withWind.map(r => {
                          const isSelected = runway === String(parseInt(r.num));
                          const isBest = bestHW && r.num === bestHW.num && r.hw !== null;
                          const bg = isSelected ? C.green : isBest ? "rgba(106,170,122,0.15)" : C.input;
                          const border = isSelected ? C.green : isBest ? C.green : C.border;
                          const color = isSelected ? C.btnText : isBest ? C.green : C.dim;
                          return (
                            <button key={r.num} onClick={() => { setRunway(String(parseInt(r.num))); setRunwayFull(r.num); }} style={{
                              padding:"8px 12px", background:bg, border:`1px solid ${border}`,
                              borderRadius:"3px", color, fontFamily:mono, fontSize:"15px", letterSpacing:"1px", cursor:"pointer",
                            }}>
                              <div>{r.num}</div>
                              {r.hw !== null && <div style={{ fontSize:"9px", letterSpacing:"0px", marginTop:"2px", color: isSelected ? "#0a0e14" : r.hw > 0 ? C.green : C.error }}>
                                {r.hw > 0 ? "+" : ""}{r.hw}kt
                              </div>}
                            </button>
                          );
                        });
                      })()}
                    </div>
                  ) : (
                    <input type="number" value={runway} onChange={e => { setRunway(e.target.value.slice(0,2)); setRunwayFull(""); }} placeholder="e.g. 28"
                      style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  )}
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>WIND DIR °</div>
                  <input type="number" value={windHeading} onChange={e => setWindHeading(e.target.value)} placeholder="e.g. 270"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>SPEED KT</div>
                  <input type="number" value={windSpeed} onChange={e => setWindSpeed(e.target.value)} placeholder="e.g. 10"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
              </Grid3>
              {windComponents && (() => {
                const hw = windComponents.headwind;
                const xw = windComponents.crosswind;
                const hwColor = hw >= 0 ? C.green : C.error;
                const hwLabel = hw >= 0 ? "HEADWIND" : "TAILWIND";
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginTop: "4px" }}>
                    <div style={{ background: C.input, border: `1px solid ${hwColor}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: hwColor, marginBottom: "3px" }}>{hwLabel}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: hwColor }}>{Math.abs(hw)} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                    </div>
                    <div style={{ background: C.input, border: `1px solid ${xw > 17 ? C.error : C.cool}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: xw > 17 ? C.error : C.cool, marginBottom: "3px" }}>CROSSWIND {windComponents.crossDir}{xw > 17 ? " ⚠" : ""}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: xw > 17 ? C.error : C.cool }}>{xw} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                      {xw > 17 && <div style={{ fontSize: "9px", color: C.error, letterSpacing: "1px", marginTop: "2px" }}>EXCEEDS 17KT DEMO LIMIT</div>}
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: "13px", color: C.dimmest, marginTop: "6px", letterSpacing: "1px" }}>Chart limit: 15kt headwind · 5kt tailwind · values beyond limit will be clamped</div>
            </div>
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && <RunwayViz result={result} airportRunways={airportRunways} runway={runway} runwayFull={runwayFull} />}
        </Card>
      );
    }

    function Plane({ x, y, angle, color }) {
      const C = useC();
      const showGear = Math.abs(angle) < 6;
      // PA-28 Archer side profile — fuselage centerline at y=0, nose points right (+x)
      // Scale: ~40px nose to tail
      return (

    function RunwayViz({ result, airportRunways, runway, runwayFull }) {
      const C = useC();
      const dist50 = result.dist50Ft;
      const distGr = result.groundRollFt;
      const flapsUp = result.flaps === "up";
      const markerColor50 = C.warm;
      const markerColorRoll = C.green;
      const centerlineColor = C.rwyStripe;

      const maxDist = dist50 * 1.32;
      const dist50Pct = Math.min(dist50 / maxDist, 0.88);
      const grPct = Math.min(distGr / maxDist, dist50Pct - 0.05);

      const xStart = 26;
      const yRwy   = 95;
      const xGr    = 18 + grPct * 420;
      const x50    = 18 + dist50Pct * 420;
      const xEnd   = Math.min(x50 + 55, 448);
      // Climb arc: plane should be well above the 50ft pole (pole top at y=62)
      // by the time it reaches x50. Push CP1 lower (barely off runway) and CP2 high
      // so the plane passes x50 at around y=30, giving ~32px clearance over pole top.
      const yEnd   = 32;
      const cp1X = xGr + (x50 - xGr) * 0.4;
      const cp1Y = yRwy - 6;   // shallow initially
      const cp2X = xGr + (x50 - xGr) * 0.75;
      const cp2Y = yEnd + 8;   // pulls up well before 50ft marker

      const animRef = useRef(null);
      const [t, setT] = useState(0);
      const [done, setDone] = useState(false);

      useEffect(() => {
        setT(0); setDone(false);
        let start = null;
        const duration = 2800;
        function step(ts) {
          if (!start) start = ts;
          const raw = Math.min((ts - start) / duration, 1);
          const eased = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
          setT(eased);
          if (raw < 1) animRef.current = requestAnimationFrame(step);
          else setDone(true);
        }
        animRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(animRef.current);
      }, [result]);

      const grFrac = grPct / (dist50Pct + 0.08);

      function bezier(t2) {
        const u = 1 - t2;
        return {
          x: u*u*u*xGr + 3*u*u*t2*cp1X + 3*u*t2*t2*cp2X + t2*t2*t2*xEnd,
          y: u*u*u*yRwy + 3*u*u*t2*cp1Y + 3*u*t2*t2*cp2Y + t2*t2*t2*yEnd,
        };
      }
      function bezierAngle(t2) {
        const dt = 0.01, t3 = Math.min(t2 + dt, 1);
        const p1 = bezier(t2), p2 = bezier(t3);
        return Math.atan2(-(p2.y - p1.y), p2.x - p1.x) * 180 / Math.PI;
      }

      let px, py, angle;
      if (t <= grFrac) {
        const gt = grFrac > 0 ? t / grFrac : 0;

        py = yRwy;

      } else {
        const bt = (t - grFrac) / (1 - grFrac);
        const pos = bezier(bt);
        px = pos.x;
        py = pos.y;
        angle = bezierAngle(bt);
      }

      // Auto-sized label box helper
      function LabelBox({ cx, cy, text, color, boxFill="#060a0f" }) {

                    <path d="M5515 2261 c-146 -7 -165 -14 -214 -81 -30 -42 -53 -70 -158 -195 -38 -45 -86 -103 -108 -130 -173 -211 -239 -278 -320 -324 -95 -55 -136 -61 -397 -61 -132 0 -238 4 -238 9 0 12 85 128 122 168 17 17 28 37 26 43 -2 7 -46 -40 -98 -104 l-95 -117 -116 5 c-64 4 -181 15 -260 27 -79 11 -163 23 -186 26 -39 5 -55 16 -35 25 14 5 152 184 152 197 0 6 -7 11 -16 11 -16 0 -58 -35 -194 -159 -32 -29 -65 -51 -78 -51 -12 0 -68 7 -123 15 -56 9 -262 36 -458 61 -543 70 -832 72 -1011 7 -76 -28 -405 -202 -484 -256 -23 -16 -54 -22 -160 -28 -261 -15 -605 -60 -735 -96 -21 -5 -23 -4 -15 13 13 26 10 214 -6 437 -11 162 -15 187 -29 185 -11 -2 -17 -16 -18 -48 -2 -25 -10 -130 -19 -234 -8 -104 -14 -232 -13 -284 l2 -94 -56 -22 c-63 -26 -138 -69 -161 -92 -23 -22 -20 -59 7 -76 31 -20 125 -56 169 -65 l37 -8 5 -160 c3 -88 10 -198 16 -245 5 -47 10 -114 10 -150 0 -77 8 -110 25 -110 13 0 19 43 30 220 22 321 22 335 9 380 -14 47 -9 67 9 35 18 -34 90 -100 138 -129 38 -21 48 -34 53 -61 4 -19 11 -35 16 -35 6 0 10 -27 10 -60 0 -64 8 -73 33 -38 l16 23 0 -22 c1 -29 8 -29 32 -1 10 13 18 39 19 61 0 42 21 51 37 14 11 -24 53 -42 125 -52 34 -4 45 -10 42 -20 -3 -7 -1 -16 4 -19 9 -5 -8 -102 -23 -125 -3 -6 -17 -11 -30 -11 -36 0 -155 -66 -203 -113 -50 -49 -54 -81 -15 -129 32 -39 44 -48 54 -42 4 2 14 -7 23 -21 9 -13 36 -36 61 -51 36 -21 54 -25 86 -21 56 7 110 38 137 77 12 19 29 35 36 36 8 1 66 19 131 40 100 33 121 44 145 74 45 58 82 132 71 143 -6 6 -62 3 -159 -8 -147 -17 -235 -15 -248 6 -3 6 6 24 21 39 30 31 30 24 -1 130 -4 14 -4 22 0 19 3 -3 35 0 71 6 52 10 127 10 363 0 163 -8 442 -17 618 -21 l321 -7 2 -57 1 -57 -42 -7 c-137 -22 -257 -134 -219 -204 15 -27 57 -50 110 -58 26 -4 41 -12 41 -21 0 -23 71 -82 108 -89 32 -6 32 -7 32 -65 l0 -59 35 0 35 0 0 65 c0 50 3 65 15 65 22 0 86 61 101 96 12 27 24 35 81 54 130 42 149 51 166 80 20 32 22 66 6 76 -6 4 -61 19 -123 34 -100 24 -111 29 -108 48 2 11 -4 34 -12 51 -30 56 -27 58 97 60 63 1 135 -3 162 -9 38 -9 50 -8 59 3 8 10 56 18 164 27 85 6 156 9 159 6 8 -8 -28 -47 -38 -41 -11 8 -23 -15 -12 -26 4 -4 26 -6 47 -2 30 5 44 15 65 44 20 30 33 38 56 39 17 0 47 4 68 9 l37 9 0 -344 c0 -296 2 -344 15 -344 12 0 15 22 18 113 l3 112 2 -112 c2 -93 5 -113 17 -113 13 0 15 45 15 345 l0 344 33 5 c17 3 212 26 432 51 220 25 436 50 480 55 113 14 307 37 465 55 130 15 176 20 231 30 16 2 41 -5 65 -20 61 -38 108 -30 85 14 -10 17 -5 20 57 30 123 21 190 54 214 106 10 21 18 23 149 30 104 5 139 10 139 20 0 13 -12 16 -201 46 l-77 13 -12 51 c-13 56 -19 30 117 490 20 66 48 163 64 215 15 52 42 142 59 200 42 141 50 172 44 182 -6 9 -98 8 -309 -1z"/>
                  </g>

            </svg>
          </div>

          {/* Numeric result cards */}

          {/* Takeoff speeds */}
          {(() => {
            const speeds = flapsUp ? getFlapsUpSpeeds(result.weightLbs || 2550) : getTakeoffSpeeds(result.weightLbs || 2550);
            return (
              <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "12px 16px", marginBottom: "12px", display: "flex", justifyContent: "space-around", alignItems: "center" }}>

          <NoteBox text={flapsUp ? "Flaps UP, full throttle before brake release, paved/level/dry, A/C off. 50ft dist: Fig 5-7, Ground roll: Fig 5-11. Always verify against official POH." : "Flaps 25°, full throttle, paved/level/dry, A/C off. Always verify against official POH charts."} />
