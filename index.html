    // ============================================================
    function SeminoleTakeoffTab({ savedState, onStateChange }) {
      const C = useC();
      const mobile = useIsMobileInner();
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [runwayFull, setRunwayFull] = useState(savedState.runwayFull || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [airportRunways, setAirportRunways] = useState([]);
      const [metarFilled, setMetarFilled] = useState([]);
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight, runway, runwayFull, windHeading, windSpeed });
      }, [alt, oat, tempUnit, weight, runway, runwayFull, windHeading, windSpeed]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum * 10) % 360;
        const ang = (windHdg - rwyHdg + 360) % 360;
        const r = ang * Math.PI / 180;
        return {
          headwind: Math.round(windSpd * Math.cos(r) * 10) / 10,
          crosswind: Math.round(Math.abs(windSpd * Math.sin(r)) * 10) / 10,
          crossDir: (ang > 0 && ang < 180) ? "R" : "L",
          angle: ang, rwyHdg,
        };
      }

      const windSpd = parseFloat(windSpeed) || 0;
      const rwyNum = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum) && !isNaN(windHdg) && windSpd > 0 && rwyNum >= 1 && rwyNum <= 36)
        ? getWindComponents(rwyNum, windHdg, windSpd) : null;

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 3800;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        if (altVal > 8000) { setError("Altitude must be at or below 8,000 ft."); return; }
        if (weightVal < 2600 || weightVal > 3800) { setError("Weight must be 2,600 - 3,800 lbs."); return; }
        if (isNaN(rwyNum) || rwyNum < 1 || rwyNum > 36) { setError("Please enter a valid runway number (01-36)."); return; }
        if (isNaN(windHdg) || windHdg < 0 || windHdg > 360) { setError("Please enter a valid wind direction (0-360)."); return; }
        const altCalc = Math.max(0, altVal);
        const wc = windComponents || { headwind: 0, crosswind: 0, crossDir: "R", angle: 0, rwyHdg: rwyNum * 10 };
        const hwKt = wc.headwind;
        const wDir = hwKt >= 0 ? "head" : "tail";
        const windActual = Math.abs(hwKt);
        const windClamped = wDir === "head" ? Math.min(windActual, 30) : Math.min(windActual, 10);
        const windWasClamped = windActual > windClamped;
        const grRes = calculateSemTakeoffGR(altCalc, oatC, weightVal, windClamped, wDir);
        const ftRes = calculateSemTakeoff50(altCalc, oatC, weightVal, windClamped, wDir);
        const asRes = calculateSemAccelStop(altCalc, oatC, weightVal, windClamped, wDir);
        const vr = getSemRotateSpeed(weightVal);
        const vobs = getSemObsSpeed(weightVal);
        const oeiCaution = grRes.oeiCaution || ftRes.oeiCaution;
        setResult({ groundRollFt: grRes.groundRollFt, dist50Ft: ftRes.dist50Ft, accelStopFt: asRes.accelStopFt, oeiCaution,
          isaDeviation: grRes.isaDeviation, isaTemp: grRes.isaTemp,
          windComponents: wc, windSpd, windActual, windClamped, windWasClamped,
          windDir: wDir, rwyNum, weightLbs: weightVal,
          densityAlt: getDensityAlt(altVal, oatC), altVal, altWasClamped: altVal < 0, vr, vobs });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, windComponents, windSpd, rwyNum, windHdg]);

      const markerColorRoll = C.green;
      const markerColor50 = C.warm;

      return (
        <Card>
          <div style={{ marginBottom: "20px", paddingBottom: "16px", borderBottom: "1px solid " + C.border }}>
            <div style={{ fontSize: "18px", letterSpacing: "4px", color: C.green, marginBottom: "4px" }}>TAKEOFF PERFORMANCE</div>
            <div style={{ fontSize: "13px", color: C.dimmer, letterSpacing: "1px" }}>WING FLAPS 0 · COWL FLAPS OPEN · SHORT FIELD · FIG 5-13 / 5-15</div>
          </div>
          <MetarFetch onFill={function(d) {
            var filled = [];
            if (d.windDir !== null) { setWindHeading(String(d.windDir)); filled.push("wind"); } else { setWindHeading(""); }
            if (d.windSpeed !== null) { setWindSpeed(String(d.windSpeed)); filled.push("wind"); } else { setWindSpeed(""); }
            if (d.oat !== null) { setOat(String(d.oat)); setTempUnit("C"); filled.push("oat"); }
            if (d.pressureAlt !== null && d.pressureAlt !== undefined) { setAlt(String(d.pressureAlt)); filled.push("alt"); }
            if (d.runways && d.runways.length > 0) setAirportRunways(d.runways);
            setMetarFilled(filled);
          }} />
          <div style={{ display: "flex", flexDirection: "column", gap: "12px", marginBottom: "24px" }}>
            <AltOATRow altLabel="PRESSURE ALTITUDE" altValue={alt} onAltChange={setAlt} altHint="0 - 8,000 ft" altPlaceholder="e.g. 1250" altFilled={metarFilled.includes("alt")} oatValue={oat} onOatChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} oatFilled={metarFilled.includes("oat")} />
            <InputField label="GROSS WEIGHT" unit="LBS" value={weight} onChange={setWeight} placeholder="e.g. 3400" hint="2,600 - 3,800 lbs (leave blank for 3,800)" />
            <div>
              <div style={{ fontSize: "12px", letterSpacing: "3px", color: C.green, marginBottom: "8px", display: "flex", alignItems: "center", gap: "8px" }}>
                WIND
                {metarFilled.includes("wind") && <span style={{ fontSize: "11px", background: C.green, color: C.btnText, borderRadius: "3px", padding: "2px 6px", letterSpacing: "1px", fontWeight: "bold" }}>METAR</span>}
              </div>
              <Grid3 style={{ marginBottom: "8px" }}>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>RUNWAY</div>
                  {airportRunways.length > 0 ? (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: "5px" }}>
                      {(function() {
                        var wHdg = parseFloat(windHeading), wSpd = parseFloat(windSpeed) || 0;
                        var withWind = airportRunways.map(function(r) {
                          if (!isNaN(wHdg) && wSpd > 0) {
                            var ang = (wHdg - r.heading + 360) % 360;
                            var hw = Math.round(wSpd * Math.cos(ang * Math.PI / 180) * 10) / 10;
                            var xw = Math.abs(Math.round(wSpd * Math.sin(ang * Math.PI / 180) * 10) / 10);
                            return { num: r.num, heading: r.heading, length: r.length, hw: hw, xw: xw };
                          }
                          return { num: r.num, heading: r.heading, length: r.length, hw: null, xw: null };
                        });
                        var bestHW = withWind.reduce(function(best, r) { return r.hw !== null && (best === null || r.hw > best.hw) ? r : best; }, null);
                        return withWind.map(function(r) {
                          var isSelected = runway === String(parseInt(r.num));
                          var isBest = bestHW && r.num === bestHW.num && r.hw !== null;
                          return (
                            <button key={r.num} onClick={function() { setRunway(String(parseInt(r.num))); setRunwayFull(r.num); }} style={{
                              padding: "8px 12px", background: isSelected ? C.green : isBest ? "rgba(106,170,122,0.15)" : C.input,
                              border: "1px solid " + (isSelected ? C.green : isBest ? C.green : C.border),
                              borderRadius: "3px", color: isSelected ? C.btnText : isBest ? C.green : C.dim,
                              fontFamily: mono, fontSize: "15px", letterSpacing: "1px", cursor: "pointer",
                            }}>
                              <div>{r.num}</div>
                              {r.hw !== null && <div style={{ fontSize: "9px", marginTop: "2px", color: isSelected ? "#0a0e14" : r.hw > 0 ? C.green : C.error }}>{r.hw > 0 ? "+" : ""}{r.hw}kt</div>}
                            </button>
                          );
                        });
                      })()}
                    </div>
                  ) : (
                    <input type="number" value={runway} onChange={function(e) { setRunway(e.target.value.slice(0,2)); setRunwayFull(""); }} placeholder="e.g. 28"
                      style={{ width: "100%", boxSizing: "border-box", background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  )}
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>WIND DIR</div>
                  <input type="number" value={windHeading} onChange={function(e) { setWindHeading(e.target.value); }} placeholder="e.g. 270"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>SPEED KT</div>
                  <input type="number" value={windSpeed} onChange={function(e) { setWindSpeed(e.target.value); }} placeholder="e.g. 10"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
              </Grid3>
              {windComponents && (function() {
                var hw = windComponents.headwind, xw = windComponents.crosswind;
                var hwColor = hw >= 0 ? C.green : C.error;
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginTop: "4px" }}>
                    <div style={{ background: C.input, border: "1px solid " + hwColor + "55", borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: hwColor, marginBottom: "3px" }}>{hw >= 0 ? "HEADWIND" : "TAILWIND"}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: hwColor }}>{Math.abs(hw)} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                    </div>
                    <div style={{ background: C.input, border: "1px solid " + C.cool + "55", borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.cool, marginBottom: "3px" }}>CROSSWIND {windComponents.crossDir}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: C.cool }}>{xw} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <SeminoleRunwayViz result={result} airportRunways={airportRunways} runway={runway} runwayFull={runwayFull} />
              {result.windWasClamped && (
                <div style={{ background: C.errorBg, border: "1px solid " + C.warm, borderRadius: "3px", padding: "10px 14px", marginBottom: "12px" }}>
                  <div style={{ fontSize: "12px", color: C.note, letterSpacing: "1px" }}>Wind clamped to {result.windClamped} kt (chart max {result.windDir === "head" ? "30" : "10"} kt)</div>
                </div>
              )}
              <div style={{ background: C.input, border: "1px solid " + C.borderDim, borderRadius: "3px", padding: "12px 16px", display: "flex", justifyContent: "space-around", alignItems: "center", marginBottom: "12px" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "4px" }}>ROTATE (Vr)</div>
                  <div style={{ fontSize: "28px", fontWeight: "bold", color: markerColorRoll }}>{result.vr}<span style={{ fontSize: "13px", color: C.dim, marginLeft: "4px" }}>KIAS</span></div>
                </div>
                <div style={{ width: "1px", height: "40px", background: C.borderDim }} />
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "4px" }}>OBSTACLE</div>
                  <div style={{ fontSize: "28px", fontWeight: "bold", color: markerColor50 }}>{result.vobs}<span style={{ fontSize: "13px", color: C.dim, marginLeft: "4px" }}>KIAS</span></div>
                </div>
              </div>
              <NoteBox text="Short field effort. Wing flaps 0, cowl flaps open, 2700 RPM full throttle before brake release, paved/level/dry. Engine failure at or after Vr - continue and fly procedure. Always verify against official POH." />
            </div>
          )}
        </Card>
      );
    }

    function SemRocCard(props) {
      var C = props.C, res = props.res, label = props.label, fig = props.fig, speed = props.speed, color = props.color, oeiWarning = props.oeiWarning, altClamped = props.altClamped;
      return React.createElement("div", { style: { background: C.input, border: "1px solid " + color, borderRadius: "3px", padding: "14px 12px", textAlign: "center" } },
        React.createElement("div", { style: { fontSize: "12px", letterSpacing: "1px", color: C.text, marginBottom: "3px", fontWeight: "bold" } }, label),
        React.createElement("div", { style: { fontSize: "10px", letterSpacing: "1px", color: C.dim, marginBottom: "8px" } }, speed + " / " + fig + (altClamped ? " (clamped 10k)" : "")),
        res.atCeiling
          ? React.createElement("div", { style: { fontSize: "13px", color: C.error, fontWeight: "bold", letterSpacing: "2px" } }, "AT CEILING")
          : React.createElement("div", null,
              React.createElement("div", { style: { fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" } }, Math.max(0, res.roc).toLocaleString()),
              React.createElement("div", { style: { fontSize: "11px", color: C.dim, marginTop: "4px", letterSpacing: "2px" } }, "FPM")
            ),
        oeiWarning && React.createElement("div", { style: { fontSize: "9px", color: C.warm, marginTop: "6px", letterSpacing: "1px" } }, "2-3 deg bank toward op. engine")
      );
    }

    function SeminoleClimbTab({ savedState, onStateChange }) {
      const C = useC();
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [metarFilled, setMetarFilled] = useState([]);
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight });
      }, [alt, oat, tempUnit, weight]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 3800;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        if (altVal > 14000) { setError("Altitude must be at or below 14,000 ft."); return; }
        if (weightVal < 2800 || weightVal > 3800) { setError("Weight must be 2,800 - 3,800 lbs."); return; }
        const resGD = calculateSemClimbGearDown(Math.max(0, altVal), oatC, weightVal);
        const resGU = calculateSemClimbGearUp(Math.max(0, altVal), oatC, weightVal);
        const resOEI = calculateSemClimbOEI(Math.max(0, Math.min(10000, altVal)), oatC, weightVal);
        setResult({ resGD, resGU, resOEI, altVal, weightVal, isaDeviation: resGU.isaDeviation, isaTemp: resGU.isaTemp });
      }, [alt, oat, tempUnit, weight]);

      return (
        <Card>
          <div style={{ marginBottom: "20px", paddingBottom: "16px", borderBottom: "1px solid " + C.border }}>
            <div style={{ fontSize: "18px", letterSpacing: "4px", color: C.green, marginBottom: "4px" }}>CLIMB PERFORMANCE</div>
            <div style={{ fontSize: "13px", color: C.dimmer, letterSpacing: "1px" }}>FLAPS 0 - 2700 RPM - FULL THROTTLE - FULL RICH</div>
          </div>
          <MetarFetch onFill={function(d) {
            var filled = [];
            if (d.oat !== null) { setOat(String(d.oat)); setTempUnit("C"); filled.push("oat"); }

          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "12px" }}>
                <SemRocCard C={C} res={result.resGD} label="BOTH ENG / GEAR DOWN" fig="FIG 5-17" speed="78 KIAS" color={C.green} />
                <SemRocCard C={C} res={result.resGU} label="BOTH ENG / GEAR UP" fig="FIG 5-19" speed="88 KIAS" color={C.green} />
                <SemRocCard C={C} res={result.resOEI} label="ONE ENG / GEAR UP" fig="FIG 5-21" speed="88 KIAS" color={C.warm} oeiWarning={true} altClamped={result.altVal > 10000} />
              </div>
              {result.altVal > 10000 && (
                <div style={{ background: C.input, border: "1px solid " + C.warm + "66", borderRadius: "3px", padding: "8px 12px", marginBottom: "12px", fontSize: "11px", color: C.note, letterSpacing: "1px" }}>
                  OEI chart limit is 10,000 ft. OEI result shown at 10,000 ft.
                </div>
              )}
              <NoteBox text="Gear down: 78 KIAS (Fig 5-17). Gear up: 88 KIAS (Fig 5-19). OEI gear up: 88 KIAS, prop feathered, inop cowl flap closed, 2-3 deg bank toward operating engine (Fig 5-21). Always verify against official POH." />
            </div>
          )}
        </Card>
      );
    }

        function SeminoleSpeedsTab({ savedState, onStateChange }) {
      const C = useC();
      const mono = "'Courier New', monospace";
      const [weight, setWeight] = useState(savedState.weight || "");

      useEffect(() => {
        onStateChange({ weight });
      }, [weight]);

      const weightVal = parseFloat(weight);
      const validWeight = !isNaN(weightVal) && weightVal >= 2870 && weightVal <= 3800;

      // Vo: 3800lb->135, 2870lb->115, linear interpolation
      const vo = validWeight
        ? Math.round(115 + (135 - 115) * (weightVal - 2870) / (3800 - 2870))
        : null;

      return (
        <Card>
          <div style={{ fontSize: "18px", letterSpacing: "4px", color: C.green, marginBottom: "24px" }}>SPEEDS REFERENCE</div>

          <div style={{ marginBottom: "20px" }}>
            <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>GROSS WEIGHT</div>
            <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
              <input
                type="number"
                value={weight}
                onChange={function(e) { setWeight(e.target.value); }}
                placeholder="e.g. 3400"
                style={{ flex: 1, boxSizing: "border-box", background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }}
              />
              <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim }}>LBS</div>
            </div>
            {weight !== "" && !validWeight && <div style={{ fontSize: "11px", color: C.error, marginTop: "4px", letterSpacing: "1px" }}>Weight must be 2,870 - 3,800 lbs</div>}
          </div>

          <div style={{ fontSize: "13px", letterSpacing: "3px", color: C.green, marginBottom: "12px", borderBottom: "1px solid " + C.border, paddingBottom: "8px" }}>MANEUVERING SPEED (Vo)</div>
          {vo !== null ? (
            <div style={{ background: C.input, border: "2px solid " + C.cool, borderRadius: "4px", padding: "20px", textAlign: "center", marginBottom: "20px" }}>
              <div style={{ fontSize: "11px", letterSpacing: "3px", color: C.cool, marginBottom: "6px" }}>Vo AT {Math.round(weightVal).toLocaleString()} LB</div>
              <div style={{ fontSize: "64px", fontWeight: "bold", color: C.text, lineHeight: 1 }}>{vo}</div>
              <div style={{ fontSize: "16px", letterSpacing: "4px", color: C.dim, marginTop: "6px" }}>KIAS</div>
              <div style={{ fontSize: "11px", color: C.dim, marginTop: "8px" }}>Do not make full or abrupt control inputs above this speed</div>
            </div>
          ) : (
            <div style={{ background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "16px", textAlign: "center", color: C.dim, fontSize: "12px", letterSpacing: "1px", marginBottom: "20px" }}>
              Enter gross weight (2,870 - 3,800 lb) to calculate
            </div>
          )}

          <NoteBox text="Vo varies with weight. Do not make full or abrupt control inputs above maneuvering speed. Always verify against official POH Section 2." />
        </Card>
      );
    }

    function SeminoleApp({ onBack, theme, toggleTheme }) {
      const C = useC();
      const mobile = useIsMobile();
      const [activeTab, setActiveTab] = useState("takeoff");
      const [tabStates, setTabStates] = useState({});
      function saveTabState(id, state) { setTabStates(function(prev) { var n = {}; Object.keys(prev).forEach(function(k) { n[k] = prev[k]; }); n[id] = state; return n; }); }
      var tabs = [{ id: "takeoff", label: "TAKEOFF", fig: "5-13/15" }, { id: "tfd", label: "CLIMB TFD", fig: "5-23" }, { id: "climb", label: "CLIMB", fig: "5-17/19/21" }, { id: "cruise", label: "CRUISE", fig: "5-25/27" }, { id: "landing", label: "LANDING", fig: "5-35" }, { id: "speeds", label: "SPEEDS", fig: "Sec 2" }];
      function tabProps(id) { return { savedState: tabStates[id] || {}, onStateChange: function(s) { saveTabState(id, s); } }; }
      return (
        <MobileContext.Provider value={mobile}>
          <div style={{ minHeight: "100vh", background: C.bg, fontFamily: mono, color: C.text, display: "flex", flexDirection: "column", alignItems: "center", padding: mobile ? "16px 12px" : "32px 24px" }}>
            {onBack && (
              <div style={{ width: "100%", maxWidth: "860px", marginBottom: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <button onClick={onBack} style={{ background: "none", border: "1px solid " + C.borderDim, borderRadius: "3px", padding: "6px 12px", color: C.dim, fontFamily: mono, fontSize: "11px", letterSpacing: "2px", cursor: "pointer" }}>AIRCRAFT</button>
                <button onClick={toggleTheme} style={{ background: "none", border: "1px solid " + C.borderDim, borderRadius: "3px", padding: "6px 12px", color: C.dim, fontFamily: mono, fontSize: "11px", letterSpacing: "2px", cursor: "pointer" }}>
                  {theme === "dark" ? "LIGHT" : "DARK"}
                </button>
              </div>
            )}
            <div style={{ textAlign: "center", marginBottom: mobile ? "16px" : "32px" }}>
              <div style={{ fontSize: mobile ? "11px" : "18px", letterSpacing: mobile ? "3px" : "6px", color: C.green, marginBottom: "6px" }}>PA-44-180 SEMINOLE - POH PERFORMANCE</div>
              <div style={{ fontSize: mobile ? "22px" : "36px", fontWeight: "bold", letterSpacing: mobile ? "1px" : "3px" }}>PERFORMANCE CALCULATOR</div>
              <div style={{ fontSize: "11px", color: C.warm, marginTop: "8px", letterSpacing: "2px" }}>EARLY ACCESS - MORE TABS COMING SOON</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(" + tabs.length + ", 1fr)", marginBottom: mobile ? "14px" : "24px", border: "1px solid " + C.border, borderRadius: "4px", overflow: "hidden", width: "100%", maxWidth: "860px" }}>
              {tabs.map(function(tab, i) {
                return (
                  <button key={tab.id} onClick={function() { setActiveTab(tab.id); }} style={{
                    padding: mobile ? "10px 4px" : "14px 8px", background: activeTab === tab.id ? C.green : C.card,
                    border: "none", borderLeft: i > 0 ? "1px solid " + C.border : "none",
                    color: activeTab === tab.id ? C.btnText : C.dim,
                    fontFamily: mono, fontSize: mobile ? "10px" : "15px", letterSpacing: mobile ? "0px" : "2px",
                    cursor: "pointer", textTransform: "uppercase",
                  }}>
                    <div style={{ fontWeight: "bold" }}>{tab.label}</div>
                    <div style={{ fontSize: mobile ? "9px" : "12px", marginTop: "2px", opacity: 0.7 }}>{tab.fig}</div>
                  </button>
                );
              })}
            </div>
            <div style={{ width: "100%", maxWidth: "860px" }}>
              {activeTab === "takeoff" ? React.createElement(SeminoleTakeoffTab, tabProps("takeoff")) : null}
              {activeTab === "tfd" ? React.createElement(SeminoleTFDTab, tabProps("tfd")) : null}
              {activeTab === "climb" ? React.createElement(SeminoleClimbTab, tabProps("climb")) : null}
              {activeTab === "cruise" ? React.createElement(SeminoleCruiseTab, tabProps("cruise")) : null}
              {activeTab === "landing" ? React.createElement(SeminoleLandingTab, tabProps("landing")) : null}
              {activeTab === "speeds" ? React.createElement(SeminoleSpeedsTab, tabProps("speeds")) : null}
            </div>
            <div style={{ marginTop: "24px", fontSize: "12px", color: C.dim, letterSpacing: "2px" }}>PA-44-180 SEMINOLE - REPORT VB-2636 - ISSUED NOV 2016</div>
          </div>
        </MobileContext.Provider>
      );
    }


    function AircraftMenu({ onSelect, theme, toggleTheme }) {
      const C = useC();
      const mobile = useIsMobile();
      const aircraft = [
        {
          id: "pa28",
          name: "PA-28-181",
          sub: "Archer III",
          desc: "VB-2749 · Issued Dec 2017",
          tags: ["Takeoff", "Landing", "Climb", "Time·Fuel·Dist", "Cruise", "Glide", "Speeds"],
          available: true,
        },
        {
          id: "c172s",
          name: "C172S",
          sub: "Skyhawk SP",
          desc: "NAV III · GFC 700 AFCS",
          tags: ["Takeoff", "Landing", "Climb", "Time·Fuel·Dist", "Cruise", "Speeds"],
          available: true,
        },
        {
          id: "pa44",
          name: "PA-44-180",
          sub: "Seminole",
          desc: "Twin Engine · Multi-Engine Trainer",
          tags: ["Takeoff", "Landing", "Climb", "Cruise", "OEI Performance"],
          available: true,
        },
      ];

      return (
        <MobileContext.Provider value={mobile}>
          <div style={{ minHeight: "100vh", background: C.bg, fontFamily: mono, color: C.text, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: mobile ? "24px 16px" : "48px 24px" }}>
            <div style={{ position: "absolute", top: "16px", right: "16px" }}>
              <button onClick={toggleTheme} style={{ background: "none", border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "6px 12px", color: C.dim, fontFamily: mono, fontSize: "11px", letterSpacing: "2px", cursor: "pointer" }}>
                {theme === "dark" ? "☀ LIGHT" : "☾ DARK"}
              </button>
            </div>
            <div style={{ textAlign: "center", marginBottom: mobile ? "32px" : "48px" }}>
              <div style={{ fontSize: mobile ? "11px" : "14px", letterSpacing: "6px", color: C.green, marginBottom: "12px" }}>POH PERFORMANCE CALCULATOR</div>
              <div style={{ fontSize: mobile ? "28px" : "42px", fontWeight: "bold", letterSpacing: "2px" }}>AERO</div>
              <div style={{ fontSize: mobile ? "28px" : "42px", fontWeight: "bold", letterSpacing: "2px", color: C.green }}>CALC</div>
              <div style={{ fontSize: mobile ? "12px" : "14px", color: C.dim, marginTop: "12px", letterSpacing: "2px" }}>SELECT AIRCRAFT</div>
              <div style={{ fontSize: "11px", color: C.dimmest, marginTop: "8px", letterSpacing: "2px" }}>v0.9.0</div>
            </div>

            <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", flexWrap: "wrap", gap: "16px", width: "100%", maxWidth: "760px" }}>
              {aircraft.map(ac => (
                <button key={ac.id} onClick={() => ac.available && onSelect(ac.id)}
                  style={{
                    flex: 1, background: ac.available ? C.card : C.bg,
                    border: `1px solid ${ac.available ? C.border : C.borderDim}`,
                    borderRadius: "6px", padding: "28px 24px", textAlign: "left",
                    cursor: ac.available ? "pointer" : "default",
                    opacity: ac.available ? 1 : 0.5,
                    transition: "border-color 0.15s",
                    fontFamily: mono,
                  }}
                  onMouseEnter={e => { if (ac.available) e.currentTarget.style.borderColor = C.green; }}
                  onMouseLeave={e => { if (ac.available) e.currentTarget.style.borderColor = C.border; }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px" }}>
                    <div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: ac.available ? C.text : C.dim, letterSpacing: "2px" }}>{ac.name}</div>
                      <div style={{ fontSize: "14px", color: ac.available ? C.green : C.dimmest, letterSpacing: "3px", marginTop: "2px" }}>{ac.sub}</div>
                    </div>
                    {ac.available
                      ? <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.green, background: "rgba(106,170,122,0.15)", border: `1px solid ${C.green}55`, padding: "3px 8px", borderRadius: "2px" }}>AVAILABLE</div>
                      : <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.warm, background: C.warm + "15", border: `1px solid ${C.warm}55`, padding: "3px 8px", borderRadius: "2px" }}>COMING SOON</div>
                    }
                  </div>
                  <div style={{ fontSize: "11px", color: C.dimmest, letterSpacing: "1px", marginBottom: "16px" }}>{ac.desc}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {ac.tags.map(tag => (
                      <div key={tag} style={{ fontSize: "10px", letterSpacing: "1px", color: ac.available ? C.dim : C.dimmest, background: C.input, border: `1px solid ${C.borderDim}`, padding: "2px 7px", borderRadius: "2px" }}>{tag}</div>
                    ))}
                  </div>
                  {ac.available && (
                    <div style={{ marginTop: "20px", fontSize: "12px", letterSpacing: "3px", color: C.green, display: "flex", alignItems: "center", gap: "6px" }}>
                      OPEN CALCULATOR <span style={{ fontSize: "16px" }}>→</span>
                    </div>
                  )}
                </button>
              ))}
            </div>

            <div style={{ marginTop: "40px", fontSize: "11px", color: C.dimmest, letterSpacing: "2px" }}>AEROCALC · POH PERFORMANCE CALCULATOR</div>
            <div style={{ marginTop: "8px", fontSize: "10px", color: C.dimmest, letterSpacing: "1px" }}>(Calc is short for calculator)</div>
          </div>
        </MobileContext.Provider>
      );
    }

    function Root() {
      const [aircraft, setAircraft] = useState(null);
      const [theme, setTheme] = useState("dark");
      const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");
      React.useEffect(() => {
        document.body.style.background = THEMES[theme].bg;
        document.body.style.color = THEMES[theme].text;
      }, [theme]);
      if (!aircraft) return <ThemeContext.Provider value={theme}><AircraftMenu onSelect={setAircraft} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
      if (aircraft === "c172s") return <ThemeContext.Provider value={theme}><C172App onBack={() => setAircraft(null)} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
      if (aircraft === "pa44")  return <ThemeContext.Provider value={theme}><SeminoleApp onBack={() => setAircraft(null)} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
      return <ThemeContext.Provider value={theme}><App onBack={() => setAircraft(null)} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);</script>
</body>
</html>
