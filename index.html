      );
    }

    // ============================================================
    // FIGURE 5-41: LANDING PERFORMANCE (50 FT BARRIER)
    // Power off, flaps 40°, 66 KIAS, full stall, max braking, paved/level/dry
    // 3-panel chain: OAT+Alt → ref1 → Weight → ref2 → Wind → dist (ft)
    // POH check: 2500ft/21°C/2240lb/5kt HW → 1290ft
    // ============================================================

    const ldPanel1 = {
      "SL":   [[0,1360],[20,1420],[50,1520]],
      "2000": [[-4,1400],[15,1460],[30,1508],[46,1570]],
      "4000": [[-7,1460],[7,1507],[25,1575],[40,1640]],
      "6000": [[-10,1520],[0,1560],[14,1620],[35,1720]],
      "7000": [[-10,1560],[10,1640],[30,1740]],
    };
    const ldPanel1Alts = [0, 2000, 4000, 6000, 7000];
    const ldPanel1Keys = ["SL","2000","4000","6000","7000"];

    const ldPanel2 = {
      1300: [[2000,1200],[2100,1200],[2150,1200],[2250,1225],[2350,1250],[2450,1275],[2550,1300]],
      1400: [[2000,1240],[2150,1280],[2240,1310],[2250,1312],[2350,1340],[2450,1370],[2550,1400]],
      1500: [[2000,1320],[2150,1369],[2250,1400],[2350,1435],[2450,1465],[2550,1500]],
      1600: [[2000,1400],[2150,1454],[2240,1483],[2250,1490],[2350,1519],[2450,1560],[2550,1600]],
      1770: [[2000,1527],[2150,1595],[2250,1640],[2350,1680],[2450,1730],[2550,1770]],
    };

    const ldPanel3 = {
      1200: [[-5,1500],[0,1200],[5,1200],[10,1200],[15,1200]],
      1300: [[-5,1600],[0,1300],[5,1200],[10,1200],[15,1200]],
      1400: [[-5,1700],[0,1400],[5,1300],[10,1200]],
      1500: [[0,1500],[5,1405],[10,1320],[15,1223]],
      1600: [[-3,1800],[0,1600],[5,1500],[10,1400],[15,1300]],
      1700: [[0,1700],[5,1600],[10,1500],[15,1400]],
      1800: [[0,1800],[5,1700],[10,1580],[15,1480]],
    };

    // ── FIG 5-43: LANDING GROUND ROLL panels ──
    // Panel 1: OAT + Alt → ref1gr (range ~570–1300)
    // ISA lines: SL ISA=15°C, 2000ft ISA=11°C, 4000ft ISA=7°C, 6000ft ISA=3°C, 7000ft ISA=1°C
    const ldGrPanel1 = {
      "SL":   [[0,863],  [22,940],  [50,1037]],
      "2000": [[-4,917], [15,980],  [46,1080]],
      "4000": [[-7,967], [17,1060], [40,1140]],
      "6000": [[-10,1035],[0,1095], [15,1140],[37,1238]],
      "7000": [[-3.5,1060],[7,1155],[17.5,1200],[36,1276]],
    };
    const ldGrPanel1Alts = [0, 2000, 4000, 6000, 7000];
    const ldGrPanel1Keys = ["SL","2000","4000","6000","7000"];

    // Panel 2: ref1gr + Weight → ref2gr
    const ldGrPanel2 = {
      860:  [[2000,670],[2150,720],[2250,760],[2350,795],[2450,825],[2550,860]],
      930:  [[2000,740],[2150,795],[2250,828],[2350,860],[2450,895],[2550,930]],
      1000: [[2000,800],[2150,855],[2250,890],[2350,920],[2450,960],[2550,1000]],
      1140: [[2000,920],[2150,980],[2250,1020],[2350,1060],[2450,1100],[2550,1140]],
      1200: [[2000,968],[2100,968],[2150,1030],[2250,1074],[2350,1116],[2450,1159],[2550,1200]],
      1290: [[2000,1035],[2150,1100],[2250,1150],[2350,1195],[2450,1240],[2550,1290]],
    };

    // Panel 3: ref2gr + Wind → ground roll distance
    // headwind positive (reduces dist), tailwind negative (increases dist)
    const ldGrPanel3 = {
      700:  [[-5,900],  [0,700],  [5,635],  [7.2,600], [10,600], [15,600]],
      800:  [[-5,1020], [0,800],  [5,730],  [10,660],  [14,600], [15,600]],
      900:  [[-5,1120], [0,900],  [5,820],  [10,750],  [15,680]],
      1000: [[-5,1240], [0,1000], [5,920],  [10,840],  [15,765]],
      1100: [[-5,1300], [-4,1300],[0,1100], [5,1020],  [10,940], [15,860]],
      1200: [[-5,1300], [-2,1300],[0,1200], [5,1110],  [10,1030],[15,943]],
      1300: [[0,1300],             [5,1210], [10,1120], [15,1030]],
    };

    function calculateLanding(altFt, oatC, weightLbs, windKt, windDir) {
      const windVal = windDir === "tail" ? -windKt : windKt; // positive = headwind reduces dist

      // Panel 1: alt+OAT → ref1
      const clampedAlt = Math.max(0, Math.min(7000, altFt));
      let loIdx = 0;
      for (let i = 0; i < ldPanel1Alts.length - 1; i++) {
        if (clampedAlt >= ldPanel1Alts[i] && clampedAlt <= ldPanel1Alts[i+1]) { loIdx = i; break; }
        if (clampedAlt >= ldPanel1Alts[ldPanel1Alts.length-1]) loIdx = ldPanel1Alts.length-2;
      }
      const altFrac = ldPanel1Alts[loIdx] === ldPanel1Alts[loIdx+1] ? 0 :
        (clampedAlt - ldPanel1Alts[loIdx]) / (ldPanel1Alts[loIdx+1] - ldPanel1Alts[loIdx]);

      function p1Interp(key) {
        const pts = ldPanel1[key];
        const clampedOAT = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], oatC));
        for (let i = 0; i < pts.length-1; i++) {
          if (clampedOAT >= pts[i][0] && clampedOAT <= pts[i+1][0]) {
            const t = (clampedOAT - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref1 = p1Interp(ldPanel1Keys[loIdx]) + altFrac *
        (p1Interp(ldPanel1Keys[loIdx+1]) - p1Interp(ldPanel1Keys[loIdx]));

      // Panel 2: ref1+weight → ref2
      const p2Keys = Object.keys(ldPanel2).map(Number).sort((a,b)=>a-b);
      let p2Lo = p2Keys[0], p2Hi = p2Keys[0];
      for (let i = 0; i < p2Keys.length-1; i++) {
        if (ref1 >= p2Keys[i] && ref1 <= p2Keys[i+1]) { p2Lo = p2Keys[i]; p2Hi = p2Keys[i+1]; break; }
      }
      if (ref1 >= p2Keys[p2Keys.length-1]) { p2Lo = p2Hi = p2Keys[p2Keys.length-1]; }
      const p2Frac = p2Lo === p2Hi ? 0 : (ref1 - p2Lo) / (p2Hi - p2Lo);

      function p2Interp(refKey) {
        const pts = ldPanel2[refKey];
        const clampedW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], weightLbs));
        for (let i = 0; i < pts.length-1; i++) {
          if (clampedW >= pts[i][0] && clampedW <= pts[i+1][0]) {
            const t = (clampedW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref2 = p2Interp(p2Lo) + p2Frac * (p2Interp(p2Hi) - p2Interp(p2Lo));

      // Panel 3: ref2+wind → landing dist
      const p3Keys = Object.keys(ldPanel3).map(Number).sort((a,b)=>a-b);
      let p3Lo = p3Keys[0], p3Hi = p3Keys[0];
      for (let i = 0; i < p3Keys.length-1; i++) {
        if (ref2 >= p3Keys[i] && ref2 <= p3Keys[i+1]) { p3Lo = p3Keys[i]; p3Hi = p3Keys[i+1]; break; }
      }
      if (ref2 >= p3Keys[p3Keys.length-1]) { p3Lo = p3Hi = p3Keys[p3Keys.length-1]; }
      const p3Frac = p3Lo === p3Hi ? 0 : (ref2 - p3Lo) / (p3Hi - p3Lo);

      function p3Interp(refKey) {
        const pts = ldPanel3[refKey];
        // wind: positive = headwind (reduces dist), negative = tailwind (increases dist)
        // pts stored as [windKt_head_positive, dist] but tailwind stored negative
        const clampedW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], windVal));
        for (let i = 0; i < pts.length-1; i++) {
          if (clampedW >= pts[i][0] && clampedW <= pts[i+1][0]) {
            const t = (clampedW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const distFt = p3Interp(p3Lo) + p3Frac * (p3Interp(p3Hi) - p3Interp(p3Lo));

      return {
        distFt: Math.round(distFt),
        ref1: Math.round(ref1),
        ref2: Math.round(ref2),
        isaDeviation: getISADeviation(altFt, oatC),
        isaTemp: getISATemp(altFt),
      };
    }

    function calculateLandingGR(altFt, oatC, weightLbs, windKt, windDir) {
      const windVal = windDir === "tail" ? -windKt : windKt;
      const clampedAlt = Math.max(0, Math.min(7000, altFt));

      // Panel 1: alt+OAT → ref1gr
      let loIdx = 0;
      for (let i = 0; i < ldGrPanel1Alts.length - 1; i++) {
        if (clampedAlt >= ldGrPanel1Alts[i] && clampedAlt <= ldGrPanel1Alts[i+1]) { loIdx = i; break; }
        if (clampedAlt >= ldGrPanel1Alts[ldGrPanel1Alts.length-1]) loIdx = ldGrPanel1Alts.length-2;
      }
      const altFrac = ldGrPanel1Alts[loIdx] === ldGrPanel1Alts[loIdx+1] ? 0 :
        (clampedAlt - ldGrPanel1Alts[loIdx]) / (ldGrPanel1Alts[loIdx+1] - ldGrPanel1Alts[loIdx]);

      function gr1Interp(key) {
        const pts = ldGrPanel1[key];
        const cOAT = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], oatC));
        for (let i = 0; i < pts.length-1; i++) {
          if (cOAT >= pts[i][0] && cOAT <= pts[i+1][0]) {
            const t = (cOAT - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref1gr = gr1Interp(ldGrPanel1Keys[loIdx]) + altFrac *
        (gr1Interp(ldGrPanel1Keys[loIdx+1]) - gr1Interp(ldGrPanel1Keys[loIdx]));

      // Panel 2: ref1gr+weight → ref2gr
      const p2Keys = Object.keys(ldGrPanel2).map(Number).sort((a,b)=>a-b);
      let p2Lo = p2Keys[0], p2Hi = p2Keys[0];
      for (let i = 0; i < p2Keys.length-1; i++) {
        if (ref1gr >= p2Keys[i] && ref1gr <= p2Keys[i+1]) { p2Lo = p2Keys[i]; p2Hi = p2Keys[i+1]; break; }
      }
      if (ref1gr >= p2Keys[p2Keys.length-1]) { p2Lo = p2Hi = p2Keys[p2Keys.length-1]; }
      const p2Frac = p2Lo === p2Hi ? 0 : (ref1gr - p2Lo) / (p2Hi - p2Lo);

      function gr2Interp(refKey) {
        const pts = ldGrPanel2[refKey];
        const cW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], weightLbs));
        for (let i = 0; i < pts.length-1; i++) {
          if (cW >= pts[i][0] && cW <= pts[i+1][0]) {
            const t = (cW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref2gr = gr2Interp(p2Lo) + p2Frac * (gr2Interp(p2Hi) - gr2Interp(p2Lo));

      // Panel 3: ref2gr+wind → ground roll
      const p3Keys = Object.keys(ldGrPanel3).map(Number).sort((a,b)=>a-b);
      let p3Lo = p3Keys[0], p3Hi = p3Keys[0];
      for (let i = 0; i < p3Keys.length-1; i++) {
        if (ref2gr >= p3Keys[i] && ref2gr <= p3Keys[i+1]) { p3Lo = p3Keys[i]; p3Hi = p3Keys[i+1]; break; }
      }
      if (ref2gr >= p3Keys[p3Keys.length-1]) { p3Lo = p3Hi = p3Keys[p3Keys.length-1]; }
      const p3Frac = p3Lo === p3Hi ? 0 : (ref2gr - p3Lo) / (p3Hi - p3Lo);

      function gr3Interp(refKey) {
        const pts = ldGrPanel3[refKey];
        const cW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], windVal));
        for (let i = 0; i < pts.length-1; i++) {
          if (cW >= pts[i][0] && cW <= pts[i+1][0]) {
            const t = (cW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      return Math.round(gr3Interp(p3Lo) + p3Frac * (gr3Interp(p3Hi) - gr3Interp(p3Lo)));
    }

    function LandingTab({ savedState, onStateChange }) {
      const C = useC();
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [runwayFull, setRunwayFull] = useState(savedState.runwayFull || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [surface, setSurface] = useState(savedState.surface || "paved");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");
      const [metarFilled, setMetarFilled] = useState([]);
      const [airportRunways, setAirportRunways] = useState([]);

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight, runway, windHeading, windSpeed, surface, result });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, surface, result]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum * 10) % 360;
        const angle = (windHdg - rwyHdg + 360) % 360;
        const rad = angle * Math.PI / 180;
        const headwind = Math.round(windSpd * Math.cos(rad) * 10) / 10;
        const crosswind = Math.round(Math.abs(windSpd * Math.sin(rad)) * 10) / 10;
        const crossDir = (angle > 0 && angle < 180) ? "R" : "L";
        return { headwind, crosswind, crossDir, angle, rwyHdg };
      }

      const windSpd = parseFloat(windSpeed) || 0;
      const rwyNum = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum) && !isNaN(windHdg) && windSpd > 0 && rwyNum >= 1 && rwyNum <= 36)
        ? getWindComponents(rwyNum, windHdg, windSpd) : null;

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 2550;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5/9;
        if (altVal > 7000) { setError("Altitude must be at or below 7,000 ft."); return; }
        const altCalc = Math.max(0, altVal);
        const altWasClamped = altVal < 0;
        if (weightVal < 2000 || weightVal > 2550) { setError("Weight must be 2,000 – 2,550 lbs."); return; }
        if (isNaN(rwyNum) || rwyNum < 1 || rwyNum > 36) { setError("Please enter a valid runway number (01–36)."); return; }
        if (isNaN(windHdg) || windHdg < 0 || windHdg > 360) { setError("Please enter a valid wind direction (0–360°)."); return; }

        const wc = windComponents || { headwind: 0, crosswind: 0, crossDir: "R", angle: 0, rwyHdg: rwyNum * 10 };
        const hwKt = wc.headwind;
        const windDir = hwKt >= 0 ? "head" : "tail";
        const windActual = Math.abs(hwKt);
        const MAX_HEAD = 15, MAX_TAIL = 5;
        const windClamped = windDir === "head" ? Math.min(windActual, MAX_HEAD) : Math.min(windActual, MAX_TAIL);
        const windWasClamped = windActual > windClamped;

        setResult({
          ...calculateLanding(altCalc, oatC, weightVal, windClamped, windDir),
          groundRollFt: calculateLandingGR(altCalc, oatC, weightVal, windClamped, windDir),
          windComponents: wc,
          windSpd,
          windActual,
          windClamped,
          windWasClamped,
          windDir,
          rwyNum,
          altWasClamped,
          altVal,
        });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, windComponents, windSpd, rwyNum, windHdg]);

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.green, marginBottom: "6px" }}>LANDING PERFORMANCE</div>
            <div style={{ fontSize: "28px", fontWeight: "bold", letterSpacing: "2px", color: C.text }}>FLAPS 40°</div>
            <div style={{ fontSize: "13px", color: C.dimmer, marginTop: "6px", letterSpacing: "1px" }}>POWER OFF · 66 KIAS · FULL STALL · MAX BRAKING · PAVED/LEVEL/DRY · FIG 5-41</div>
          </div>

          <MetarFetch onFill={({ windDir: wd, windSpeed: ws, oat: o, pressureAlt: pa, runways: rws }) => {
              const filled = [];
              if (wd !== null) { setWindHeading(String(wd)); filled.push("wind"); } else { setWindHeading(""); }
              if (ws !== null) { setWindSpeed(String(ws)); filled.push("wind"); } else { setWindSpeed(""); }
              if (o  !== null) { setOat(String(o)); setTempUnit("C"); filled.push("oat"); }
              if (pa !== null && pa !== undefined) { setAlt(String(pa)); filled.push("alt"); }
              if (rws && rws.length > 0) setAirportRunways(rws);
              setMetarFilled(filled);
            }} />

          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <AltOATRow altLabel="PRESSURE ALTITUDE" altValue={alt} onAltChange={setAlt} altHint="0 – 7,000 ft" altPlaceholder="e.g. 2500" altFilled={metarFilled.includes("alt")} oatValue={oat} onOatChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} oatFilled={metarFilled.includes("oat")} />
            <InputField label="GROSS WEIGHT" unit="LBS" value={weight} onChange={setWeight} placeholder="e.g. 2400" hint="2,000 – 2,550 lbs (leave blank for 2,550)" />
            <div>
              <div style={{ fontSize: "12px", letterSpacing: "3px", color: C.green, marginBottom: "8px", display:"flex", alignItems:"center", gap:"8px" }}>WIND{metarFilled.includes("wind") && <span style={{ fontSize:"11px", background:C.green, color:C.btnText, borderRadius:"3px", padding:"2px 6px", letterSpacing:"1px", fontWeight:"bold" }}>✓ METAR</span>}</div>
              <Grid3 style={{ marginBottom: "8px" }}>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>RUNWAY</div>
                  {airportRunways.length > 0 ? (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
                      {(() => {
                        const wHdg = parseFloat(windHeading);
                        const wSpd = parseFloat(windSpeed) || 0;
                        // Compute headwind for each runway, find best
                        const withWind = airportRunways.map(r => {
                          if (!isNaN(wHdg) && wSpd > 0) {
                            const angle = (wHdg - r.heading + 360) % 360;
                            const hw = Math.round(wSpd * Math.cos(angle * Math.PI / 180) * 10) / 10;
                            const xw = Math.abs(Math.round(wSpd * Math.sin(angle * Math.PI / 180) * 10) / 10);
                            return { num: r.num, heading: r.heading, length: r.length, hw: hw, xw: xw };
                          }
                          return { num: r.num, heading: r.heading, length: r.length, hw: null, xw: null };
                        });
                        const bestHW = withWind.reduce((best, r) => r.hw !== null && (best === null || r.hw > best.hw) ? r : best, null);
                        return withWind.map(r => {
                          const isSelected = runway === String(parseInt(r.num));
                          const isBest = bestHW && r.num === bestHW.num && r.hw !== null;
                          const bg = isSelected ? C.green : isBest ? "rgba(106,170,122,0.15)" : C.input;
                          const border = isSelected ? C.green : isBest ? C.green : C.border;
                          const color = isSelected ? C.btnText : isBest ? C.green : C.dim;
                          return (
                            <button key={r.num} onClick={() => { setRunway(String(parseInt(r.num))); setRunwayFull(r.num); }} style={{
                              padding:"8px 12px", background:bg, border:`1px solid ${border}`,
                              borderRadius:"3px", color, fontFamily:mono, fontSize:"15px", letterSpacing:"1px", cursor:"pointer",
                            }}>
                              <div>{r.num}</div>
                              {r.hw !== null && <div style={{ fontSize:"9px", letterSpacing:"0px", marginTop:"2px", color: isSelected ? "#0a0e14" : r.hw > 0 ? C.green : C.error }}>
                                {r.hw > 0 ? "+" : ""}{r.hw}kt
                              </div>}
                            </button>
                          );
                        });
                      })()}
                    </div>
                  ) : (
                    <input type="number" value={runway} onChange={e => { setRunway(e.target.value.slice(0,2)); setRunwayFull(""); }} placeholder="e.g. 28"
                      style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  )}
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>WIND DIR °</div>
                  <input type="number" value={windHeading} onChange={e => setWindHeading(e.target.value)} placeholder="e.g. 270"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>SPEED KT</div>
                  <input type="number" value={windSpeed} onChange={e => setWindSpeed(e.target.value)} placeholder="e.g. 10"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
              </Grid3>
              {windComponents && (() => {
                const hw = windComponents.headwind;
                const xw = windComponents.crosswind;
                const hwColor = hw >= 0 ? C.green : C.error;
                const hwLabel = hw >= 0 ? "HEADWIND" : "TAILWIND";
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginTop: "4px" }}>
                    <div style={{ background: C.input, border: `1px solid ${hwColor}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: hwColor, marginBottom: "3px" }}>{hwLabel}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: hwColor }}>{Math.abs(hw)} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                    </div>
                    <div style={{ background: C.input, border: `1px solid ${xw > 17 ? C.error : C.cool}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: xw > 17 ? C.error : C.cool, marginBottom: "3px" }}>CROSSWIND {windComponents.crossDir}{xw > 17 ? " ⚠" : ""}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: xw > 17 ? C.error : C.cool }}>{xw} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                      {xw > 17 && <div style={{ fontSize: "9px", color: C.error, letterSpacing: "1px", marginTop: "2px" }}>EXCEEDS 17KT DEMO LIMIT</div>}
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: "13px", color: C.dimmest, marginTop: "6px", letterSpacing: "1px" }}>Chart limit: 15kt headwind · 5kt tailwind · values beyond limit will be clamped</div>
            </div>
          </div>

          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && <LandingViz result={result} airportRunways={airportRunways} runway={runway} runwayFull={runwayFull} />}
        </Card>
      );
    }

    function LandingViz({ result, airportRunways, runway, runwayFull }) {
      const C = useC();
      const dist50 = result.distFt;
      const distGr = result.groundRollFt;
      const wc = result.windComponents;
      const markerColor50 = C.warm;
      const markerColorRoll = C.green;
      const centerlineColor = C.rwyStripe;

      const animRef = useRef(null);
      const [t, setT] = useState(0);
      const [done, setDone] = useState(false);

      useEffect(() => {
        setT(0); setDone(false);
        let start = null;
        const duration = 3000;
        function step(ts) {
          if (!start) start = ts;
          const raw = Math.min((ts - start) / duration, 1);
          const eased = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
          setT(eased);
          if (raw < 1) animRef.current = requestAnimationFrame(step);
          else setDone(true);
        }
        animRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(animRef.current);
      }, [result]);

      // Layout — plane comes from left, obstacle near left, runway spans to right
      const yRwy    = 95;
      const xObs    = 95;   // 50ft obstacle
      const xTd     = 185;  // touchdown point
      const xStop   = 405;  // end of rollout

      // Obstacle pole top is at y=52. Approach path must pass at y≤30 at xObs.
      // Start high-left, arc gently downward, clear obstacle with margin, flare to touchdown
      const xStart  = 8;
      const yStart  = 14;
      const cp1X = xObs - 40;
      const cp1Y = 12;      // path stays near y=12-18 as it passes xObs → well above pole top at y=52
      const cp2X = xTd - 30;
      const cp2Y = yRwy - 20;

      // Phase fractions
      const approachFrac = 0.50;

      let px, py, angle;
      if (t <= approachFrac) {
        const tc = t / approachFrac;
        const inv = 1 - tc;
        px = inv*inv*inv*xStart + 3*inv*inv*tc*cp1X + 3*inv*tc*tc*cp2X + tc*tc*tc*xTd;
        py = inv*inv*inv*yStart + 3*inv*inv*tc*cp1Y + 3*inv*tc*tc*cp2Y + tc*tc*tc*yRwy;
        const dx = 3*inv*inv*(cp1X-xStart) + 6*inv*tc*(cp2X-cp1X) + 3*tc*tc*(xTd-cp2X);
        const dy = 3*inv*inv*(cp1Y-yStart) + 6*inv*tc*(cp2Y-cp1Y) + 3*tc*tc*(yRwy-cp2Y);
        // Compute path angle but clamp to gentle descent — max ~6° nose-down, always slight nose-up feel
        const rawAngle = Math.atan2(dy, dx) * 180 / Math.PI; // positive = nose down in svg coords
        angle = Math.max(-3, Math.min(6, rawAngle)) - 3; // clamp, offset -3 for slight nose-up AOA
      } else {
        const tg = (t - approachFrac) / (1 - approachFrac);
        px = xTd + (xStop - xTd) * tg;
        py = yRwy;
        angle = -2; // slight nose-up on rollout
      }

      const showGear = py >= yRwy - 10;

      // PA-28 Archer — proper low-wing tricycle, nose right
      // Distinctive features: long cowl, short cabin, low straight wing with strut, swept fin
      // PA-28 Archer III — real SVG silhouette paths from b3mt501.svg
      // Original SVG: 600x241, transform="translate(0,241) scale(0.1,-0.1)"
      // We re-center at origin and scale to fit ~80px wide in our animation space
      function ArcherPlane({ x, y, ang, color }) {
        // Combined transform:
        //   1. Original path->svg: translate(0,241) scale(0.1,-0.1)  [baked into path coords]
        //   2. Re-center at plane centroid (svg ~290,110): translate(-290,-110)
        //   3. Scale to animation size (540svg -> 80px): scale(0.148)
        // Net single transform applied to raw-path <g>: translate(-290,-110) scale(0.1,-0.1) then outer scale(0.148)
        // Simplified: one <g transform="scale(0.148) translate(-290,-110)"> wrapping a <g transform="translate(0,241) scale(0.1,-0.1)">
        return (
          <g transform={`translate(${x},${y}) rotate(${-ang}) scale(-0.11, 0.11)`}>
            <g transform="translate(-290,-110)">
              <g transform="translate(0,241) scale(0.1,-0.1)" fill={color} stroke="none">
                <path d="M5515 2261 c-146 -7 -165 -14 -214 -81 -30 -42 -53 -70 -158 -195 -38 -45 -86 -103 -108 -130 -173 -211 -239 -278 -320 -324 -95 -55 -136 -61 -397 -61 -132 0 -238 4 -238 9 0 12 85 128 122 168 17 17 28 37 26 43 -2 7 -46 -40 -98 -104 l-95 -117 -116 5 c-64 4 -181 15 -260 27 -79 11 -163 23 -186 26 -39 5 -55 16 -35 25 14 5 152 184 152 197 0 6 -7 11 -16 11 -16 0 -58 -35 -194 -159 -32 -29 -65 -51 -78 -51 -12 0 -68 7 -123 15 -56 9 -262 36 -458 61 -543 70 -832 72 -1011 7 -76 -28 -405 -202 -484 -256 -23 -16 -54 -22 -160 -28 -261 -15 -605 -60 -735 -96 -21 -5 -23 -4 -15 13 13 26 10 214 -6 437 -11 162 -15 187 -29 185 -11 -2 -17 -16 -18 -48 -2 -25 -10 -130 -19 -234 -8 -104 -14 -232 -13 -284 l2 -94 -56 -22 c-63 -26 -138 -69 -161 -92 -23 -22 -20 -59 7 -76 31 -20 125 -56 169 -65 l37 -8 5 -160 c3 -88 10 -198 16 -245 5 -47 10 -114 10 -150 0 -77 8 -110 25 -110 13 0 19 43 30 220 22 321 22 335 9 380 -14 47 -9 67 9 35 18 -34 90 -100 138 -129 38 -21 48 -34 53 -61 4 -19 11 -35 16 -35 6 0 10 -27 10 -60 0 -64 8 -73 33 -38 l16 23 0 -22 c1 -29 8 -29 32 -1 10 13 18 39 19 61 0 42 21 51 37 14 11 -24 53 -42 125 -52 34 -4 45 -10 42 -20 -3 -7 -1 -16 4 -19 9 -5 -8 -102 -23 -125 -3 -6 -17 -11 -30 -11 -36 0 -155 -66 -203 -113 -50 -49 -54 -81 -15 -129 32 -39 44 -48 54 -42 4 2 14 -7 23 -21 9 -13 36 -36 61 -51 36 -21 54 -25 86 -21 56 7 110 38 137 77 12 19 29 35 36 36 8 1 66 19 131 40 100 33 121 44 145 74 45 58 82 132 71 143 -6 6 -62 3 -159 -8 -147 -17 -235 -15 -248 6 -3 6 6 24 21 39 30 31 30 24 -1 130 -4 14 -4 22 0 19 3 -3 35 0 71 6 52 10 127 10 363 0 163 -8 442 -17 618 -21 l321 -7 2 -57 1 -57 -42 -7 c-137 -22 -257 -134 -219 -204 15 -27 57 -50 110 -58 26 -4 41 -12 41 -21 0 -23 71 -82 108 -89 32 -6 32 -7 32 -65 l0 -59 35 0 35 0 0 65 c0 50 3 65 15 65 22 0 86 61 101 96 12 27 24 35 81 54 130 42 149 51 166 80 20 32 22 66 6 76 -6 4 -61 19 -123 34 -100 24 -111 29 -108 48 2 11 -4 34 -12 51 -30 56 -27 58 97 60 63 1 135 -3 162 -9 38 -9 50 -8 59 3 8 10 56 18 164 27 85 6 156 9 159 6 8 -8 -28 -47 -38 -41 -11 8 -23 -15 -12 -26 4 -4 26 -6 47 -2 30 5 44 15 65 44 20 30 33 38 56 39 17 0 47 4 68 9 l37 9 0 -344 c0 -296 2 -344 15 -344 12 0 15 22 18 113 l3 112 2 -112 c2 -93 5 -113 17 -113 13 0 15 45 15 345 l0 344 33 5 c17 3 212 26 432 51 220 25 436 50 480 55 113 14 307 37 465 55 130 15 176 20 231 30 16 2 41 -5 65 -20 61 -38 108 -30 85 14 -10 17 -5 20 57 30 123 21 190 54 214 106 10 21 18 23 149 30 104 5 139 10 139 20 0 13 -12 16 -201 46 l-77 13 -12 51 c-13 56 -19 30 117 490 20 66 48 163 64 215 15 52 42 142 59 200 42 141 50 172 44 182 -6 9 -98 8 -309 -1z"/>
                <path d="M3165 1457 c-22 -4 -51 -6 -65 -3 -14 2 -32 1 -40 -4 -8 -4 -38 -10 -67 -13 -29 -3 -57 -8 -62 -12 -6 -3 -20 -1 -32 6 -15 8 -19 8 -15 0 7 -11 -8 -13 -126 -16 -21 -1 -41 -5 -45 -8 -3 -4 -17 -7 -29 -7 -13 0 -25 -3 -28 -8 -4 -8 33 -7 94 3 29 4 105 12 281 30 97 10 209 29 209 36 0 9 -20 8 -75 -4z"/>
              </g>
            </g>
          </g>
        );
      }
      return (
        <div style={{ marginTop: "28px" }}>
          <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />

          {result.windWasClamped && (
            <div style={{ background: C.errorBg, border: `1px solid ${C.warm}`, borderRadius: "3px", padding: "10px 14px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{ color: C.warm, fontSize: "16px" }}>⚠</div>
              <div>
                <div style={{ fontSize: "12px", letterSpacing: "2px", color: C.warm, marginBottom: "2px" }}>WIND COMPONENT EXCEEDS CHART LIMIT</div>
                <div style={{ fontSize: "12px", color: C.note, letterSpacing: "1px" }}>
                  Actual {result.windDir === "head" ? "headwind" : "tailwind"}: <strong style={{color: C.text}}>{result.windActual} kt</strong>
                  {" · "}Chart limit: <strong style={{color: C.text}}>{result.windDir === "head" ? "15" : "5"} kt</strong>
                  {" · "}Calculated using <strong style={{color: C.warm}}>{result.windClamped} kt</strong>
                </div>
              </div>
            </div>
          )}
          {result.altWasClamped && (
            <div style={{ background: C.errorBg, border: `1px solid ${C.warm}`, borderRadius: "3px", padding: "10px 14px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{ color: C.warm, fontSize: "16px" }}>!</div>
              <div>
                <div style={{ fontSize: "12px", letterSpacing: "2px", color: C.warm, marginBottom: "2px" }}>PRESSURE ALT BELOW SEA LEVEL</div>
                <div style={{ fontSize: "12px", color: C.note, letterSpacing: "1px" }}>
                  Entered: <strong style={{color: C.text}}>{result.altVal} ft</strong>
                  {" · "}Calculated using <strong style={{color: C.warm}}>0 ft (SL)</strong>
                </div>
              </div>
            </div>
          )}



          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: "4px", padding: "14px 14px 10px", marginBottom: "14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
              <div style={{ fontSize: "15px", letterSpacing: "3px", color: C.green }}>FLAPS 40° LANDING</div>
              <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.dimmer }}>POWER OFF · MAX BRAKING · PAVED/LEVEL/DRY</div>
            </div>
            <svg viewBox="0 0 460 165" style={{ width: "100%", display: "block" }}>
              {/* Sky background */}
              <rect x="0" y="0" width="460" height="165" fill={C.card} />
              <defs>
                <linearGradient id="rwyGradLd" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stopColor={C.rwyAsphalt} />
                  <stop offset="100%" stopColor={C.rwyBg} />
                </linearGradient>
              </defs>


              {/* Runway */}
              <rect x="18" y="84" width="424" height="30" rx="2" fill="url(#rwyGradLd)" stroke={C.rwyAsphalt} strokeWidth="1" />

              {/* Threshold bars on LEFT (approach end) */}
              {[0,1,2,3].map(i => (
                <rect key={i} x={22 + i*6} y="88" width="3" height="22" rx="1" fill={C.rwyAsphalt} />
              ))}

              {/* Runway number near threshold */}
              {result.windComponents && result.rwyNum && (
                <text x="44" y="102" textAnchor="middle" fill={C.rwyText} fontSize="11" fontFamily="Courier New" fontWeight="bold" letterSpacing="1">{String(result.rwyNum).padStart(2,'0')}</text>
              )}

              {/* Centerline dashes */}
              {Array.from({length: 18}).map((_, i) => (
                <rect key={i} x={55 + i*22} y="98" width="12" height="2" rx="1" fill={centerlineColor} />
              ))}

              {/* Approach path arc */}
              <path
                d={`M ${xStart} ${yStart} C ${cp1X} ${cp1Y} ${cp2X} ${cp2Y} ${xTd} ${yRwy}`}
                fill="none" stroke={markerColor50} strokeWidth="1.5"
                strokeDasharray="5,3" opacity={done ? 0.45 : 0.12}
              />

              {/* 50ft obstacle pole + flag — pole top at y=56, well below approach path */}
              <line x1={xObs} y1="56" x2={xObs} y2="116" stroke={markerColor50} strokeWidth="2" />
              <rect x={xObs + 2} y="56" width="17" height="11" rx="1.5" fill={markerColor50} />
              <text x={xObs + 10.5} y="65" textAnchor="middle" fill={C.btnText} fontSize="11" fontFamily="Courier New" fontWeight="bold">50</text>

              {/* Touchdown marker */}
              <line x1={xTd} y1="84" x2={xTd} y2="116" stroke={markerColorRoll} strokeWidth="1.5" strokeDasharray="3,2" />
              <circle cx={xTd} cy={yRwy} r="2.5" fill={markerColorRoll} />

              {/* Stop marker */}
              <line x1={xStop} y1="84" x2={xStop} y2="114" stroke={markerColor50} strokeWidth="1.5" strokeDasharray="3,2" />
              <circle cx={xStop} cy={yRwy} r="2.5" fill={markerColor50} />

              {/* Ground roll span line + label box ABOVE runway */}
              {(() => {
                const label = `${distGr} FT · GROUND ROLL`;
                const textW = label.length * 6.6;
                const padX = 7;
                const boxW = textW + padX * 2;
                const cx = (xTd + xStop) / 2;
                return (
                  <>
                    <line x1={xTd} y1="75" x2={xStop} y2="75" stroke={markerColorRoll} strokeWidth="1" opacity="0.7" />
                    <line x1={xTd} y1="72" x2={xTd} y2="78" stroke={markerColorRoll} strokeWidth="1" />
                    <line x1={xStop} y1="72" x2={xStop} y2="78" stroke={markerColorRoll} strokeWidth="1" />
                    <rect x={cx - boxW/2} y="61" width={boxW} height="15" rx="2" fill={C.markerBg} stroke={markerColorRoll} strokeWidth="0.8" />
                    <text x={cx} y="72" textAnchor="middle" fill={markerColorRoll} fontSize="11" fontFamily="Courier New">{label}</text>
                  </>
                );
              })()}

              {/* Distance span line + auto-sized label box below runway */}
              {(() => {
                const label = `${dist50} FT · OVER 50 FT`;
                // Courier New 11px: ~6.6px per char is a reliable estimate
                const textW = label.length * 6.6;
                const padX = 7;
                const boxW = textW + padX * 2;
                const cx = (xObs + xStop) / 2;
                return (
                  <>
                    <line x1={xObs} y1="122" x2={xStop} y2="122" stroke={markerColor50} strokeWidth="1" opacity="0.7" />
                    <line x1={xObs} y1="119" x2={xObs} y2="125" stroke={markerColor50} strokeWidth="1" />
                    <line x1={xStop} y1="119" x2={xStop} y2="125" stroke={markerColor50} strokeWidth="1" />
                    <rect x={cx - boxW/2} y="127" width={boxW} height="15" rx="2" fill={C.markerBg} stroke={markerColor50} strokeWidth="0.8" />
                    <text x={cx} y="138" textAnchor="middle" fill={markerColor50} fontSize="11" fontFamily="Courier New">{label}</text>
                  </>
                );
              })()}

              {/* Wind arrow */}
              {wc && (() => {
                // Arrow points toward wind source. SVG: 0°=right, 90°=down, 180°=left, 270°=up
                // wc.angle: 0=headwind→left(180°), 90=XW-right→up(270°), 180=tailwind→right(0°), 270=XW-left→down(90°)
                // Mapping: svgDeg = (180 + wc.angle + 90) % 360 ... test:
                // 0→(270)%360=270 ✗ need 180. Try: svgDeg = (180 - wc.angle + 360) % 360
                // 0→180 ✓, 90→90 ✗(need 270), 180→0 ✓, 270→270 ✗(need 90)
                // Need: 0→180, 90→270, 180→0(=360), 270→90 → svgDeg = (180 + wc.angle) % 360... 
                // 0→180✓, 90→270✓, 180→0✓, 270→90✓
                const svgDeg = (180 + wc.angle) % 360;
                const rad = svgDeg * Math.PI / 180;
                const cx = 420, cy = 35;
                const len = 28;
                const dx = Math.cos(rad) * len;
                const dy = Math.sin(rad) * len;
                const x1 = cx - dx * 0.5, y1 = cy - dy * 0.5;
                const x2 = cx + dx * 0.5, y2 = cy + dy * 0.5;
                const headLen = 7, headAngle = 0.4;
                const hx1 = x2 - headLen * Math.cos(rad - headAngle);
                const hy1 = y2 - headLen * Math.sin(rad - headAngle);
                const hx2 = x2 - headLen * Math.cos(rad + headAngle);
                const hy2 = y2 - headLen * Math.sin(rad + headAngle);
                return (
                  <g opacity="0.9">
                    <circle cx={cx} cy={cy} r="22" fill={C.markerBg} stroke={C.border} strokeWidth="1" />
                    {[0,45,90,135,180,225,270,315].map(a => {
                      const r2 = (a - 90) * Math.PI / 180;
                      return <line key={a} x1={cx + Math.cos(r2)*16} y1={cy + Math.sin(r2)*16} x2={cx + Math.cos(r2)*20} y2={cy + Math.sin(r2)*20} stroke={C.borderDim} strokeWidth="1" />;
                    })}
                    <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={C.cool} strokeWidth="2" />
                    <polygon points={`${x2},${y2} ${hx1},${hy1} ${hx2},${hy2}`} fill={C.cool} />
                    <text x={cx} y={cy - 27} textAnchor="middle" fill={C.dimmest} fontSize="8" fontFamily="Courier New" letterSpacing="1">WIND / RWY</text>
                    <text x={cx} y={cy + 33} textAnchor="middle" fill={C.cool} fontSize="9" fontFamily="Courier New">{result.windSpd}KT/{wc.angle === 0 ? 'HW' : wc.angle === 180 ? 'TW' : `XW-${wc.crossDir}`}</text>
                  </g>
                );
              })()}

              {/* Animated Archer */}
              <ArcherPlane x={px} y={py} ang={angle} color={markerColorRoll} />

            </svg>
          </div>

          {/* Result cards */}
          <Grid2 style={{ marginBottom: "12px" }}>
            <div style={{ background: C.input, border: `1px solid ${markerColorRoll}`, borderRadius: "3px", padding: "16px", textAlign: "center" }}>
              <div style={{ fontSize: "15px", letterSpacing: "2px", color: markerColorRoll, marginBottom: "8px" }}>GROUND ROLL</div>
              <div style={{ fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" }}>{distGr}</div>
              <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "3px" }}>FEET · FIG 5-43</div>
            </div>
            <div style={{ background: C.input, border: `1px solid ${markerColor50}`, borderRadius: "3px", padding: "16px", textAlign: "center" }}>
              <div style={{ fontSize: "15px", letterSpacing: "2px", color: markerColor50, marginBottom: "8px" }}>OVER 50 FT</div>
              <div style={{ fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" }}>{dist50}</div>
              <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "3px" }}>FEET · FIG 5-41</div>
            </div>
          </Grid2>

          {/* 1.5x safety buffer */}
          <Grid2 style={{ marginBottom: "12px" }}>
            {[{val: Math.round(distGr * 1.5), label: "GROUND ROLL x1.5", color: markerColorRoll},
              {val: Math.round(dist50 * 1.5), label: "OVER 50 FT ×1.5",  color: markerColor50}].map(({val, label, color}) => (
              <div key={label} style={{ background: C.input, border: `1px solid ${color}55`, borderRadius: "3px", padding: "12px 16px", textAlign: "center" }}>
                <div style={{ fontSize: "12px", letterSpacing: "2px", color: `${color}99`, marginBottom: "6px" }}>{label}</div>
                <div style={{ fontSize: "32px", color: `${color}cc`, lineHeight: 1, fontWeight: "bold" }}>{val}</div>
                <div style={{ fontSize: "11px", color: C.dimmest, marginTop: "5px", letterSpacing: "2px" }}>FEET</div>
              </div>
            ))}
          </Grid2>

          

          

          {(function() {
            if (!airportRunways || !runway) return null;
            var rwy = null;
            for (var i = 0; i < airportRunways.length; i++) {
              var matchFull = typeof runwayFull === "string" && runwayFull.length > 0;
              if (matchFull ? airportRunways[i].num === runwayFull : String(parseInt(airportRunways[i].num)) === String(runway)) { rwy = airportRunways[i]; break; }
            }
            if (!rwy || !rwy.length) return null;
            var len = rwy.length;
            var gr = result.groundRollFt || 0;
            var d50 = result.dist50Ft || result.distFt || 0;
            var gr15 = Math.round(gr * 1.5);
            var gr15ok = gr === 0 || gr15 <= len;
            var d50ok = d50 === 0 || d50 <= len;
            var ok = gr15ok && d50ok;
            var col = ok ? C.green : C.error;
            return (
              <div style={{ marginBottom: "12px", background: ok ? C.input : C.errorBg, border: "2px solid " + col, borderRadius: "4px", overflow: "hidden" }}>
                <div style={{ padding: "12px 16px", borderBottom: "1px solid " + col + "44", display: "flex", alignItems: "center", justifyContent: "center", gap: "10px" }}>
                  <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: col, flexShrink: 0 }} />
                  <div style={{ fontSize: "18px", letterSpacing: "3px", color: col, fontWeight: "bold" }}>
                    {ok ? "RUNWAY LENGTH OK" : "RUNWAY LENGTH CHECK"}
                  </div>
                  <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: col, flexShrink: 0 }} />
                </div>
                <div style={{ display: "flex", borderBottom: "1px solid " + col + "22" }}>
                  <div style={{ flex: 1, padding: "14px 10px", textAlign: "center", borderRight: "1px solid " + col + "22" }}>
                    <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.dim, marginBottom: "4px" }}>RWY {rwy.num} AVAILABLE</div>
                    <div style={{ fontSize: "28px", fontWeight: "bold", color: C.text, lineHeight: 1 }}>{len.toLocaleString()}</div>
                    <div style={{ fontSize: "11px", color: C.dim, marginTop: "3px", letterSpacing: "1px" }}>FT</div>
                  </div>
                  {gr > 0 && <div style={{ flex: 1, padding: "14px 10px", textAlign: "center", borderRight: d50 > 0 ? "1px solid " + col + "22" : "none" }}>
                    <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.dim, marginBottom: "4px" }}>GND ROLL x1.5</div>
                    <div style={{ fontSize: "28px", fontWeight: "bold", color: gr15ok ? C.text : C.error, lineHeight: 1 }}>{gr15.toLocaleString()}</div>
                    <div style={{ fontSize: "13px", fontWeight: "bold", color: gr15ok ? C.warm : C.error, marginTop: "3px" }}>{Math.round(gr15/len*100)}% of runway</div>
                  </div>}
                  {d50 > 0 && <div style={{ flex: 1, padding: "14px 10px", textAlign: "center" }}>
                    <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.dim, marginBottom: "4px" }}>50FT DISTANCE</div>
                    <div style={{ fontSize: "28px", fontWeight: "bold", color: d50ok ? C.text : C.error, lineHeight: 1 }}>{d50.toLocaleString()}</div>
                    <div style={{ fontSize: "13px", fontWeight: "bold", color: d50ok ? C.warm : C.error, marginTop: "3px" }}>{Math.round(d50/len*100)}% of runway</div>
                  </div>}
                </div>
                <div style={{ padding: "8px 14px", display: "flex", alignItems: "center", gap: "8px", background: C.warm + "18", borderTop: "1px solid " + C.warm }}>
                  <span style={{ fontSize: "10px", letterSpacing: "2px", color: C.warm, fontWeight: "bold", flexShrink: 0 }}>ADVISORY ONLY</span>
                  <span style={{ fontSize: "10px", color: C.text }}>Runway lengths from OurAirports data. Always verify with AFD and NOTAMs before flight.</span>
                </div>
              </div>
            );
          })()}

          <NoteBox text="Power off, flaps 40°, 66 KIAS, full stall touchdown, maximum braking, paved/level/dry. Always verify against official POH charts." />
        </div>
      );
    }

    // ============================================================
    // FIGURE 5-39: GLIDE RANGE
    // Power off, flaps up, 76 KIAS, 2250 lb, no wind
    // Linear: 0 nm @ 0 ft → 19 nm @ 10,000 ft = 1.9 nm per 1,000 ft
    // POH check: (6000-2600) × 1.9/1000 = 6.46 nm ≈ 6.4 nm ✓
    // ============================================================
    const GLIDE_NM_PER_FT = 19 / 10000;

    function GlideTab({ savedState, onStateChange }) {
      const C = useC();
      const [cruiseAlt, setCruiseAlt] = useState(savedState.cruiseAlt || "");
      const [terrainAlt, setTerrainAlt] = useState(savedState.terrainAlt || "");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ cruiseAlt, terrainAlt, result });
      }, [cruiseAlt, terrainAlt, result]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const cruise = parseFloat(cruiseAlt);
        const terrain = parseFloat(terrainAlt) || 0;
        if (isNaN(cruise)) { setError("Please enter a cruise altitude."); return; }
        if (cruise < 0 || cruise > 10000) { setError("Cruise altitude must be 0 – 10,000 ft."); return; }
        if (terrain < 0 || terrain >= cruise) { setError("Terrain altitude must be less than cruise altitude."); return; }
        const rangeFromCruise = cruise * GLIDE_NM_PER_FT;
        const rangeFromTerrain = terrain * GLIDE_NM_PER_FT;
        const netRange = rangeFromCruise - rangeFromTerrain;
        setResult({ cruise, terrain, rangeFromCruise, rangeFromTerrain, netRange });
      }, [cruiseAlt, terrainAlt]);

      // Glide ratio visual bar
      const maxAlt = 10000;
      const cruiseVal = parseFloat(cruiseAlt) || 0;
      const terrainVal = parseFloat(terrainAlt) || 0;

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.green, marginBottom: "6px" }}>GLIDE RANGE</div>
            <div style={{ fontSize: "28px", fontWeight: "bold", letterSpacing: "2px", color: C.text }}>POWER OFF</div>
            <div style={{ fontSize: "13px", color: C.dimmer, marginTop: "6px", letterSpacing: "1px" }}>FLAPS UP · 76 KIAS · 2,250 LB · NO WIND · FIG 5-39</div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <InputField label="CRUISE ALTITUDE" unit="FT" value={cruiseAlt} onChange={setCruiseAlt} placeholder="e.g. 6000" hint="Pressure altitude, 0 – 10,000 ft" />
            <InputField label="TERRAIN / OBSTACLE ALTITUDE" unit="FT" value={terrainAlt} onChange={setTerrainAlt} placeholder="e.g. 0" hint="Pressure altitude of destination or obstacle (leave blank for sea level)" />
          </div>

          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />

          {result && (() => {
            const agl = result.cruise - result.terrain;
            const pctCruise = Math.min(result.cruise / maxAlt, 1);
            const pctTerrain = Math.min(result.terrain / maxAlt, 1);

            return (
              <div style={{ marginTop: "28px" }}>
                {/* Main result cards */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "16px" }}>
                  <div style={{ background: C.input, border: `1px solid ${C.green}`, borderRadius: "3px", padding: "18px 12px", textAlign: "center" }}>
                    <div style={{ fontSize: "12px", letterSpacing: "2px", color: C.green, marginBottom: "8px" }}>GLIDE RANGE</div>
                    <div style={{ fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" }}>{result.netRange.toFixed(1)}</div>
                    <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "2px" }}>NAUTICAL MILES</div>
                  </div>
                  <div style={{ background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "18px 12px", textAlign: "center" }}>
                    <div style={{ fontSize: "12px", letterSpacing: "2px", color: C.green, marginBottom: "8px" }}>HEIGHT AGL</div>
                    <div style={{ fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" }}>{agl.toLocaleString()}</div>
                    <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "2px" }}>FEET</div>
                  </div>
                </div>

                {/* Altitude profile bar */}
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: "4px", padding: "16px", marginBottom: "14px" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "3px", color: C.green, marginBottom: "12px" }}>ALTITUDE PROFILE</div>
                  <div style={{ position: "relative", height: "120px", display: "flex", alignItems: "flex-end", gap: "24px", padding: "0 8px" }}>
                    {/* Cruise altitude bar */}
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
                      <div style={{ fontSize: "12px", color: C.green, marginBottom: "4px", letterSpacing: "1px" }}>{result.cruise.toLocaleString()} ft</div>
                      <div style={{ width: "100%", background: `rgba(106,170,122,0.25)`, border: `1px solid ${C.green}`, borderRadius: "2px 2px 0 0", height: `${pctCruise * 100}%`, minHeight: "4px", position: "relative" }}>
                        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: `${pctTerrain / pctCruise * 100}%`, background: "rgba(106,170,122,0.15)", borderTop: `1px dashed ${C.dimmer}` }} />
                      </div>
                      <div style={{ fontSize: "11px", color: C.dimmer, marginTop: "4px", letterSpacing: "1px" }}>CRUISE</div>
                    </div>
                    {/* Glide arrow area */}
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", paddingBottom: "20px" }}>
                      <div style={{ fontSize: "28px", color: C.green, lineHeight: 1 }}>→</div>
                      <div style={{ fontSize: "12px", color: C.green, letterSpacing: "1px", marginTop: "4px" }}>{result.netRange.toFixed(1)} nm</div>
                    </div>
                    {/* Terrain altitude bar */}
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
                      <div style={{ fontSize: "12px", color: C.dim, marginBottom: "4px", letterSpacing: "1px" }}>{result.terrain.toLocaleString()} ft</div>
                      <div style={{ width: "100%", background: `rgba(154,176,168,0.15)`, border: `1px solid ${C.dim}`, borderRadius: "2px 2px 0 0", height: `${Math.max(pctTerrain * 100, 2)}%`, minHeight: "4px" }} />
                      <div style={{ fontSize: "11px", color: C.dimmer, marginTop: "4px", letterSpacing: "1px" }}>TERRAIN</div>
                    </div>
                  </div>
                </div>

                <NoteBox text="Power off, flaps up, 76 KIAS, 2,250 lb gross weight, no wind, ISA conditions. Subtract terrain altitude from cruise altitude glide distances to get net range. Always verify against official POH charts." />
              </div>
            );
          })()}
        </Card>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function useIsMobile() {
      const [mobile, setMobile] = React.useState(window.innerWidth < 520);
      React.useEffect(() => {
        const handler = () => setMobile(window.innerWidth < 520);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return mobile;
    }

    function ArcherSpeedsTab({ savedState, onStateChange }) {
      const C = useC();
      const mono = "'Courier New', monospace";
      const [weight, setWeight] = React.useState(savedState.weight || "");
      const [flaps, setFlaps] = React.useState(savedState.flaps || "0");
      const [bank, setBank] = React.useState(savedState.bank !== undefined ? savedState.bank : 0);

      React.useEffect(() => {
        onStateChange({ weight, flaps, bank });
      }, [weight, flaps, bank]);

      const weightVal = parseFloat(weight);
      const validWeight = !isNaN(weightVal) && weightVal >= 2000 && weightVal <= 2550;

      // Va: 113 KIAS at 2550 lb, scales with sqrt(W/2550)
      const va = validWeight ? Math.round(113 * Math.sqrt(weightVal / 2550)) : null;

      // Stall: Vs = Vs_base * (W/2550)^0.45 * sqrt(1/cos(bank_rad))
      // Fig 5-5, power off, A/C off
      const vsBase = { "0": 50, "25": 49, "40": 45 };
      const bankRad = bank * Math.PI / 180;
      const vs = validWeight
        ? Math.round(vsBase[flaps] * Math.pow(weightVal / 2550, 0.45) * Math.sqrt(1 / Math.cos(bankRad)))
        : null;

      const bankColor = bank <= 30 ? C.green : bank <= 45 ? C.warm : C.error;
      const flapsOptions = [
        { val: "0",  label: "FLAPS 0°"  },
        { val: "25", label: "FLAPS 25°" },
        { val: "40", label: "FLAPS 40°" },
      ];

      return (
        <Card>
          <div style={{ fontSize: "18px", letterSpacing: "4px", color: C.green, marginBottom: "24px" }}>SPEEDS REFERENCE</div>

          {/* shared weight input */}
          <div style={{ marginBottom: "20px" }}>
            <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>GROSS WEIGHT</div>
            <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
              <input
                type="number"
                value={weight}
                onChange={e => setWeight(e.target.value)}
                placeholder="e.g. 2400"
                style={{ flex: 1, boxSizing: "border-box", background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }}
              />
              <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim }}>LBS</div>
            </div>
            {weightVal < 2000 && weight !== "" && <div style={{ fontSize: "11px", color: C.error, marginTop: "4px", letterSpacing: "1px" }}>Minimum chart weight is 2,000 lb</div>}
          </div>

          {/* ── MANEUVERING SPEED ── */}
          <div style={{ fontSize: "13px", letterSpacing: "3px", color: C.green, marginBottom: "12px", borderBottom: "1px solid " + C.border, paddingBottom: "8px" }}>MANEUVERING SPEED (Va)</div>
          {va !== null ? (
            <div style={{ background: C.input, border: "2px solid " + C.cool, borderRadius: "4px", padding: "20px", textAlign: "center", marginBottom: "20px" }}>
              <div style={{ fontSize: "11px", letterSpacing: "3px", color: C.cool, marginBottom: "6px" }}>Va AT {Math.round(weightVal).toLocaleString()} LB</div>
              <div style={{ fontSize: "64px", fontWeight: "bold", color: C.text, lineHeight: 1 }}>{va}</div>
              <div style={{ fontSize: "16px", letterSpacing: "4px", color: C.dim, marginTop: "6px" }}>KIAS</div>
              <div style={{ fontSize: "11px", color: C.dim, marginTop: "8px" }}>Do not make full or abrupt control inputs above this speed</div>
            </div>
          ) : (
            <div style={{ background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "16px", textAlign: "center", color: C.dim, fontSize: "12px", letterSpacing: "1px", marginBottom: "20px" }}>
              Enter gross weight (2,000–2,550 lb) to calculate
            </div>
          )}

          {/* ── STALL SPEED ── */}
          <div style={{ fontSize: "13px", letterSpacing: "3px", color: C.green, marginBottom: "12px", borderBottom: "1px solid " + C.border, paddingBottom: "8px" }}>STALL SPEED (Vs) · FIG 5-5</div>
          <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "1px", marginBottom: "14px" }}>Power off · A/C off · KIAS</div>

          <div style={{ marginBottom: "14px" }}>
            <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>FLAP SETTING</div>
            <div style={{ display: "flex", gap: "8px" }}>
              {flapsOptions.map(opt => (
                <button key={opt.val} onClick={() => setFlaps(opt.val)} style={{
                  flex: 1, padding: "10px", background: flaps === opt.val ? C.green : C.input,
                  border: "1px solid " + (flaps === opt.val ? C.green : C.border),
                  borderRadius: "3px", color: flaps === opt.val ? C.btnText : C.dim,
                  fontFamily: mono, fontSize: "12px", letterSpacing: "1px", cursor: "pointer",
                }}>{opt.label}</button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: "16px" }}>
            <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>ANGLE OF BANK</div>
            <input
              type="range"
              min="0" max="60" step="1"
              value={bank}
              onChange={e => setBank(parseInt(e.target.value))}
              style={{ width: "100%", accentColor: C.green, marginBottom: "4px" }}
            />
            <div style={{ position: "relative", height: "16px" }}>
              {[0, 15, 30, 45, 60].map(v => (
                <span key={v} style={{
                  position: "absolute",
                  left: "calc(" + (v/60*100) + "% - " + (v === 0 ? "0px" : v === 60 ? "16px" : "8px") + ")",
                  fontSize: "11px", color: bank === v ? bankColor : C.dim, letterSpacing: "1px",
                }}>{v}°</span>
              ))}
            </div>
            <div style={{ textAlign: "center", fontSize: "22px", fontWeight: "bold", color: bankColor, marginTop: "4px", letterSpacing: "2px" }}>{bank}°</div>
          </div>

          {vs !== null ? (
            <div style={{ background: C.input, border: "2px solid " + bankColor, borderRadius: "4px", padding: "20px", textAlign: "center", marginBottom: "12px" }}>
              <div style={{ fontSize: "11px", letterSpacing: "3px", color: bankColor, marginBottom: "6px" }}>
                STALL SPEED · {bank}° AOB · FLAPS {flaps === "0" ? "0°" : flaps === "25" ? "25°" : "40°"}
              </div>
              <div style={{ fontSize: "64px", fontWeight: "bold", color: C.text, lineHeight: 1 }}>{vs}</div>
              <div style={{ fontSize: "16px", letterSpacing: "4px", color: C.dim, marginTop: "6px" }}>KIAS</div>
              {bank >= 45 && (
                <div style={{ fontSize: "11px", color: C.warm, marginTop: "8px", letterSpacing: "1px" }}>
                  {bank === 60 ? "STEEP TURN — load factor 2.0G, significant stall speed increase" : "MEDIUM TURN — maintain coordination to avoid accelerated stall"}
                </div>
              )}
            </div>
          ) : (
            <div style={{ background: C.input, border: "1px solid " + C.border, borderRadius: "3px", padding: "16px", textAlign: "center", color: C.dim, fontSize: "12px", letterSpacing: "1px", marginBottom: "12px" }}>
              Enter gross weight (2,000–2,550 lb) to calculate
            </div>
          )}

          <NoteBox text="Fig 5-5. Power off, A/C off. Va decreases with weight — do not make full/abrupt control inputs above Va. Stall speed increases with bank angle due to load factor. Always verify against official POH." />
        </Card>
      );
    }

    // ============================================================
    // C172S NAV III — PERFORMANCE DATA
    // ============================================================

    // Fig 5-6: Maximum Rate of Climb at 2550 LB
    // Flaps UP, Full Throttle, Mixture leaned above 3000ft
    const c172RocTable = {
      0:     { '-20': 855, '0': 785, '20': 710, '40': 645 },
      2000:  { '-20': 760, '0': 695, '20': 625, '40': 560 },
      4000:  { '-20': 685, '0': 620, '20': 555, '40': 495 },
      6000:  { '-20': 575, '0': 515, '20': 450, '40': 390 },
      8000:  { '-20': 465, '0': 405, '20': 345, '40': 285 },
      10000: { '-20': 360, '0': 300, '20': 240, '40': 180 },
      12000: { '-20': 255, '0': 195, '20': 135, '40': null },
    };
    const c172RocClimbSpeed = {
      0: 74, 2000: 73, 4000: 73, 6000: 73, 8000: 72, 10000: 72, 12000: 72,
    };

    function calculateC172ROC(altFt, oatC) {
      const altKeys = Object.keys(c172RocTable).map(Number).sort((a,b) => a-b);
      const oatKeys = [-20, 0, 20, 40];
      const clampedAlt = Math.max(0, Math.min(12000, altFt));
      const clampedOAT = Math.max(-20, Math.min(40, oatC));

      // Interpolate OAT within a row
      function interpOATrow(row) {
        for (let i = 0; i < oatKeys.length - 1; i++) {
          const lo = oatKeys[i], hi = oatKeys[i+1];
          if (clampedOAT >= lo && clampedOAT <= hi) {
            const vLo = row[String(lo)], vHi = row[String(hi)];
            if (vLo === null || vHi === null) return null;
            const t = (clampedOAT - lo) / (hi - lo);
            return vLo + t * (vHi - vLo);
          }
        }
        return row[String(oatKeys[oatKeys.length-1])];
      }

      // Interpolate altitude
      for (let i = 0; i < altKeys.length - 1; i++) {
        if (clampedAlt >= altKeys[i] && clampedAlt <= altKeys[i+1]) {
          const lo = interpOATrow(c172RocTable[altKeys[i]]);
          const hi = interpOATrow(c172RocTable[altKeys[i+1]]);
          if (lo === null || hi === null) return null;
          const t = (clampedAlt - altKeys[i]) / (altKeys[i+1] - altKeys[i]);
          const roc = Math.round(lo + t * (hi - lo));
          // Interpolate climb speed
          const csLo = c172RocClimbSpeed[altKeys[i]];
          const csHi = c172RocClimbSpeed[altKeys[i+1]];
          const climbSpeed = Math.round(csLo + t * (csHi - csLo));
          return { roc, climbSpeed, isaDeviation: getISADeviation(altFt, oatC), isaTemp: getISATemp(altFt) };
        }
      }
      // At max alt
      const roc = interpOATrow(c172RocTable[altKeys[altKeys.length-1]]);
      return roc === null ? null : { roc: Math.round(roc), climbSpeed: c172RocClimbSpeed[altKeys[altKeys.length-1]], isaDeviation: getISADeviation(altFt, oatC), isaTemp: getISATemp(altFt) };
    }

    // ============================================================

        if (altVal < 0 || altVal > 12000) { setError("Altitude must be 0 – 12,000 ft."); return; }
        if (oatC < -20 || oatC > 40) { setError("OAT out of chart range (−20°C to 40°C)."); return; }
        const res = calculateC172ROC(altVal, oatC);
        if (!res) { setError("Outside chart limits for this altitude/temperature combination."); return; }
        setResult(res);
      }, [alt, oat, tempUnit]);

      const rocColor = result ? (result.roc > 500 ? C.green : result.roc > 300 ? "#8ab87a" : result.roc > 150 ? C.warm : "#cc5555") : C.text;

            <div style={{ fontSize: "13px", color: C.dimmer, marginTop: "6px", letterSpacing: "1px" }}>FLAPS UP · FULL THROTTLE · 2,550 LB · FIG 5-6</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <AltOATRow altLabel="PRESS. ALT." altValue={alt} onAltChange={setAlt} altHint="0 – 12,000 ft" altPlaceholder="e.g. 4000" oatValue={oat} onOatChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} />
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />
              <div style={{ background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "28px", textAlign: "center", marginBottom: "12px" }}>
                <div style={{ fontSize: "18px", letterSpacing: "3px", color: C.green, marginBottom: "12px" }}>RATE OF CLIMB</div>
                <div style={{ fontSize: "60px", color: rocColor, lineHeight: 1, fontWeight: "bold" }}>{result.roc}</div>
                <div style={{ fontSize: "14px", color: C.dimmer, marginTop: "8px", letterSpacing: "3px" }}>FT / MIN</div>
              </div>
              <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
                <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.dimmer }}>CLIMB RATE</div>
                <div style={{ fontSize: "15px", letterSpacing: "2px", color: rocColor }}>{rocLabel}</div>
              </div>
              <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
                <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.dimmer }}>CLIMB SPEED</div>
                <div style={{ fontSize: "15px", letterSpacing: "2px", color: C.text }}>{result.climbSpeed} <span style={{ fontSize: "12px", color: C.dim }}>KIAS</span></div>
              </div>
              <NoteBox text="Flaps UP, full throttle, mixture leaned above 3,000 ft for max RPM. Always verify against official POH charts." />
            </div>
          )}

          {/* Gradient checker */}
          <div style={{ marginTop: "24px", paddingTop: "20px", borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "13px", letterSpacing: "3px", color: C.green, marginBottom: "14px" }}>CLIMB GRADIENT CHECKER</div>
            <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "1px", marginBottom: "14px" }}>Convert ft/nm departure procedure gradient to required FPM</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "14px" }}>
              <div>
                <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>GRADIENT</div>
                <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                  <input type="number" value={gradFtNm} onChange={e => setGradFtNm(e.target.value)} placeholder="e.g. 200"
                    style={{ flex: 1, minWidth: 0, background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "10px 12px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  <div style={{ padding: "10px 8px", background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", color: C.dim, fontSize: "11px", letterSpacing: "1px", flexShrink: 0 }}>FT/NM</div>
                </div>
              </div>
              <div>
                <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>GROUNDSPEED</div>
                <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                  <input type="number" value={gradGs} onChange={e => setGradGs(e.target.value)} placeholder="e.g. 90"
                    style={{ flex: 1, minWidth: 0, background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "10px 12px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                  <div style={{ padding: "10px 8px", background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", color: C.dim, fontSize: "11px", letterSpacing: "1px", flexShrink: 0 }}>KT</div>
                </div>
              </div>
            </div>
            {reqFpm !== null && (
              <div style={{ background: C.input, border: `2px solid ${canMeet === null ? C.border : canMeet ? C.green : C.error}`, borderRadius: "4px", overflow: "hidden" }}>
                <div style={{ padding: "16px", textAlign: "center", borderBottom: `1px solid ${C.borderDim}` }}>
                  <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dim, marginBottom: "6px" }}>REQUIRED CLIMB RATE</div>
                  <div style={{ fontSize: "48px", fontWeight: "bold", color: C.text, lineHeight: 1 }}>{reqFpm}</div>
                  <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "2px" }}>FT / MIN</div>
                  <div style={{ fontSize: "11px", color: C.dim, marginTop: "4px" }}>{gradFtNm} ft/nm × {gradGs} kt ÷ 60</div>
                </div>
                {canMeet !== null && (
                  <div style={{ padding: "12px 16px", background: canMeet ? C.green + "22" : C.errorBg, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: "13px", letterSpacing: "2px", color: canMeet ? C.green : C.error, fontWeight: "bold" }}>
                      {canMeet ? "GRADIENT MET" : "GRADIENT NOT MET"}
                    </div>
                    <div style={{ fontSize: "12px", color: canMeet ? C.green : C.error }}>

    }

    // Fig 5-7: Time, Fuel, Distance to Climb at 2550 LB (Standard Temperature)
    // Note: +10% per 10°C above standard for time, fuel, distance
    // Note: Add 1.4 gal for engine start, taxi, takeoff
    const c172ClimbTable = [
      { alt: 0,     stdTemp: 15, kias: 74, roc: 730, time: 0,  fuel: 0.0, dist: 0  },
      { alt: 1000,  stdTemp: 13, kias: 73, roc: 695, time: 1,  fuel: 0.4, dist: 2  },
      { alt: 2000,  stdTemp: 11, kias: 73, roc: 655, time: 3,  fuel: 0.8, dist: 4  },
      { alt: 3000,  stdTemp: 9,  kias: 73, roc: 620, time: 4,  fuel: 1.2, dist: 6  },
      { alt: 4000,  stdTemp: 7,  kias: 73, roc: 600, time: 6,  fuel: 1.5, dist: 8  },
      { alt: 5000,  stdTemp: 5,  kias: 73, roc: 550, time: 8,  fuel: 1.9, dist: 10 },
      { alt: 6000,  stdTemp: 3,  kias: 73, roc: 505, time: 10, fuel: 2.2, dist: 13 },
      { alt: 7000,  stdTemp: 1,  kias: 73, roc: 455, time: 12, fuel: 2.6, dist: 16 },
      { alt: 8000,  stdTemp: -1, kias: 72, roc: 410, time: 14, fuel: 3.0, dist: 19 },
      { alt: 9000,  stdTemp: -3, kias: 72, roc: 360, time: 17, fuel: 3.4, dist: 22 },
      { alt: 10000, stdTemp: -5, kias: 72, roc: 315, time: 20, fuel: 3.9, dist: 27 },
      { alt: 11000, stdTemp: -7, kias: 72, roc: 265, time: 24, fuel: 4.4, dist: 32 },
      { alt: 12000, stdTemp: -9, kias: 72, roc: 220, time: 28, fuel: 5.0, dist: 38 },
    ];

    function interpC172Climb(altFt) {
      const c = Math.max(0, Math.min(12000, altFt));
      for (let i = 0; i < c172ClimbTable.length - 1; i++) {
        const lo = c172ClimbTable[i], hi = c172ClimbTable[i+1];
        if (c >= lo.alt && c <= hi.alt) {
          const t = (c - lo.alt) / (hi.alt - lo.alt);
          return {
            stdTemp: lo.stdTemp + t * (hi.stdTemp - lo.stdTemp),
            kias:    Math.round(lo.kias + t * (hi.kias - lo.kias)),
            roc:     Math.round(lo.roc  + t * (hi.roc  - lo.roc)),
            time:    lo.time + t * (hi.time - lo.time),
            fuel:    lo.fuel + t * (hi.fuel - lo.fuel),
            dist:    lo.dist + t * (hi.dist - lo.dist),
          };
        }
      }
      const last = c172ClimbTable[c172ClimbTable.length-1];
      return { stdTemp: last.stdTemp, kias: last.kias, roc: last.roc, time: last.time, fuel: last.fuel, dist: last.dist };
    }

    function calculateC172Climb(departAlt, cruiseAlt, oatDepC, oatCruiseC) {
      const cruiseData  = interpC172Climb(cruiseAlt);
      const departData  = interpC172Climb(departAlt);
      // Average ISA deviation across the climb
      const isaDevDep    = oatDepC    - getISATemp(departAlt);
      const isaDevCruise = oatCruiseC - cruiseData.stdTemp;
      const avgIsaDev    = (isaDevDep + isaDevCruise) / 2;
      // 10% correction per 10°C above standard (only positive)
      const correction = Math.max(0, avgIsaDev / 10) * 0.10;
      const factor = 1 + correction;
      const timeMin = Math.max(0, (cruiseData.time  - departData.time)  * factor);
      const fuelGal = Math.max(0, (cruiseData.fuel  - departData.fuel)  * factor);
      const distNM  = Math.max(0, (cruiseData.dist  - departData.dist)  * factor);
      return {
        timeMin, fuelGal, distNM,
        climbSpeed: cruiseData.kias,
        avgIsaDev, correction,
        isaDeviation: isaDevCruise,
        isaTemp: cruiseData.stdTemp,
      };
    }

    function C172TimeFuelDistTab({ savedState, onStateChange }) {
      const C = useC();
      const [departAlt, setDepartAlt] = useState(savedState.departAlt || "");
      const [cruiseAlt, setCruiseAlt] = useState(savedState.cruiseAlt || "");
      const [oatDep, setOatDep] = useState(savedState.oatDep || "");
      const [oatCruise, setOatCruise] = useState(savedState.oatCruise || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ departAlt, cruiseAlt, oatDep, oatCruise, tempUnit, result });
      }, [departAlt, cruiseAlt, oatDep, oatCruise, tempUnit, result]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const dep = parseFloat(departAlt), cruise = parseFloat(cruiseAlt);
        let oatDepC = parseFloat(oatDep), oatCruiseC = parseFloat(oatCruise);
        if (isNaN(dep) || isNaN(cruise) || isNaN(oatDepC) || isNaN(oatCruiseC)) { setError("Please fill in all fields."); return; }
        if (tempUnit === "F") { oatDepC = (oatDepC-32)*5/9; oatCruiseC = (oatCruiseC-32)*5/9; }
        if (dep >= cruise) { setError("Cruise altitude must be above departure altitude."); return; }
        if (dep < 0 || cruise > 12000) { setError("Altitudes must be between 0 and 12,000 ft."); return; }
        setResult(calculateC172Climb(dep, cruise, oatDepC, oatCruiseC));
      }, [departAlt, cruiseAlt, oatDep, oatCruise, tempUnit]);

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.green, marginBottom: "6px" }}>TIME · FUEL · DISTANCE TO CLIMB</div>
            <div style={{ fontSize: "28px", fontWeight: "bold", letterSpacing: "2px" }}>CLIMB PLANNING</div>
            <div style={{ fontSize: "13px", color: C.dimmer, marginTop: "6px", letterSpacing: "1px" }}>FLAPS UP · FULL THROTTLE · 2,550 LB · FIG 5-7</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "10px", marginBottom: "28px" }}>
            <AltOATRow altLabel="DEPARTURE PRESS. ALT." altValue={departAlt} onAltChange={setDepartAlt} altHint="0 – 12,000 ft" altPlaceholder="e.g. 1000" oatValue={oatDep} onOatChange={setOatDep} unit={tempUnit} onUnitChange={setTempUnit} />
            <AltOATRow altLabel="CRUISE PRESS. ALT." altValue={cruiseAlt} onAltChange={setCruiseAlt} altHint="Must be above departure" altPlaceholder="e.g. 6000" oatValue={oatCruise} onOatChange={setOatCruise} unit={tempUnit} onUnitChange={setTempUnit} />
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />
              {result.correction > 0 && (
                <div style={{ background: C.errorBg, border: `1px solid ${C.warm}`, borderRadius: "3px", padding: "10px 14px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "10px" }}>
                  <div style={{ color: C.warm, fontSize: "16px" }}>⚠</div>
                  <div style={{ fontSize: "12px", color: C.note, letterSpacing: "1px" }}>
                    <strong style={{color: C.warm}}>Avg ISA +{result.avgIsaDev.toFixed(1)}°C</strong> — values increased by <strong style={{color: C.warm}}>{(result.correction * 100).toFixed(0)}%</strong> per POH correction
                  </div>
                </div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", marginBottom: "12px" }}>
                <ResultCard label="TIME" value={result.timeMin.toFixed(1)} unit="MIN" color={C.green} />
                <ResultCard label="FUEL" value={result.fuelGal.toFixed(1)} unit="GAL" color={C.green} />
                <ResultCard label="DIST" value={result.distNM.toFixed(1)} unit="NM" color={C.green} />
              </div>
              <div style={{ background: C.input, border: `1px solid ${C.borderDim}`, borderRadius: "3px", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
