    function getDensityAlt(altFt, oatC) {
      // Precise density altitude per ICAO ISA model
      // Pressure ratio at pressure altitude using ISA lapse rate (0.0019812 K/ft)
      const T0 = 288.15;
      const T_isa_K = T0 - 0.0019812 * altFt;
      const T_oat_K = oatC + 273.15;
      const pressureRatio = Math.pow(T_isa_K / T0, 5.2561);
      // Density ratio: rho/rho0 = (P/P0) * (T0/T_actual)
      const densityRatio = pressureRatio * (T0 / T_oat_K);
      return Math.round(145366 * (1 - Math.pow(densityRatio, 0.235)));

    function tfdFuelInterpOAT(entries, oat) {
      const oats = entries.map(e => e[0]), vals = entries.map(e => e[1]);

      for (let i = 0; i < oats.length-1; i++) {

      return vals[vals.length-1];

      const clamped = Math.max(altKeys[0], Math.min(altKeys[altKeys.length-1], altFt));
      for (let i = 0; i < altKeys.length-1; i++) {
        if (clamped >= altKeys[i] && clamped <= altKeys[i+1]) {
          const lo = tfdFuelInterpOAT(desFuelData[altKeys[i]], oat);
          const hi = tfdFuelInterpOAT(desFuelData[altKeys[i+1]], oat);
          return lo + (hi - lo) * (clamped - altKeys[i]) / (altKeys[i+1] - altKeys[i]);
        }
      }
      return tfdFuelInterpOAT(desFuelData[altKeys[altKeys.length-1]], oat);
    }

    function calculateDescent(cruiseAlt, destAlt, oatCruiseC, oatDestC) {
      const timeMin = Math.max(0, tfdInterpAltOAT(desTimeData, cruiseAlt, oatCruiseC) - tfdInterpAltOAT(desTimeData, destAlt, oatDestC));
      const fuelGal = Math.max(0, desFuelInterp(cruiseAlt, oatCruiseC) - desFuelInterp(destAlt, oatDestC));
      const distNM  = Math.max(0, tfdInterpAltOAT(desDistData, cruiseAlt, oatCruiseC) - tfdInterpAltOAT(desDistData, destAlt, oatDestC));
      return { timeMin, fuelGal, distNM };
    }
    // ROC = 742.1 - (49.31 × alt_thousands) - (3.06 × OAT_celsius)
    // ============================================================
    function calculateROC(altFt, oatC) {
      const roc = Math.max(0, 742.1 - (49.31 * altFt / 1000) - (3.06 * oatC));
      return { roc, isaDeviation: getISADeviation(altFt, oatC), isaTemp: getISATemp(altFt) };
    }

    // TAS tables: low/high KTAS with corresponding ISA deviation bounds

    function calculateCruise(altFt, oatC, wheelPants, power) {
      const cfg = cruiseConfigs[power];
      const altKeys = Object.keys(cfg.table).map(Number).sort((a,b) => a-b);
      const clampedAlt = Math.max(0, Math.min(cfg.maxAlt, altFt));
      let lowerAlt = altKeys[0], upperAlt = altKeys[0];
      for (let i = 0; i < altKeys.length - 1; i++) {
        if (clampedAlt >= altKeys[i] && clampedAlt <= altKeys[i+1]) { lowerAlt = altKeys[i]; upperAlt = altKeys[i+1]; break; }
        if (clampedAlt >= altKeys[altKeys.length-1]) { lowerAlt = upperAlt = altKeys[altKeys.length-1]; }
      }
      const altFrac = lowerAlt === upperAlt ? 0 : (clampedAlt - lowerAlt) / (upperAlt - lowerAlt);

      function interpRPM(altKey) {
        const entries = cfg.table[altKey];
        if (!entries) return null;
        const clampedOAT = Math.max(entries[0].oat, Math.min(entries[entries.length-1].oat, oatC));
        for (let i = 0; i < entries.length-1; i++) {
          if (clampedOAT >= entries[i].oat && clampedOAT <= entries[i+1].oat) {
            const t = (clampedOAT - entries[i].oat) / (entries[i+1].oat - entries[i].oat);
            return lerp(entries[i].rpm, entries[i+1].rpm, t);
          }
        }
        return entries[entries.length-1].rpm;
      }
      function interpTAS(altKey) {
        const t = cfg.tas[altKey];
        if (!t) return null;
        const dev = getISADeviation(altFt, oatC);
        const clampedDev = Math.max(t.lowDev, Math.min(t.highDev, dev));
        return lerp(t.low, t.high, (clampedDev - t.lowDev) / (t.highDev - t.lowDev));
      }

      const rpm = Math.round(lerp(interpRPM(lowerAlt), interpRPM(upperAlt), altFrac));
      const tasBase = lerp(interpTAS(lowerAlt) ?? interpTAS(upperAlt), interpTAS(upperAlt) ?? interpTAS(lowerAlt), altFrac);
      const tas = Math.round(tasBase) - (wheelPants ? 0 : 3);
      const isaDeviation = getISADeviation(altFt, oatC);

      function interpAltPoints(points, alt) {
        const a = Math.max(points[0][0], Math.min(points[points.length-1][0], alt));
        for (let i = 0; i < points.length-1; i++) {
          if (a >= points[i][0] && a <= points[i+1][0]) {
            const t = (a - points[i][0]) / (points[i+1][0] - points[i][0]);
            return points[i][1] + t * (points[i+1][1] - points[i][1]);
          }
        }
        return points[points.length-1][1];
      }
      function interpER(sl, top, topAlt) {
        const a = Math.min(clampedAlt, topAlt);
        return sl + (top - sl) * (a / topAlt);
      }
      const noReserve = {
        e75: interpER(4.24, 4.14, 6500),  r75: interpER(512, 514, 6500),
        e65: interpER(4.91, 4.59, 10000), r65: interpAltPoints([[0,560],[2000,556],[4000,552],[6000,547.6],[8000,542],[9000,539],[10000,536]], clampedAlt),
        e55: interpER(5.70, 5.19, 10000), r55: interpAltPoints([[0,601],[2000,594],[4000,587],[6000,579],[8000,570],[9000,565],[10000,560]], clampedAlt),
      };
      const reserve45 = {
        e75: interpER(3.68, 3.58, 6500),  r75: interpER(444, 443, 6500),
        e65: interpER(4.26, 3.94, 10000), r65: interpER(487, 459, 10000),
        e55: interpER(4.95, 4.43, 10000), r55: interpER(522, 479, 10000),
      };
      return { rpm, tas, fuelFlow: cfg.gph, power, altFt: clampedAlt, wheelPants, noReserve, reserve45, isaDeviation, isaTemp: getISATemp(altFt) };
    }

    // ============================================================
    // TAB 1: TIME, FUEL, DISTANCE
    // ============================================================
    function TimeFuelDistTab({ savedState, onStateChange }) {
      const [departAlt, setDepartAlt] = useState(savedState.departAlt || "");
      const [cruiseAlt, setCruiseAlt] = useState(savedState.cruiseAlt || "");
      const [destAlt, setDestAlt] = useState(savedState.destAlt || "");
      const [oatDep, setOatDep] = useState(savedState.oatDep || "");
      const [oatCruise, setOatCruise] = useState(savedState.oatCruise || "");
      const [oatDest, setOatDest] = useState(savedState.oatDest || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ departAlt, cruiseAlt, destAlt, oatDep, oatCruise, oatDest, tempUnit, result });
      }, [departAlt, cruiseAlt, destAlt, oatDep, oatCruise, oatDest, tempUnit, result]);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const dep = parseFloat(departAlt), cruise = parseFloat(cruiseAlt);
        const dest = parseFloat(destAlt) || 0;
        let oatDepC = parseFloat(oatDep), oatCruiseC = parseFloat(oatCruise);
        let oatDestC = parseFloat(oatDest);
        if (isNaN(dep) || isNaN(cruise) || isNaN(oatDepC) || isNaN(oatCruiseC)) { setError("Please fill in departure, cruise altitude and both OATs."); return; }
        if (tempUnit === "F") { oatDepC = (oatDepC-32)*5/9; oatCruiseC = (oatCruiseC-32)*5/9; if (!isNaN(oatDestC)) oatDestC = (oatDestC-32)*5/9; }
        if (dep >= cruise) { setError("Cruise altitude must be above departure altitude."); return; }
        if (dep < 0 || cruise > 12000) { setError("Altitudes must be between 0 and 12,000 ft."); return; }
        if (oatDepC < -25 || oatDepC > 50 || oatCruiseC < -25 || oatCruiseC > 50) { setError("OAT out of chart range (approx −25°C to 50°C)."); return; }
        const climb = calculateTimeFuelDist(dep, cruise, oatDepC, oatCruiseC);
        let descent = null;
        if (!isNaN(oatDestC) && !isNaN(dest) && dest < cruise) {
          descent = calculateDescent(cruise, dest, oatCruiseC, oatDestC);
        }
        setResult({ ...climb, descent });
      }, [departAlt, cruiseAlt, destAlt, oatDep, oatCruise, oatDest, tempUnit]);

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.green, marginBottom: "6px" }}>CLIMB · FIG 5-17</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
              <InputField label="DEPARTURE PRESS. ALT." unit="FT" value={departAlt} onChange={setDepartAlt} placeholder="e.g. 2000" hint="0 – 12,000 ft" />
              <InputField label="CRUISE PRESS. ALT." unit="FT" value={cruiseAlt} onChange={setCruiseAlt} placeholder="e.g. 6000" hint="Above departure" />
              <TempField label="OAT AT DEPARTURE" value={oatDep} onChange={setOatDep} unit={tempUnit} onUnitChange={setTempUnit} />
              <TempField label="OAT AT CRUISE ALT." value={oatCruise} onChange={setOatCruise} unit={tempUnit} onUnitChange={setTempUnit} />
            </div>
          </div>
          <div style={{ marginBottom: "28px" }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.cool, marginBottom: "16px" }}>DESCENT · FIG 5-37 <span style={{ fontSize: "11px", color: C.dimmest }}>(optional)</span></div>
            <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
              <InputField label="DESTINATION PRESS. ALT." unit="FT" value={destAlt} onChange={setDestAlt} placeholder="e.g. 1000" hint="Below cruise alt (leave blank to skip)" />
              <TempField label="OAT AT DESTINATION" value={oatDest} onChange={setOatDest} unit={tempUnit} onUnitChange={setTempUnit} />
            </div>
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop: "28px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                <div style={{ fontSize: "18px", letterSpacing: "3px", color: C.green }}>RESULTS</div>
                <div style={{ display: "flex", gap: "6px" }}>

    // ============================================================
    // ============================================================
    // FIGURE 5-9: FLAPS 25° TAKEOFF PERFORMANCE

    // Chain: OAT+Alt → Panel1 ref → Weight adj → Wind adj → TO dist (50ft)
    // POH example: 2000ft/23C/2400lb/8kt HW → 1674ft ✓ (calc gives 1677)
    // ============================================================

    const toPanel1Alts = [0, 2000, 4000, 6000, 8000];
    const toPanel1Keys = ["SL","2000","4000","6000","8000"];

    const toPanel2 = {
      1500: [[2000, 850],  [2150, 1030], [2250, 1180], [2350, 1300], [2450, 1400], [2550, 1500]],
      2000: [[2000, 1190], [2150, 1390], [2250, 1550], [2350, 1700], [2450, 1870], [2550, 2000]],
      2500: [[2000, 1460], [2150, 1710], [2250, 1910], [2350, 2150], [2450, 2350], [2550, 2500]],
      3000: [[2000, 1740], [2150, 2060], [2250, 2300], [2350, 2550], [2450, 2800], [2550, 3000]],
      3500: [[2000, 2010], [2150, 2400], [2250, 2700], [2350, 3000], [2450, 3280], [2550, 3500]],
      4000: [[2000, 2310], [2150, 2750], [2250, 3090], [2350, 3400], [2450, 3750], [2550, 4000]],
    };

    const toPanel3 = {
      500:  [[-15, 500],  [-10, 500],  [-5, 500],   [0, 500],  [5, 630]],
      600:  [[-15, 480],  [-10, 522],  [-5, 546],   [0, 600],  [5, 720]],
      1000: [[-15, 800],  [-10, 870],  [-5, 910],   [0, 1000], [5, 1200]],
      1500: [[-15, 1200], [-10, 1300], [-5, 1400],  [0, 1500], [5, 1800]],
      2000: [[-15, 1650], [-10, 1790], [-5, 1900],  [0, 2000], [5, 2400]],
      2500: [[-15, 2080], [-10, 2200], [-5, 2350],  [0, 2500], [5, 2970]],
      3000: [[-15, 2500], [-10, 2690], [-5, 2810],  [0, 3000], [5, 3560]],
      3500: [[-15, 2900], [-10, 3100], [-5, 3300],  [0, 3500], [5, 4150]],
      4000: [[-15, 3350], [-10, 3560], [-5, 3790],  [0, 4000], [3, 4500], [5, 4500]],
      4500: [[-15, 3790], [-10, 4000], [-5, 4250],  [0, 4500], [5, 4500]],
    };

    // FIG 5-9: FLAPS 25° OVER 50FT BARRIER — Panel 1
    const toPanel1 = {
      "SL":   [[0, 1400],     [10, 1510],  [30, 1850],  [40, 2040],  [50, 2210]],
      "2000": [[-4, 1560],    [10, 1800],  [30, 2200],  [46, 2550]],
      "4000": [[-7.6, 1790],  [10, 2150],  [20, 2380],  [30, 2600],  [42, 2910]],
      "6000": [[-2, 2040],    [0, 2310],   [10, 2580],  [30, 3100],  [38, 3360]],
      "8000": [[-16, 2320],  [-8, 2530],  [0, 2780],   [10, 3080],  [20, 3400],  [30, 3700],  [34, 3880]],
    };

    // FIG 5-13: FLAPS 25° GROUND ROLL — Panel 1
    const grPanel1 = {
      "SL":   [[0, 990],   [10, 1070], [25, 1250],  [50, 1580]],
      "2000": [[-4, 1100], [10, 1280], [20, 1425],  [46, 1800]],
      "4000": [[-8, 1260], [5, 1455],  [20, 1700],  [42, 2100]],
      "6000": [[-11,1450], [5, 1745],  [20, 2040],  [38, 2410]],
      "8000": [[-15,1660], [-3, 1925], [10, 2200],  [34, 2800]],
    };

    // FIG 5-13: FLAPS 25° GROUND ROLL — Panel 2
    const grPanel2 = {
      600:  [[2000,600],  [2150,600],  [2250,600],  [2350,600],  [2450,600],  [2550,600]],
      800:  [[2000,600],  [2150,600],  [2250,600],  [2350,625],  [2450,700],  [2550,800]],
      1000: [[2000,600],  [2150,630],  [2250,700],  [2350,780],  [2450,875],  [2550,1000]],
      1200: [[2000,600],  [2150,760],  [2250,850],  [2350,945],  [2450,1050], [2550,1200]],
      1400: [[2000,750],  [2100,850],  [2150,890],  [2250,990],  [2350,1100], [2450,1230], [2550,1400]],
      1800: [[2000,950],  [2100,1090], [2150,1150], [2250,1260], [2350,1400], [2450,1580], [2550,1800]],
      2200: [[2000,1060], [2100,1200], [2150,1270], [2250,1400], [2350,1560], [2450,1750], [2550,2200]],
      2600: [[2000,1380], [2100,1550], [2150,1650], [2250,1850], [2350,2050], [2450,2300], [2550,2600]],
      2800: [[2000,1500], [2100,1700], [2150,1790], [2250,1980], [2350,2200], [2450,2460], [2550,2800]],
    };

    // FIG 5-13: FLAPS 25° GROUND ROLL — Panel 3 (tailwind N/A above 2400ft ref)
    const grPanel3 = {
      600:  [[-15,600],  [-10,600],  [-5,600],  [0,600],   [5,750]],
      800:  [[-15,640],  [-10,700], [-5,750],  [0,800],   [5,990]],
      1000: [[-15,800],  [-10,855],  [-5,930],  [0,1000],  [5,1230]],
      1200: [[-15,950],  [-10,1040],[-5,1110], [0,1200],  [5,1460]],
      1600: [[-15,1250], [-10,1370],[-5,1490], [0,1600],  [5,1970]],
      2000: [[-15,1580], [-10,1725],[-5,1850], [0,2000],  [5,2450]],
      2400: [[-15,1900], [-10,2050],[-5,2225], [0,2400],  [5,2980]],
      2800: [[-15,2200], [-10,2400],[-5,2600], [0,2800],  [5,2800]],
    };

    function toInterpList(list, x) {
      const xs = list.map(d => d[0]), ys = list.map(d => d[1]);
      const clamped = Math.max(xs[0], Math.min(xs[xs.length-1], x));
      for (let i = 0; i < xs.length-1; i++) {
        if (clamped >= xs[i] && clamped <= xs[i+1]) {
          const t = (clamped - xs[i]) / (xs[i+1] - xs[i]);
          return ys[i] + t * (ys[i+1] - ys[i]);
        }
      }
      return ys[ys.length-1];
    }

    function toInterpPanel(panelObj, ref, x) {
      const refs = Object.keys(panelObj).map(Number).sort((a,b) => a-b);
      const clamped = Math.max(refs[0], Math.min(refs[refs.length-1], ref));
      for (let i = 0; i < refs.length-1; i++) {
        if (clamped >= refs[i] && clamped <= refs[i+1]) {
          const lo = toInterpList(panelObj[refs[i]], x);
          const hi = toInterpList(panelObj[refs[i+1]], x);
          const t = (clamped - refs[i]) / (refs[i+1] - refs[i]);
          return lo + t * (hi - lo);
        }
      }
      return toInterpList(panelObj[refs[refs.length-1]], x);
    }

    function calcPanel1(p1data, alt, oat) {
      const clampedAlt = Math.max(0, Math.min(8000, alt));
      for (let i = 0; i < toPanel1Alts.length-1; i++) {
        if (clampedAlt >= toPanel1Alts[i] && clampedAlt <= toPanel1Alts[i+1]) {
          const lo = toInterpList(p1data[toPanel1Keys[i]], oat);
          const hi = toInterpList(p1data[toPanel1Keys[i+1]], oat);
          const t = (clampedAlt - toPanel1Alts[i]) / (toPanel1Alts[i+1] - toPanel1Alts[i]);
          return lo + t * (hi - lo);
        }
      }
      return toInterpList(p1data["8000"], oat);
    }

    // Takeoff speeds from POH table
    const TO_SPEEDS = [
      { wt: 2250, liftoff: 50, barrier: 54 },
      { wt: 2350, liftoff: 53, barrier: 56 },
      { wt: 2450, liftoff: 55, barrier: 58 },
      { wt: 2550, liftoff: 55, barrier: 60 },
    ];
    function getTakeoffSpeeds(weightLbs) {
      const w = Math.max(2250, Math.min(2550, weightLbs));
      for (let i = 0; i < TO_SPEEDS.length - 1; i++) {
        if (w >= TO_SPEEDS[i].wt && w <= TO_SPEEDS[i+1].wt) {
          const t = (w - TO_SPEEDS[i].wt) / (TO_SPEEDS[i+1].wt - TO_SPEEDS[i].wt);
          return {
            liftoff: Math.round(TO_SPEEDS[i].liftoff + t * (TO_SPEEDS[i+1].liftoff - TO_SPEEDS[i].liftoff)),
            barrier: Math.round(TO_SPEEDS[i].barrier + t * (TO_SPEEDS[i+1].barrier - TO_SPEEDS[i].barrier)),
          };
        }
      }
      return { liftoff: TO_SPEEDS[TO_SPEEDS.length-1].liftoff, barrier: TO_SPEEDS[TO_SPEEDS.length-1].barrier };
    }

    function calculateTakeoff(altFt, oatC, weightLbs, windKt, windDir, chartType) {
      const windVal = windDir === "tail" ? windKt : -windKt;

      // 50ft barrier
      const ref1_50 = calcPanel1(toPanel1, altFt, oatC);
      const ref2_50 = toInterpPanel(toPanel2, ref1_50, weightLbs);
      const dist50 = toInterpPanel(toPanel3, ref2_50, windVal);

      // ground roll
      const ref1_gr = calcPanel1(grPanel1, altFt, oatC);
      const ref2_gr = toInterpPanel(grPanel2, ref1_gr, weightLbs);
      const grWindVal = (windDir === "tail" && ref2_gr > 2400) ? 0 : windVal;
      const distGr = toInterpPanel(grPanel3, ref2_gr, grWindVal);

      const is50ft = chartType === "50ft";
      return {
        ref1: Math.round(is50ft ? ref1_50 : ref1_gr),
        ref2: Math.round(is50ft ? ref2_50 : ref2_gr),
        distFt: Math.round(is50ft ? dist50 : distGr),
        groundRollFt: Math.round(distGr),
        dist50Ft: Math.round(dist50),
        isaDeviation: getISADeviation(altFt, oatC),
        isaTemp: getISATemp(altFt),
      };
    }

    function TakeoffTab({ savedState, onStateChange }) {
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [wind, setWind] = useState(savedState.wind || "");
      const [windDir, setWindDir] = useState(savedState.windDir || "head");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight, wind, windDir, runway, windHeading, windSpeed, result });
      }, [alt, oat, tempUnit, weight, wind, windDir, runway, windHeading, windSpeed, result]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum * 10) % 360;
        const angle = (windHdg - rwyHdg + 360) % 360;
        const rad = angle * Math.PI / 180;
        const headwind = Math.round(windSpd * Math.cos(rad) * 10) / 10;
        const crosswind = Math.round(Math.abs(windSpd * Math.sin(rad)) * 10) / 10;
        const crossDir = (angle > 0 && angle < 180) ? "R" : "L";
        return { headwind, crosswind, crossDir, angle, rwyHdg };
      }

      const windSpd = parseFloat(windSpeed) || 0;
      const rwyNum = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum) && !isNaN(windHdg) && windSpd > 0 && rwyNum >= 1 && rwyNum <= 36)
        ? getWindComponents(rwyNum, windHdg, windSpd) : null;

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 2550;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5 / 9;
        if (altVal < 0 || altVal > 8000) { setError("Altitude must be between 0 and 8,000 ft."); return; }
        if (weightVal < 2000 || weightVal > 2550) { setError("Weight must be between 2,000 and 2,550 lbs."); return; }
        if (isNaN(rwyNum) || rwyNum < 1 || rwyNum > 36) { setError("Please enter a valid runway number (01–36)."); return; }
        if (isNaN(windHdg) || windHdg < 0 || windHdg > 360) { setError("Please enter a valid wind direction (0–360°)."); return; }

        const wc = windComponents || { headwind: 0, crosswind: 0, crossDir: "R", angle: 0, rwyHdg: rwyNum * 10 };
        const hwKt = wc.headwind;
        const wDir = hwKt >= 0 ? "head" : "tail";
        const windActual = Math.abs(hwKt);
        const MAX_HEAD = 15, MAX_TAIL = 5;
        const windClamped = wDir === "head" ? Math.min(windActual, MAX_HEAD) : Math.min(windActual, MAX_TAIL);
        const windWasClamped = windActual > windClamped;

        const res = calculateTakeoff(altVal, oatC, weightVal, windClamped, wDir, "50ft");
        setResult({ ...res, windComponents: wc, windSpd, windActual, windClamped, windWasClamped, windDir: wDir, rwyNum, weightLbs: weightVal, densityAlt: getDensityAlt(altVal, oatC) });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, windComponents, windSpd, rwyNum, windHdg]);

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "18px", letterSpacing: "4px", color: C.green, marginBottom: "6px" }}>TAKEOFF PERFORMANCE</div>
            <div style={{ fontSize: "36px", fontWeight: "bold", letterSpacing: "2px", color: C.text }}>FLAPS 25°</div>
            <div style={{ fontSize: "15px", color: C.dimmer, marginTop: "6px", letterSpacing: "1px" }}>FULL THROTTLE · PAVED/LEVEL/DRY · A/C OFF · FIG 5-9 · FIG 5-13</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <InputField label="PRESSURE ALTITUDE" unit="FT" value={alt} onChange={setAlt} placeholder="e.g. 2000" hint="0 – 8,000 ft" />
            <TempField label="OAT" value={oat} onChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} hint="−10°C to 50°C chart range" />
            <InputField label="GROSS WEIGHT" unit="LBS" value={weight} onChange={setWeight} placeholder="e.g. 2400" hint="2,000 – 2,550 lbs (leave blank for 2,550)" />
            <div>
              <div style={{ fontSize: "12px", letterSpacing: "3px", color: C.green, marginBottom: "8px" }}>WIND</div>
              <Grid3 style={{ marginBottom: "8px" }}>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>RUNWAY</div>
                  <input type="number" value={runway} onChange={e => setRunway(e.target.value.slice(0,2))} placeholder="e.g. 28"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>WIND DIR °</div>
                  <input type="number" value={windHeading} onChange={e => setWindHeading(e.target.value)} placeholder="e.g. 270"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>SPEED KT</div>
                  <input type="number" value={windSpeed} onChange={e => setWindSpeed(e.target.value)} placeholder="e.g. 10"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
              </Grid3>
              {windComponents && (() => {
                const hw = windComponents.headwind;
                const xw = windComponents.crosswind;
                const hwColor = hw >= 0 ? C.green : C.error;
                const hwLabel = hw >= 0 ? "HEADWIND" : "TAILWIND";
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginTop: "4px" }}>
                    <div style={{ background: C.input, border: `1px solid ${hwColor}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: hwColor, marginBottom: "3px" }}>{hwLabel}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: hwColor }}>{Math.abs(hw)} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                    </div>
                    <div style={{ background: C.input, border: `1px solid ${xw > 17 ? C.error : C.cool}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: xw > 17 ? C.error : C.cool, marginBottom: "3px" }}>CROSSWIND {windComponents.crossDir}{xw > 17 ? " ⚠" : ""}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: xw > 17 ? C.error : C.cool }}>{xw} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                      {xw > 17 && <div style={{ fontSize: "9px", color: C.error, letterSpacing: "1px", marginTop: "2px" }}>EXCEEDS 17KT DEMO LIMIT</div>}
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: "13px", color: C.dimmest, marginTop: "6px", letterSpacing: "1px" }}>Chart limit: 15kt headwind · 5kt tailwind · values beyond limit will be clamped</div>
            </div>
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && <RunwayViz result={result} />}
        </Card>
      );
    }

    function Plane({ x, y, angle, color }) {
      const showGear = Math.abs(angle) < 6;
      // PA-28 Archer side profile — fuselage centerline at y=0, nose points right (+x)
      // Scale: ~40px nose to tail
      return (
        <g transform={`translate(${x},${y}) rotate(${angle})`}>
          {/* Fuselage — tapered tube, wider at cabin, narrow at tail */}
          <path d="M 18,0 C 14,-2 6,-4 0,-4 C -10,-4 -16,-3 -20,-2 C -22,-1.5 -22,1.5 -20,2 C -16,3 -10,4 0,4 C 6,4 14,2 18,0 Z" fill={color} />
          {/* Nose spinner */}
          <ellipse cx="19" cy="0" rx="3" ry="2" fill={color} />
          {/* Windscreen — dark glass on top of cabin */}
          <path d="M 4,-4 C 6,-7 10,-8 12,-7 C 10,-4 8,-4 4,-4 Z" fill="#0d1f10" opacity="0.85" />
          {/* Cabin roof line bump */}
          <path d="M 0,-4 C 4,-8 10,-8 13,-6 C 10,-4 6,-4 0,-4 Z" fill={color} opacity="0.9" />
          {/* Main wing — low wing, sweeps back */}
          <path d="M 2,3 L 2,4 L -14,9 L -12,4 Z" fill={color} />
          {/* Wing strut */}
          <line x1="-4" y1="4" x2="-1" y2="9" stroke={color} strokeWidth="0.8" opacity="0.7" />
          {/* Horizontal stabilizer */}
          <path d="M -17,2 L -17,2.5 L -22,5 L -21,2 Z" fill={color} opacity="0.9" />
          {/* Vertical stabilizer */}
          <path d="M -17,-2 L -16,-2 L -19,-9 L -21,-2 Z" fill={color} opacity="0.95" />
          {/* Prop arc */}
          <line x1="22" y1="-5" x2="22" y2="5" stroke={color} strokeWidth="1.8" strokeLinecap="round" opacity="0.9" />
          {/* Landing gear with wheels */}
          {showGear && (
            <g opacity="0.95">
              {/* Main gear strut */}
              <line x1="-2" y1="4" x2="-2" y2="8" stroke={color} strokeWidth="1.2" />
              {/* Main wheel */}
              <circle cx="-2" cy="10" r="2.5" fill="none" stroke={color} strokeWidth="1.4" />
              <circle cx="-2" cy="10" r="0.8" fill={color} />
              {/* Nose gear strut */}
              <line x1="11" y1="4" x2="11" y2="7" stroke={color} strokeWidth="1.1" />
              {/* Nose wheel */}
              <circle cx="11" cy="9" r="2" fill="none" stroke={color} strokeWidth="1.3" />
              <circle cx="11" cy="9" r="0.6" fill={color} />
            </g>
          )}
        </g>
      );
    }

    function RunwayViz({ result }) {
      const dist50 = result.dist50Ft;
      const distGr = result.groundRollFt;
      const markerColor50 = "#ddaa55";
      const markerColorRoll = C.green;
      const centerlineColor = "#3a4a2a";

      const maxDist = dist50 * 1.32;
      const dist50Pct = Math.min(dist50 / maxDist, 0.88);
      const grPct = Math.min(distGr / maxDist, dist50Pct - 0.05);

      const xStart = 26;
      const yRwy   = 95;
      const xGr    = 18 + grPct * 420;
      const x50    = 18 + dist50Pct * 420;
      const xEnd   = Math.min(x50 + 55, 448);
      // Climb arc: plane should be well above the 50ft pole (pole top at y=62)
      // by the time it reaches x50. Push CP1 lower (barely off runway) and CP2 high
      // so the plane passes x50 at around y=30, giving ~32px clearance over pole top.
      const yEnd   = 32;
      const cp1X = xGr + (x50 - xGr) * 0.4;
      const cp1Y = yRwy - 6;   // shallow initially
      const cp2X = xGr + (x50 - xGr) * 0.75;
      const cp2Y = yEnd + 8;   // pulls up well before 50ft marker

      const animRef = useRef(null);
      const [t, setT] = useState(0);
      const [done, setDone] = useState(false);

      useEffect(() => {
        setT(0); setDone(false);
        let start = null;
        const duration = 2800;
        function step(ts) {
          if (!start) start = ts;
          const raw = Math.min((ts - start) / duration, 1);
          const eased = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
          setT(eased);
          if (raw < 1) animRef.current = requestAnimationFrame(step);
          else setDone(true);
        }
        animRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(animRef.current);
      }, [result]);

      const grFrac = grPct / (dist50Pct + 0.08);

      let px, py, angle;
      if (t <= grFrac) {
        const tg = t / grFrac;
        px = xStart + (xGr - xStart) * tg;
        py = yRwy;
        // Gentle nose-up rotation near liftoff
        angle = tg > 0.85 ? (tg - 0.85) / 0.15 * 6 : 0;
      } else {
        const tc = (t - grFrac) / (1 - grFrac);
        const inv = 1 - tc;
        px = inv*inv*inv*xGr + 3*inv*inv*tc*cp1X + 3*inv*tc*tc*cp2X + tc*tc*tc*xEnd;
        py = inv*inv*inv*yRwy + 3*inv*inv*tc*cp1Y + 3*inv*tc*tc*cp2Y + tc*tc*tc*yEnd;
        const dx = 3*inv*inv*(cp1X-xGr) + 6*inv*tc*(cp2X-cp1X) + 3*tc*tc*(xEnd-cp2X);
        const dy = 3*inv*inv*(cp1Y-yRwy) + 6*inv*tc*(cp2Y-cp1Y) + 3*tc*tc*(yEnd-cp2Y);
        // Flight path angle from bezier tangent
        const fpa = -Math.atan2(-dy, dx) * 180 / Math.PI;
        // Extra pitch-up: ramps to +12° quickly then decays — simulates rotation & climb attitude
        const pitchExtra = 12 * Math.pow(tc, 0.3) * Math.pow(1 - tc, 0.6);
        angle = Math.max(0, Math.min(20, fpa + pitchExtra));
      }

      // Auto-sized label box helper
      function LabelBox({ cx, cy, text, color, boxFill="#060a0f" }) {
        const charW = 6.6, padX = 7, h = 15;
        const w = text.length * charW + padX * 2;
        return (
          <>
            <rect x={cx - w/2} y={cy - h + 2} width={w} height={h} rx="2" fill={boxFill} stroke={color} strokeWidth="1" />
            <text x={cx} y={cy} textAnchor="middle" fill={color} fontSize="11" fontFamily="Courier New">{text}</text>
          </>
        );
      }

      return (
        <div style={{ marginTop: "28px" }}>
          <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />

          {result.windWasClamped && (
            <div style={{ background: "#1a1200", border: `1px solid ${C.warm}`, borderRadius: "3px", padding: "10px 14px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{ color: C.warm, fontSize: "16px" }}>⚠</div>
              <div>
                <div style={{ fontSize: "12px", letterSpacing: "2px", color: C.warm, marginBottom: "2px" }}>WIND COMPONENT EXCEEDS CHART LIMIT</div>
                <div style={{ fontSize: "12px", color: C.note, letterSpacing: "1px" }}>
                  Actual {result.windDir === "head" ? "headwind" : "tailwind"}: <strong style={{color: C.text}}>{result.windActual} kt</strong>
                  {" · "}Chart limit: <strong style={{color: C.text}}>{result.windDir === "head" ? "15" : "5"} kt</strong>
                  {" · "}Calculated using <strong style={{color: C.warm}}>{result.windClamped} kt</strong>
                </div>
              </div>
            </div>
          )}

          {/* Density altitude */}
          {(() => {
            const da = result.densityAlt;
            const daColor = da > 5000 ? C.error : da > 3000 ? C.warm : C.green;
            const daLabel = da > 5000 ? "HIGH DA — PERFORMANCE SIGNIFICANTLY DEGRADED" : da > 3000 ? "ELEVATED DA — EXPECT REDUCED PERFORMANCE" : "NORMAL DA";
            return (
              <div style={{ background: C.input, border: `1px solid ${daColor}55`, borderRadius: "3px", padding: "10px 16px", marginBottom: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: "11px", letterSpacing: "3px", color: C.dim, marginBottom: "2px" }}>DENSITY ALTITUDE</div>
                  <div style={{ fontSize: "11px", letterSpacing: "1px", color: daColor }}>{daLabel}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <span style={{ fontSize: "32px", fontWeight: "bold", color: daColor }}>{da.toLocaleString()}</span>
                  <span style={{ fontSize: "13px", color: C.dim, marginLeft: "6px" }}>FT</span>
                </div>
              </div>
            );
          })()}

          <div style={{ background: "#060a0f", border: `1px solid ${C.border}`, borderRadius: "4px", padding: "14px 14px 10px", marginBottom: "14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
              <div style={{ fontSize: "15px", letterSpacing: "3px", color: C.green }}>FLAPS 25° TAKEOFF</div>
              <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.dimmer }}>FULL THROTTLE · PAVED/LEVEL/DRY · A/C OFF</div>
            </div>
            <svg viewBox="0 0 460 165" style={{ width: "100%", display: "block" }}>
              <defs>
                <linearGradient id="rwyGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stopColor="#1e2818" />
                  <stop offset="100%" stopColor="#141c10" />
                </linearGradient>
              </defs>

              {/* Ground */}
              <rect x="0" y="112" width="460" height="53" fill="#080c06" />

              {/* Runway */}
              <rect x="18" y="84" width="424" height="30" rx="2" fill="url(#rwyGrad)" stroke="#2a3a1a" strokeWidth="1" />

              {/* Threshold bars */}
              {[0,1,2,3].map(i => (
                <rect key={i} x={22 + i*6} y="88" width="3" height="22" rx="1" fill="#2a3a1a" />
              ))}

              {/* Centerline dashes */}
              {Array.from({length: 18}).map((_, i) => (
                <rect key={i} x={55 + i*22} y="98" width="12" height="2" rx="1" fill={centerlineColor} />
              ))}

              {/* Climb arc path */}
              <path
                d={`M ${xGr} ${yRwy} C ${cp1X} ${cp1Y} ${cp2X} ${cp2Y} ${xEnd} ${yEnd}`}
                fill="none" stroke={markerColor50} strokeWidth="1.5"
                strokeDasharray="5,3" opacity={done ? 0.5 : 0.15}
              />

              {/* Ground roll marker */}
              <line x1={xGr} y1="84" x2={xGr} y2="116" stroke={markerColorRoll} strokeWidth="1.5" strokeDasharray="3,2" />
              <circle cx={xGr} cy={yRwy} r="2.5" fill={markerColorRoll} />

              {/* 50ft obstacle pole + flag */}
              <line x1={x50} y1="62" x2={x50} y2="116" stroke={markerColor50} strokeWidth="2" />
              <rect x={x50 + 2} y="62" width="17" height="11" rx="1.5" fill={markerColor50} />
              <text x={x50 + 10.5} y="71" textAnchor="middle" fill="#0a0e1a" fontSize="11" fontFamily="Courier New" fontWeight="bold">50</text>

              {/* Ground roll bracket ABOVE runway */}
              {(() => {
                const label = `${distGr} FT · GROUND ROLL`;
                const textW = label.length * 6.6, padX = 7, boxW = textW + padX * 2;
                const cx = (18 + xGr) / 2;
                return (
                  <>
                    <line x1="18" y1="75" x2={xGr} y2="75" stroke={markerColorRoll} strokeWidth="1" opacity="0.7" />
                    <line x1="18" y1="72" x2="18" y2="78" stroke={markerColorRoll} strokeWidth="1" />
                    <line x1={xGr} y1="72" x2={xGr} y2="78" stroke={markerColorRoll} strokeWidth="1" />
                    <rect x={cx - boxW/2} y="61" width={boxW} height="15" rx="2" fill="#060a0f" stroke={markerColorRoll} strokeWidth="0.8" />
                    <text x={cx} y="72" textAnchor="middle" fill={markerColorRoll} fontSize="11" fontFamily="Courier New">{label}</text>
                  </>
                );
              })()}

              {/* 50ft distance bracket BELOW runway */}
              {(() => {
                const label = `${dist50} FT · OVER 50 FT`;
                const textW = label.length * 6.6, padX = 7, boxW = textW + padX * 2;
                const cx = (18 + x50) / 2;
                return (
                  <>
                    <line x1="18" y1="122" x2={x50} y2="122" stroke={markerColor50} strokeWidth="1" opacity="0.7" />
                    <line x1="18" y1="119" x2="18" y2="125" stroke={markerColor50} strokeWidth="1" />
                    <line x1={x50} y1="119" x2={x50} y2="125" stroke={markerColor50} strokeWidth="1" />
                    <rect x={cx - boxW/2} y="127" width={boxW} height="15" rx="2" fill="#060a0f" stroke={markerColor50} strokeWidth="0.8" />
                    <text x={cx} y="138" textAnchor="middle" fill={markerColor50} fontSize="11" fontFamily="Courier New">{label}</text>
                  </>
                );
              })()}

              {/* Runway number near threshold */}
              {result.rwyNum && (
                <text x="36" y="102" textAnchor="middle" fill="#4a6a3a" fontSize="11" fontFamily="Courier New" fontWeight="bold" letterSpacing="1">{String(result.rwyNum).padStart(2,'0')}</text>
              )}

              {/* Wind arrow — top LEFT to avoid plane overlap */}
              {result.windComponents && (() => {
                const wc = result.windComponents;
                const svgDeg = (180 + wc.angle) % 360;
                const rad = svgDeg * Math.PI / 180;
                const cx = 230, cy = 35, len = 28;
                const dx = Math.cos(rad) * len, dy = Math.sin(rad) * len;
                const x1 = cx - dx*0.5, y1 = cy - dy*0.5;
                const x2 = cx + dx*0.5, y2 = cy + dy*0.5;
                const headLen = 7, headAngle = 0.4;
                const hx1 = x2 - headLen*Math.cos(rad-headAngle), hy1 = y2 - headLen*Math.sin(rad-headAngle);
                const hx2 = x2 - headLen*Math.cos(rad+headAngle), hy2 = y2 - headLen*Math.sin(rad+headAngle);
                return (
                  <g opacity="0.9">
                    <circle cx={cx} cy={cy} r="22" fill="#060a0f" stroke={C.border} strokeWidth="1" />
                    {[0,45,90,135,180,225,270,315].map(a => {
                      const r2 = (a-90)*Math.PI/180;
                      return <line key={a} x1={cx+Math.cos(r2)*16} y1={cy+Math.sin(r2)*16} x2={cx+Math.cos(r2)*20} y2={cy+Math.sin(r2)*20} stroke={C.borderDim} strokeWidth="1" />;
                    })}
                    <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={C.cool} strokeWidth="2" />
                    <polygon points={`${x2},${y2} ${hx1},${hy1} ${hx2},${hy2}`} fill={C.cool} />
                    <text x={cx} y={cy-27} textAnchor="middle" fill={C.dimmest} fontSize="8" fontFamily="Courier New" letterSpacing="1">WIND / RWY</text>
                    <text x={cx} y={cy+33} textAnchor="middle" fill={C.cool} fontSize="9" fontFamily="Courier New">{result.windSpd}KT/{wc.angle===0?'HW':wc.angle===180?'TW':`XW-${wc.crossDir}`}</text>
                  </g>
                );
              })()}

              {/* Animated Archer — same real SVG silhouette as landing viz */}
              <g transform={`translate(${px},${py}) rotate(${-angle}) scale(-0.11, 0.11)`}>
                <g transform="translate(-290,-110)">
                  <g transform="translate(0,241) scale(0.1,-0.1)" fill={markerColorRoll} stroke="none">

    // ============================================================
    // FIGURE 5-41: LANDING PERFORMANCE (50 FT BARRIER)

    const ldPanel1 = {

    // ── FIG 5-43: LANDING GROUND ROLL panels ──
    // Panel 1: OAT + Alt → ref1gr (range ~570–1300)
    // ISA lines: SL ISA=15°C, 2000ft ISA=11°C, 4000ft ISA=7°C, 6000ft ISA=3°C, 7000ft ISA=1°C
    const ldGrPanel1 = {
      "SL":   [[0,863],  [22,940],  [50,1037]],

      "4000": [[-7,967], [17,1060], [40,1140]],

    const ldGrPanel1Alts = [0, 2000, 4000, 6000, 7000];
    const ldGrPanel1Keys = ["SL","2000","4000","6000","7000"];

    // Panel 2: ref1gr + Weight → ref2gr
    const ldGrPanel2 = {
      860:  [[2000,670],[2150,720],[2250,760],[2350,795],[2450,825],[2550,860]],

      1290: [[2000,1035],[2150,1100],[2250,1150],[2350,1195],[2450,1240],[2550,1290]],
    };

    // Panel 3: ref2gr + Wind → ground roll distance
    // headwind positive (reduces dist), tailwind negative (increases dist)
    const ldGrPanel3 = {
      700:  [[-5,900],  [0,700],  [5,635],  [7.2,600], [10,600], [15,600]],
      800:  [[-5,1020], [0,800],  [5,730],  [10,660],  [14,600], [15,600]],

    function calculateLanding(altFt, oatC, weightLbs, windKt, windDir) {
      const windVal = windDir === "tail" ? -windKt : windKt; // positive = headwind reduces dist

      // Panel 1: alt+OAT → ref1
      const clampedAlt = Math.max(0, Math.min(7000, altFt));
      let loIdx = 0;
      for (let i = 0; i < ldPanel1Alts.length - 1; i++) {
        if (clampedAlt >= ldPanel1Alts[i] && clampedAlt <= ldPanel1Alts[i+1]) { loIdx = i; break; }
        if (clampedAlt >= ldPanel1Alts[ldPanel1Alts.length-1]) loIdx = ldPanel1Alts.length-2;
      }
      const altFrac = ldPanel1Alts[loIdx] === ldPanel1Alts[loIdx+1] ? 0 :
        (clampedAlt - ldPanel1Alts[loIdx]) / (ldPanel1Alts[loIdx+1] - ldPanel1Alts[loIdx]);

      function p1Interp(key) {
        const pts = ldPanel1[key];
        const clampedOAT = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], oatC));
        for (let i = 0; i < pts.length-1; i++) {
          if (clampedOAT >= pts[i][0] && clampedOAT <= pts[i+1][0]) {
            const t = (clampedOAT - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref1 = p1Interp(ldPanel1Keys[loIdx]) + altFrac *
        (p1Interp(ldPanel1Keys[loIdx+1]) - p1Interp(ldPanel1Keys[loIdx]));

      // Panel 2: ref1+weight → ref2
      const p2Keys = Object.keys(ldPanel2).map(Number).sort((a,b)=>a-b);
      let p2Lo = p2Keys[0], p2Hi = p2Keys[0];
      for (let i = 0; i < p2Keys.length-1; i++) {
        if (ref1 >= p2Keys[i] && ref1 <= p2Keys[i+1]) { p2Lo = p2Keys[i]; p2Hi = p2Keys[i+1]; break; }
      }
      if (ref1 >= p2Keys[p2Keys.length-1]) { p2Lo = p2Hi = p2Keys[p2Keys.length-1]; }
      const p2Frac = p2Lo === p2Hi ? 0 : (ref1 - p2Lo) / (p2Hi - p2Lo);

      function p2Interp(refKey) {
        const pts = ldPanel2[refKey];
        const clampedW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], weightLbs));
        for (let i = 0; i < pts.length-1; i++) {
          if (clampedW >= pts[i][0] && clampedW <= pts[i+1][0]) {
            const t = (clampedW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref2 = p2Interp(p2Lo) + p2Frac * (p2Interp(p2Hi) - p2Interp(p2Lo));

      // Panel 3: ref2+wind → landing dist
      const p3Keys = Object.keys(ldPanel3).map(Number).sort((a,b)=>a-b);
      let p3Lo = p3Keys[0], p3Hi = p3Keys[0];
      for (let i = 0; i < p3Keys.length-1; i++) {
        if (ref2 >= p3Keys[i] && ref2 <= p3Keys[i+1]) { p3Lo = p3Keys[i]; p3Hi = p3Keys[i+1]; break; }
      }
      if (ref2 >= p3Keys[p3Keys.length-1]) { p3Lo = p3Hi = p3Keys[p3Keys.length-1]; }
      const p3Frac = p3Lo === p3Hi ? 0 : (ref2 - p3Lo) / (p3Hi - p3Lo);

      function p3Interp(refKey) {
        const pts = ldPanel3[refKey];
        // wind: positive = headwind (reduces dist), negative = tailwind (increases dist)
        // pts stored as [windKt_head_positive, dist] but tailwind stored negative
        const clampedW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], windVal));
        for (let i = 0; i < pts.length-1; i++) {
          if (clampedW >= pts[i][0] && clampedW <= pts[i+1][0]) {
            const t = (clampedW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const distFt = p3Interp(p3Lo) + p3Frac * (p3Interp(p3Hi) - p3Interp(p3Lo));

      return {
        distFt: Math.round(distFt),
        ref1: Math.round(ref1),
        ref2: Math.round(ref2),
        isaDeviation: getISADeviation(altFt, oatC),
        isaTemp: getISATemp(altFt),
      };
    }

    function calculateLandingGR(altFt, oatC, weightLbs, windKt, windDir) {
      const windVal = windDir === "tail" ? -windKt : windKt;
      const clampedAlt = Math.max(0, Math.min(7000, altFt));

      // Panel 1: alt+OAT → ref1gr
      let loIdx = 0;
      for (let i = 0; i < ldGrPanel1Alts.length - 1; i++) {
        if (clampedAlt >= ldGrPanel1Alts[i] && clampedAlt <= ldGrPanel1Alts[i+1]) { loIdx = i; break; }
        if (clampedAlt >= ldGrPanel1Alts[ldGrPanel1Alts.length-1]) loIdx = ldGrPanel1Alts.length-2;
      }
      const altFrac = ldGrPanel1Alts[loIdx] === ldGrPanel1Alts[loIdx+1] ? 0 :
        (clampedAlt - ldGrPanel1Alts[loIdx]) / (ldGrPanel1Alts[loIdx+1] - ldGrPanel1Alts[loIdx]);

      function gr1Interp(key) {
        const pts = ldGrPanel1[key];
        const cOAT = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], oatC));
        for (let i = 0; i < pts.length-1; i++) {
          if (cOAT >= pts[i][0] && cOAT <= pts[i+1][0]) {
            const t = (cOAT - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref1gr = gr1Interp(ldGrPanel1Keys[loIdx]) + altFrac *
        (gr1Interp(ldGrPanel1Keys[loIdx+1]) - gr1Interp(ldGrPanel1Keys[loIdx]));

      // Panel 2: ref1gr+weight → ref2gr
      const p2Keys = Object.keys(ldGrPanel2).map(Number).sort((a,b)=>a-b);
      let p2Lo = p2Keys[0], p2Hi = p2Keys[0];
      for (let i = 0; i < p2Keys.length-1; i++) {
        if (ref1gr >= p2Keys[i] && ref1gr <= p2Keys[i+1]) { p2Lo = p2Keys[i]; p2Hi = p2Keys[i+1]; break; }
      }
      if (ref1gr >= p2Keys[p2Keys.length-1]) { p2Lo = p2Hi = p2Keys[p2Keys.length-1]; }
      const p2Frac = p2Lo === p2Hi ? 0 : (ref1gr - p2Lo) / (p2Hi - p2Lo);

      function gr2Interp(refKey) {
        const pts = ldGrPanel2[refKey];
        const cW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], weightLbs));
        for (let i = 0; i < pts.length-1; i++) {
          if (cW >= pts[i][0] && cW <= pts[i+1][0]) {
            const t = (cW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      const ref2gr = gr2Interp(p2Lo) + p2Frac * (gr2Interp(p2Hi) - gr2Interp(p2Lo));

      // Panel 3: ref2gr+wind → ground roll
      const p3Keys = Object.keys(ldGrPanel3).map(Number).sort((a,b)=>a-b);
      let p3Lo = p3Keys[0], p3Hi = p3Keys[0];
      for (let i = 0; i < p3Keys.length-1; i++) {
        if (ref2gr >= p3Keys[i] && ref2gr <= p3Keys[i+1]) { p3Lo = p3Keys[i]; p3Hi = p3Keys[i+1]; break; }
      }
      if (ref2gr >= p3Keys[p3Keys.length-1]) { p3Lo = p3Hi = p3Keys[p3Keys.length-1]; }
      const p3Frac = p3Lo === p3Hi ? 0 : (ref2gr - p3Lo) / (p3Hi - p3Lo);

      function gr3Interp(refKey) {
        const pts = ldGrPanel3[refKey];
        const cW = Math.max(pts[0][0], Math.min(pts[pts.length-1][0], windVal));
        for (let i = 0; i < pts.length-1; i++) {
          if (cW >= pts[i][0] && cW <= pts[i+1][0]) {
            const t = (cW - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
            return pts[i][1] + t * (pts[i+1][1] - pts[i][1]);
          }
        }
        return pts[pts.length-1][1];
      }
      return Math.round(gr3Interp(p3Lo) + p3Frac * (gr3Interp(p3Hi) - gr3Interp(p3Lo)));
    }

    function LandingTab({ savedState, onStateChange }) {
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [surface, setSurface] = useState(savedState.surface || "paved");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight, runway, windHeading, windSpeed, surface, result });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, surface, result]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum * 10) % 360;
        const angle = (windHdg - rwyHdg + 360) % 360;
        const rad = angle * Math.PI / 180;
        const headwind = Math.round(windSpd * Math.cos(rad) * 10) / 10;
        const crosswind = Math.round(Math.abs(windSpd * Math.sin(rad)) * 10) / 10;
        const crossDir = (angle > 0 && angle < 180) ? "R" : "L";
        return { headwind, crosswind, crossDir, angle, rwyHdg };
      }

      const windSpd = parseFloat(windSpeed) || 0;
      const rwyNum = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum) && !isNaN(windHdg) && windSpd > 0 && rwyNum >= 1 && rwyNum <= 36)
        ? getWindComponents(rwyNum, windHdg, windSpd) : null;

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 2550;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC - 32) * 5/9;
        if (altVal < 0 || altVal > 7000) { setError("Altitude must be 0 – 7,000 ft."); return; }
        if (weightVal < 2000 || weightVal > 2550) { setError("Weight must be 2,000 – 2,550 lbs."); return; }
        if (isNaN(rwyNum) || rwyNum < 1 || rwyNum > 36) { setError("Please enter a valid runway number (01–36)."); return; }
        if (isNaN(windHdg) || windHdg < 0 || windHdg > 360) { setError("Please enter a valid wind direction (0–360°)."); return; }

        const wc = windComponents || { headwind: 0, crosswind: 0, crossDir: "R", angle: 0, rwyHdg: rwyNum * 10 };
        const hwKt = wc.headwind;
        const windDir = hwKt >= 0 ? "head" : "tail";
        const windActual = Math.abs(hwKt);
        const MAX_HEAD = 15, MAX_TAIL = 5;
        const windClamped = windDir === "head" ? Math.min(windActual, MAX_HEAD) : Math.min(windActual, MAX_TAIL);
        const windWasClamped = windActual > windClamped;

        setResult({
          ...calculateLanding(altVal, oatC, weightVal, windClamped, windDir),
          groundRollFt: calculateLandingGR(altVal, oatC, weightVal, windClamped, windDir),
          windComponents: wc,
          windSpd,
          windActual,
          windClamped,
          windWasClamped,
          windDir,
          rwyNum,
        });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, windComponents, windSpd, rwyNum, windHdg]);

      return (
        <Card>
          <div style={{ marginBottom: "28px", paddingBottom: "20px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontSize: "12px", letterSpacing: "4px", color: C.green, marginBottom: "6px" }}>LANDING PERFORMANCE</div>
            <div style={{ fontSize: "28px", fontWeight: "bold", letterSpacing: "2px", color: C.text }}>FLAPS 40°</div>
            <div style={{ fontSize: "13px", color: C.dimmer, marginTop: "6px", letterSpacing: "1px" }}>POWER OFF · 66 KIAS · FULL STALL · MAX BRAKING · PAVED/LEVEL/DRY · FIG 5-41</div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: "20px", marginBottom: "28px" }}>
            <InputField label="PRESSURE ALTITUDE" unit="FT" value={alt} onChange={setAlt} placeholder="e.g. 2500" hint="0 – 7,000 ft" />
            <TempField label="OAT" value={oat} onChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} hint="−10°C to 50°C chart range" />
            <InputField label="GROSS WEIGHT" unit="LBS" value={weight} onChange={setWeight} placeholder="e.g. 2400" hint="2,000 – 2,550 lbs (leave blank for 2,550)" />
            <div>
              <div style={{ fontSize: "12px", letterSpacing: "3px", color: C.green, marginBottom: "8px" }}>WIND</div>
              <Grid3 style={{ marginBottom: "8px" }}>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>RUNWAY</div>
                  <input type="number" value={runway} onChange={e => setRunway(e.target.value.slice(0,2))} placeholder="e.g. 28"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>WIND DIR °</div>
                  <input type="number" value={windHeading} onChange={e => setWindHeading(e.target.value)} placeholder="e.g. 270"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
                <div>
                  <div style={{ fontSize: "11px", color: C.dim, letterSpacing: "2px", marginBottom: "4px" }}>SPEED KT</div>
                  <input type="number" value={windSpeed} onChange={e => setWindSpeed(e.target.value)} placeholder="e.g. 10"
                    style={{ width: "100%", boxSizing: "border-box", background: C.input, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "11px 14px", color: C.text, fontFamily: mono, fontSize: "18px" }} />
                </div>
              </Grid3>
              {windComponents && (() => {
                const hw = windComponents.headwind;
                const xw = windComponents.crosswind;
                const hwColor = hw >= 0 ? C.green : C.error;
                const hwLabel = hw >= 0 ? "HEADWIND" : "TAILWIND";
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginTop: "4px" }}>
                    <div style={{ background: C.input, border: `1px solid ${hwColor}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: hwColor, marginBottom: "3px" }}>{hwLabel}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: hwColor }}>{Math.abs(hw)} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                    </div>
                    <div style={{ background: C.input, border: `1px solid ${xw > 17 ? C.error : C.cool}55`, borderRadius: "3px", padding: "8px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "2px", color: xw > 17 ? C.error : C.cool, marginBottom: "3px" }}>CROSSWIND {windComponents.crossDir}{xw > 17 ? " ⚠" : ""}</div>
                      <div style={{ fontSize: "22px", fontWeight: "bold", color: xw > 17 ? C.error : C.cool }}>{xw} <span style={{ fontSize: "12px", color: C.dim }}>KT</span></div>
                      {xw > 17 && <div style={{ fontSize: "9px", color: C.error, letterSpacing: "1px", marginTop: "2px" }}>EXCEEDS 17KT DEMO LIMIT</div>}
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: "13px", color: C.dimmest, marginTop: "6px", letterSpacing: "1px" }}>Chart limit: 15kt headwind · 5kt tailwind · values beyond limit will be clamped</div>
            </div>
          </div>

          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && <LandingViz result={result} />}
        </Card>
      );
    }

    function LandingViz({ result }) {
      const dist50 = result.distFt;
      const distGr = result.groundRollFt;
      const wc = result.windComponents;
      const markerColor50 = "#ddaa55";
      const markerColorRoll = C.green;
      const centerlineColor = "#3a4a2a";

      const animRef = useRef(null);
      const [t, setT] = useState(0);
      const [done, setDone] = useState(false);

      useEffect(() => {
        setT(0); setDone(false);
        let start = null;
        const duration = 3000;
        function step(ts) {
          if (!start) start = ts;
          const raw = Math.min((ts - start) / duration, 1);
          const eased = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
          setT(eased);
          if (raw < 1) animRef.current = requestAnimationFrame(step);
          else setDone(true);
        }
        animRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(animRef.current);
      }, [result]);

      // Layout — plane comes from left, obstacle near left, runway spans to right
      const yRwy    = 95;
      const xObs    = 95;   // 50ft obstacle
      const xTd     = 185;  // touchdown point
      const xStop   = 405;  // end of rollout

      // Obstacle pole top is at y=52. Approach path must pass at y≤30 at xObs.
      // Start high-left, arc gently downward, clear obstacle with margin, flare to touchdown
      const xStart  = 8;
      const yStart  = 14;
      const cp1X = xObs - 40;
      const cp1Y = 12;      // path stays near y=12-18 as it passes xObs → well above pole top at y=52
      const cp2X = xTd - 30;
      const cp2Y = yRwy - 20;

      // Phase fractions
      const approachFrac = 0.50;

      let px, py, angle;
      if (t <= approachFrac) {
        const tc = t / approachFrac;
        const inv = 1 - tc;
        px = inv*inv*inv*xStart + 3*inv*inv*tc*cp1X + 3*inv*tc*tc*cp2X + tc*tc*tc*xTd;
        py = inv*inv*inv*yStart + 3*inv*inv*tc*cp1Y + 3*inv*tc*tc*cp2Y + tc*tc*tc*yRwy;
        const dx = 3*inv*inv*(cp1X-xStart) + 6*inv*tc*(cp2X-cp1X) + 3*tc*tc*(xTd-cp2X);
        const dy = 3*inv*inv*(cp1Y-yStart) + 6*inv*tc*(cp2Y-cp1Y) + 3*tc*tc*(yRwy-cp2Y);
        // Compute path angle but clamp to gentle descent — max ~6° nose-down, always slight nose-up feel
        const rawAngle = Math.atan2(dy, dx) * 180 / Math.PI; // positive = nose down in svg coords
        angle = Math.max(-3, Math.min(6, rawAngle)) - 3; // clamp, offset -3 for slight nose-up AOA
      } else {
        const tg = (t - approachFrac) / (1 - approachFrac);
        px = xTd + (xStop - xTd) * tg;
        py = yRwy;
        angle = -2; // slight nose-up on rollout
      }

      const showGear = py >= yRwy - 10;

      // PA-28 Archer — proper low-wing tricycle, nose right
      // Distinctive features: long cowl, short cabin, low straight wing with strut, swept fin
      // PA-28 Archer III — real SVG silhouette paths from b3mt501.svg
      // Original SVG: 600x241, transform="translate(0,241) scale(0.1,-0.1)"
      // We re-center at origin and scale to fit ~80px wide in our animation space
      function ArcherPlane({ x, y, ang, color }) {
        // Combined transform:
        //   1. Original path->svg: translate(0,241) scale(0.1,-0.1)  [baked into path coords]
        //   2. Re-center at plane centroid (svg ~290,110): translate(-290,-110)
        //   3. Scale to animation size (540svg -> 80px): scale(0.148)
        // Net single transform applied to raw-path <g>: translate(-290,-110) scale(0.1,-0.1) then outer scale(0.148)
        // Simplified: one <g transform="scale(0.148) translate(-290,-110)"> wrapping a <g transform="translate(0,241) scale(0.1,-0.1)">
        return (
          <g transform={`translate(${x},${y}) rotate(${-ang}) scale(-0.11, 0.11)`}>
            <g transform="translate(-290,-110)">
              <g transform="translate(0,241) scale(0.1,-0.1)" fill={color} stroke="none">
                <path d="M5515 2261 c-146 -7 -165 -14 -214 -81 -30 -42 -53 -70 -158 -195 -38 -45 -86 -103 -108 -130 -173 -211 -239 -278 -320 -324 -95 -55 -136 -61 -397 -61 -132 0 -238 4 -238 9 0 12 85 128 122 168 17 17 28 37 26 43 -2 7 -46 -40 -98 -104 l-95 -117 -116 5 c-64 4 -181 15 -260 27 -79 11 -163 23 -186 26 -39 5 -55 16 -35 25 14 5 152 184 152 197 0 6 -7 11 -16 11 -16 0 -58 -35 -194 -159 -32 -29 -65 -51 -78 -51 -12 0 -68 7 -123 15 -56 9 -262 36 -458 61 -543 70 -832 72 -1011 7 -76 -28 -405 -202 -484 -256 -23 -16 -54 -22 -160 -28 -261 -15 -605 -60 -735 -96 -21 -5 -23 -4 -15 13 13 26 10 214 -6 437 -11 162 -15 187 -29 185 -11 -2 -17 -16 -18 -48 -2 -25 -10 -130 -19 -234 -8 -104 -14 -232 -13 -284 l2 -94 -56 -22 c-63 -26 -138 -69 -161 -92 -23 -22 -20 -59 7 -76 31 -20 125 -56 169 -65 l37 -8 5 -160 c3 -88 10 -198 16 -245 5 -47 10 -114 10 -150 0 -77 8 -110 25 -110 13 0 19 43 30 220 22 321 22 335 9 380 -14 47 -9 67 9 35 18 -34 90 -100 138 -129 38 -21 48 -34 53 -61 4 -19 11 -35 16 -35 6 0 10 -27 10 -60 0 -64 8 -73 33 -38 l16 23 0 -22 c1 -29 8 -29 32 -1 10 13 18 39 19 61 0 42 21 51 37 14 11 -24 53 -42 125 -52 34 -4 45 -10 42 -20 -3 -7 -1 -16 4 -19 9 -5 -8 -102 -23 -125 -3 -6 -17 -11 -30 -11 -36 0 -155 -66 -203 -113 -50 -49 -54 -81 -15 -129 32 -39 44 -48 54 -42 4 2 14 -7 23 -21 9 -13 36 -36 61 -51 36 -21 54 -25 86 -21 56 7 110 38 137 77 12 19 29 35 36 36 8 1 66 19 131 40 100 33 121 44 145 74 45 58 82 132 71 143 -6 6 -62 3 -159 -8 -147 -17 -235 -15 -248 6 -3 6 6 24 21 39 30 31 30 24 -1 130 -4 14 -4 22 0 19 3 -3 35 0 71 6 52 10 127 10 363 0 163 -8 442 -17 618 -21 l321 -7 2 -57 1 -57 -42 -7 c-137 -22 -257 -134 -219 -204 15 -27 57 -50 110 -58 26 -4 41 -12 41 -21 0 -23 71 -82 108 -89 32 -6 32 -7 32 -65 l0 -59 35 0 35 0 0 65 c0 50 3 65 15 65 22 0 86 61 101 96 12 27 24 35 81 54 130 42 149 51 166 80 20 32 22 66 6 76 -6 4 -61 19 -123 34 -100 24 -111 29 -108 48 2 11 -4 34 -12 51 -30 56 -27 58 97 60 63 1 135 -3 162 -9 38 -9 50 -8 59 3 8 10 56 18 164 27 85 6 156 9 159 6 8 -8 -28 -47 -38 -41 -11 8 -23 -15 -12 -26 4 -4 26 -6 47 -2 30 5 44 15 65 44 20 30 33 38 56 39 17 0 47 4 68 9 l37 9 0 -344 c0 -296 2 -344 15 -344 12 0 15 22 18 113 l3 112 2 -112 c2 -93 5 -113 17 -113 13 0 15 45 15 345 l0 344 33 5 c17 3 212 26 432 51 220 25 436 50 480 55 113 14 307 37 465 55 130 15 176 20 231 30 16 2 41 -5 65 -20 61 -38 108 -30 85 14 -10 17 -5 20 57 30 123 21 190 54 214 106 10 21 18 23 149 30 104 5 139 10 139 20 0 13 -12 16 -201 46 l-77 13 -12 51 c-13 56 -19 30 117 490 20 66 48 163 64 215 15 52 42 142 59 200 42 141 50 172 44 182 -6 9 -98 8 -309 -1z"/>
                <path d="M3165 1457 c-22 -4 -51 -6 -65 -3 -14 2 -32 1 -40 -4 -8 -4 -38 -10 -67 -13 -29 -3 -57 -8 -62 -12 -6 -3 -20 -1 -32 6 -15 8 -19 8 -15 0 7 -11 -8 -13 -126 -16 -21 -1 -41 -5 -45 -8 -3 -4 -17 -7 -29 -7 -13 0 -25 -3 -28 -8 -4 -8 33 -7 94 3 29 4 105 12 281 30 97 10 209 29 209 36 0 9 -20 8 -75 -4z"/>
              </g>
            </g>
          </g>
        );
      }
      return (
        <div style={{ marginTop: "28px" }}>
          <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />

          {result.windWasClamped && (
            <div style={{ background: "#1a1200", border: `1px solid ${C.warm}`, borderRadius: "3px", padding: "10px 14px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{ color: C.warm, fontSize: "16px" }}>⚠</div>
              <div>
                <div style={{ fontSize: "12px", letterSpacing: "2px", color: C.warm, marginBottom: "2px" }}>WIND COMPONENT EXCEEDS CHART LIMIT</div>
                <div style={{ fontSize: "12px", color: C.note, letterSpacing: "1px" }}>
                  Actual {result.windDir === "head" ? "headwind" : "tailwind"}: <strong style={{color: C.text}}>{result.windActual} kt</strong>
                  {" · "}Chart limit: <strong style={{color: C.text}}>{result.windDir === "head" ? "15" : "5"} kt</strong>
                  {" · "}Calculated using <strong style={{color: C.warm}}>{result.windClamped} kt</strong>
                </div>
              </div>
            </div>
          )}

          <div style={{ background: "#060a0f", border: `1px solid ${C.border}`, borderRadius: "4px", padding: "14px 14px 10px", marginBottom: "14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
              <div style={{ fontSize: "15px", letterSpacing: "3px", color: C.green }}>FLAPS 40° LANDING</div>
              <div style={{ fontSize: "13px", letterSpacing: "2px", color: C.dimmer }}>POWER OFF · MAX BRAKING · PAVED/LEVEL/DRY</div>
            </div>
            <svg viewBox="0 0 460 165" style={{ width: "100%", display: "block" }}>
              <defs>
                <linearGradient id="rwyGradLd" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stopColor="#1e2818" />
                  <stop offset="100%" stopColor="#141c10" />
                </linearGradient>
              </defs>

              {/* Ground */}
              <rect x="0" y="112" width="460" height="40" fill="#080c06" />

              {/* Runway */}
              <rect x="18" y="84" width="424" height="30" rx="2" fill="url(#rwyGradLd)" stroke="#2a3a1a" strokeWidth="1" />

              {/* Threshold bars on LEFT (approach end) */}
              {[0,1,2,3].map(i => (
                <rect key={i} x={22 + i*6} y="88" width="3" height="22" rx="1" fill="#2a3a1a" />
              ))}

              {/* Runway number near threshold */}
              {result.windComponents && result.rwyNum && (
                <text x="44" y="102" textAnchor="middle" fill="#4a6a3a" fontSize="11" fontFamily="Courier New" fontWeight="bold" letterSpacing="1">{String(result.rwyNum).padStart(2,'0')}</text>
              )}

              {/* Centerline dashes */}
              {Array.from({length: 18}).map((_, i) => (
                <rect key={i} x={55 + i*22} y="98" width="12" height="2" rx="1" fill={centerlineColor} />
              ))}

              {/* Approach path arc */}
              <path
                d={`M ${xStart} ${yStart} C ${cp1X} ${cp1Y} ${cp2X} ${cp2Y} ${xTd} ${yRwy}`}
                fill="none" stroke={markerColor50} strokeWidth="1.5"
                strokeDasharray="5,3" opacity={done ? 0.45 : 0.12}
              />

              {/* 50ft obstacle pole + flag — pole top at y=56, well below approach path */}
              <line x1={xObs} y1="56" x2={xObs} y2="116" stroke={markerColor50} strokeWidth="2" />
              <rect x={xObs + 2} y="56" width="17" height="11" rx="1.5" fill={markerColor50} />
              <text x={xObs + 10.5} y="65" textAnchor="middle" fill="#0a0e1a" fontSize="11" fontFamily="Courier New" fontWeight="bold">50</text>

              {/* Touchdown marker */}
              <line x1={xTd} y1="84" x2={xTd} y2="116" stroke={markerColorRoll} strokeWidth="1.5" strokeDasharray="3,2" />
              <circle cx={xTd} cy={yRwy} r="2.5" fill={markerColorRoll} />

              {/* Stop marker */}
              <line x1={xStop} y1="84" x2={xStop} y2="114" stroke={markerColor50} strokeWidth="1.5" strokeDasharray="3,2" />
              <circle cx={xStop} cy={yRwy} r="2.5" fill={markerColor50} />

              {/* Ground roll span line + label box ABOVE runway */}
              {(() => {
                const label = `${distGr} FT · GROUND ROLL`;
                const textW = label.length * 6.6;
                const padX = 7;
                const boxW = textW + padX * 2;
                const cx = (xTd + xStop) / 2;
                return (
                  <>
                    <line x1={xTd} y1="75" x2={xStop} y2="75" stroke={markerColorRoll} strokeWidth="1" opacity="0.7" />
                    <line x1={xTd} y1="72" x2={xTd} y2="78" stroke={markerColorRoll} strokeWidth="1" />
                    <line x1={xStop} y1="72" x2={xStop} y2="78" stroke={markerColorRoll} strokeWidth="1" />
                    <rect x={cx - boxW/2} y="61" width={boxW} height="15" rx="2" fill="#060a0f" stroke={markerColorRoll} strokeWidth="0.8" />
                    <text x={cx} y="72" textAnchor="middle" fill={markerColorRoll} fontSize="11" fontFamily="Courier New">{label}</text>
                  </>
                );
              })()}

              {/* Distance span line + auto-sized label box below runway */}
              {(() => {
                const label = `${dist50} FT · OVER 50 FT`;
                // Courier New 11px: ~6.6px per char is a reliable estimate
                const textW = label.length * 6.6;
                const padX = 7;
                const boxW = textW + padX * 2;
                const cx = (xObs + xStop) / 2;
                return (
                  <>
                    <line x1={xObs} y1="122" x2={xStop} y2="122" stroke={markerColor50} strokeWidth="1" opacity="0.7" />
                    <line x1={xObs} y1="119" x2={xObs} y2="125" stroke={markerColor50} strokeWidth="1" />
                    <line x1={xStop} y1="119" x2={xStop} y2="125" stroke={markerColor50} strokeWidth="1" />
                    <rect x={cx - boxW/2} y="127" width={boxW} height="15" rx="2" fill="#060a0f" stroke={markerColor50} strokeWidth="0.8" />
                    <text x={cx} y="138" textAnchor="middle" fill={markerColor50} fontSize="11" fontFamily="Courier New">{label}</text>
                  </>
                );
              })()}

              {/* Wind arrow */}
              {wc && (() => {
                // Arrow points toward wind source. SVG: 0°=right, 90°=down, 180°=left, 270°=up
                // wc.angle: 0=headwind→left(180°), 90=XW-right→up(270°), 180=tailwind→right(0°), 270=XW-left→down(90°)
                // Mapping: svgDeg = (180 + wc.angle + 90) % 360 ... test:
                // 0→(270)%360=270 ✗ need 180. Try: svgDeg = (180 - wc.angle + 360) % 360
                // 0→180 ✓, 90→90 ✗(need 270), 180→0 ✓, 270→270 ✗(need 90)
                // Need: 0→180, 90→270, 180→0(=360), 270→90 → svgDeg = (180 + wc.angle) % 360... 
                // 0→180✓, 90→270✓, 180→0✓, 270→90✓
                const svgDeg = (180 + wc.angle) % 360;
                const rad = svgDeg * Math.PI / 180;
                const cx = 420, cy = 35;
                const len = 28;
                const dx = Math.cos(rad) * len;
                const dy = Math.sin(rad) * len;
                const x1 = cx - dx * 0.5, y1 = cy - dy * 0.5;
                const x2 = cx + dx * 0.5, y2 = cy + dy * 0.5;
                const headLen = 7, headAngle = 0.4;
                const hx1 = x2 - headLen * Math.cos(rad - headAngle);
                const hy1 = y2 - headLen * Math.sin(rad - headAngle);
                const hx2 = x2 - headLen * Math.cos(rad + headAngle);
                const hy2 = y2 - headLen * Math.sin(rad + headAngle);
                return (
                  <g opacity="0.9">
                    <circle cx={cx} cy={cy} r="22" fill="#060a0f" stroke={C.border} strokeWidth="1" />
                    {[0,45,90,135,180,225,270,315].map(a => {
                      const r2 = (a - 90) * Math.PI / 180;
                      return <line key={a} x1={cx + Math.cos(r2)*16} y1={cy + Math.sin(r2)*16} x2={cx + Math.cos(r2)*20} y2={cy + Math.sin(r2)*20} stroke={C.borderDim} strokeWidth="1" />;
                    })}
                    <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={C.cool} strokeWidth="2" />
                    <polygon points={`${x2},${y2} ${hx1},${hy1} ${hx2},${hy2}`} fill={C.cool} />
                    <text x={cx} y={cy - 27} textAnchor="middle" fill={C.dimmest} fontSize="8" fontFamily="Courier New" letterSpacing="1">WIND / RWY</text>
                    <text x={cx} y={cy + 33} textAnchor="middle" fill={C.cool} fontSize="9" fontFamily="Courier New">{result.windSpd}KT/{wc.angle === 0 ? 'HW' : wc.angle === 180 ? 'TW' : `XW-${wc.crossDir}`}</text>
                  </g>
                );
              })()}

              {/* Animated Archer */}
              <ArcherPlane x={px} y={py} ang={angle} color={markerColorRoll} />

            </svg>
          </div>

          {/* Result cards */}
          <Grid2 style={{ marginBottom: "12px" }}>
            <div style={{ background: C.input, border: `1px solid ${markerColorRoll}`, borderRadius: "3px", padding: "16px", textAlign: "center" }}>
              <div style={{ fontSize: "15px", letterSpacing: "2px", color: markerColorRoll, marginBottom: "8px" }}>GROUND ROLL</div>
              <div style={{ fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" }}>{distGr}</div>
              <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "3px" }}>FEET · FIG 5-43</div>
            </div>
            <div style={{ background: C.input, border: `1px solid ${markerColor50}`, borderRadius: "3px", padding: "16px", textAlign: "center" }}>
              <div style={{ fontSize: "15px", letterSpacing: "2px", color: markerColor50, marginBottom: "8px" }}>OVER 50 FT</div>
              <div style={{ fontSize: "44px", color: C.text, lineHeight: 1, fontWeight: "bold" }}>{dist50}</div>
              <div style={{ fontSize: "13px", color: C.dim, marginTop: "6px", letterSpacing: "3px" }}>FEET · FIG 5-41</div>
            </div>
          </Grid2>

          {/* 1.5x safety buffer */}
          <Grid2 style={{ marginBottom: "12px" }}>
            {[{val: Math.round(distGr * 1.5), label: "GROUND ROLL ×1.5", color: markerColorRoll},

    // C172S NAV III — PERFORMANCE DATA

    // Fig 5-6: Maximum Rate of Climb at 2550 LB
    // Flaps UP, Full Throttle, Mixture leaned above 3000ft
    const c172RocTable = {
      0:     { '-20': 855, '0': 785, '20': 710, '40': 645 },
      2000:  { '-20': 760, '0': 695, '20': 625, '40': 560 },
      4000:  { '-20': 685, '0': 620, '20': 555, '40': 495 },
      6000:  { '-20': 575, '0': 515, '20': 450, '40': 390 },
      8000:  { '-20': 465, '0': 405, '20': 345, '40': 285 },
      10000: { '-20': 360, '0': 300, '20': 240, '40': 180 },
      12000: { '-20': 255, '0': 195, '20': 135, '40': null },
    };
    const c172RocClimbSpeed = {
      0: 74, 2000: 73, 4000: 73, 6000: 73, 8000: 72, 10000: 72, 12000: 72,
    };

    function calculateC172ROC(altFt, oatC) {
      const altKeys = Object.keys(c172RocTable).map(Number).sort((a,b) => a-b);
      const oatKeys = [-20, 0, 20, 40];
      const clampedAlt = Math.max(0, Math.min(12000, altFt));
      const clampedOAT = Math.max(-20, Math.min(40, oatC));

      // Interpolate OAT within a row
      function interpOATrow(row) {
        for (let i = 0; i < oatKeys.length - 1; i++) {
          const lo = oatKeys[i], hi = oatKeys[i+1];
          if (clampedOAT >= lo && clampedOAT <= hi) {
            const vLo = row[String(lo)], vHi = row[String(hi)];
            if (vLo === null || vHi === null) return null;
            const t = (clampedOAT - lo) / (hi - lo);
            return vLo + t * (vHi - vLo);
          }
        }
        return row[String(oatKeys[oatKeys.length-1])];
      }

      // Interpolate altitude
      for (let i = 0; i < altKeys.length - 1; i++) {
        if (clampedAlt >= altKeys[i] && clampedAlt <= altKeys[i+1]) {
          const lo = interpOATrow(c172RocTable[altKeys[i]]);
          const hi = interpOATrow(c172RocTable[altKeys[i+1]]);
          if (lo === null || hi === null) return null;
          const t = (clampedAlt - altKeys[i]) / (altKeys[i+1] - altKeys[i]);
          const roc = Math.round(lo + t * (hi - lo));
          // Interpolate climb speed
          const csLo = c172RocClimbSpeed[altKeys[i]];
          const csHi = c172RocClimbSpeed[altKeys[i+1]];
          const climbSpeed = Math.round(csLo + t * (csHi - csLo));
          return { roc, climbSpeed, isaDeviation: getISADeviation(altFt, oatC), isaTemp: getISATemp(altFt) };
        }
      }
      // At max alt
      const roc = interpOATrow(c172RocTable[altKeys[altKeys.length-1]]);
      return roc === null ? null : { roc: Math.round(roc), climbSpeed: c172RocClimbSpeed[altKeys[altKeys.length-1]], isaDeviation: getISADeviation(altFt, oatC), isaTemp: getISATemp(altFt) };
    }
