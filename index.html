      const fuelGal = Math.max(0, desFuelInterp(cruiseAlt, oatCruiseC) - desFuelInterp(destAlt, oatDestC));
      const distNM  = Math.max(0, tfdInterpAltOAT(desDistData, cruiseAlt, oatCruiseC) - tfdInterpAltOAT(desDistData, destAlt, oatDestC));
      return { timeMin, fuelGal, distNM };
    }

    function calculateCruise(altFt, oatC, wheelPants, power) {
      const cfg = cruiseConfigs[power];
      const altKeys = Object.keys(cfg.table).map(Number).sort((a,b) => a-b);
      const clampedAlt = Math.max(0, Math.min(cfg.maxAlt, altFt));
      let lowerAlt = altKeys[0], upperAlt = altKeys[0];
      for (let i = 0; i < altKeys.length - 1; i++) {
        if (clampedAlt >= altKeys[i] && clampedAlt <= altKeys[i+1]) { lowerAlt = altKeys[i]; upperAlt = altKeys[i+1]; break; }
        if (clampedAlt >= altKeys[altKeys.length-1]) { lowerAlt = upperAlt = altKeys[altKeys.length-1]; }
      }
      const altFrac = lowerAlt === upperAlt ? 0 : (clampedAlt - lowerAlt) / (upperAlt - lowerAlt);

      function interpRPM(altKey) {
        const entries = cfg.table[altKey];
        if (!entries) return null;
        const clampedOAT = Math.max(entries[0].oat, Math.min(entries[entries.length-1].oat, oatC));
        for (let i = 0; i < entries.length-1; i++) {
          if (clampedOAT >= entries[i].oat && clampedOAT <= entries[i+1].oat) {
            const t = (clampedOAT - entries[i].oat) / (entries[i+1].oat - entries[i].oat);
            return lerp(entries[i].rpm, entries[i+1].rpm, t);
          }
        }
        return entries[entries.length-1].rpm;
      }
      function interpTAS(altKey) {
        const t = cfg.tas[altKey];
        if (!t) return null;
        const dev = getISADeviation(altFt, oatC);
        const clampedDev = Math.max(t.lowDev, Math.min(t.highDev, dev));
        return lerp(t.low, t.high, (clampedDev - t.lowDev) / (t.highDev - t.lowDev));
      }

      const rpm = Math.round(lerp(interpRPM(lowerAlt), interpRPM(upperAlt), altFrac));
      const tasBase = lerp(interpTAS(lowerAlt) ?? interpTAS(upperAlt), interpTAS(upperAlt) ?? interpTAS(lowerAlt), altFrac);
      const tas = Math.round(tasBase) - (wheelPants ? 0 : 3);
      const isaDeviation = getISADeviation(altFt, oatC);

      function interpAltPoints(points, alt) {
        const a = Math.max(points[0][0], Math.min(points[points.length-1][0], alt));
        for (let i = 0; i < points.length-1; i++) {
          if (a >= points[i][0] && a <= points[i+1][0]) {
            const t = (a - points[i][0]) / (points[i+1][0] - points[i][0]);
            return points[i][1] + t * (points[i+1][1] - points[i][1]);
          }
        }
        return points[points.length-1][1];
      }
      function interpER(sl, top, topAlt) {
        const a = Math.min(clampedAlt, topAlt);
        return sl + (top - sl) * (a / topAlt);
      }
      const noReserve = {
        e75: interpER(4.24, 4.14, 6500),  r75: interpER(512, 514, 6500),
        e65: interpER(4.91, 4.59, 10000), r65: interpAltPoints([[0,560],[2000,556],[4000,552],[6000,547.6],[8000,542],[9000,539],[10000,536]], clampedAlt),
        e55: interpER(5.70, 5.19, 10000), r55: interpAltPoints([[0,601],[2000,594],[4000,587],[6000,579],[8000,570],[9000,565],[10000,560]], clampedAlt),
      };
      const reserve45 = {
        e75: interpER(3.68, 3.58, 6500),  r75: interpER(444, 443, 6500),
        e65: interpER(4.26, 3.94, 10000), r65: interpER(487, 459, 10000),
        e55: interpER(4.95, 4.43, 10000), r55: interpER(522, 479, 10000),
      };
      return { rpm, tas, fuelFlow: cfg.gph, power, altFt: clampedAlt, wheelPants, noReserve, reserve45, isaDeviation, isaTemp: getISATemp(altFt) };
    }

    function calculateSemLanding(altFt, oatC, weightLbs, windKt, windDir, propType) {
      const altKeys = [0,2000,4000,6000,8000];
      const clamped = Math.max(0, Math.min(8000, altFt));
      const p1 = propType === "scimitar" ? semLandScimP1 : semLandPanel1;
      const p2 = propType === "scimitar" ? semLandScimP2 : semLandPanel2;
      const p3 = propType === "scimitar" ? semLandScimP3 : semLandPanel3;
      const distMax = propType === "scimitar" ? 2400 : 2000;
      const distMin = propType === "scimitar" ? 1100 : 800;
      let ref1; let found = false;
      for (let i = 0; i < altKeys.length-1; i++) {
      if (clamped >= altKeys[i] && clamped <= altKeys[i+1]) {
      const lo = toInterpList(p1[altKeys[i]], oatC);
      const hi = toInterpList(p1[altKeys[i+1]], oatC);
      ref1 = lo + (hi-lo)*(clamped-altKeys[i])/(altKeys[i+1]-altKeys[i]);
      found = true; break;
      }
      }
      if (!found) ref1 = toInterpList(p1[8000], oatC);
      const ref2 = toInterpPanel(p2, ref1, Math.max(2750, Math.min(3800, weightLbs)));
      const windSigned = windDir === "head" ? -windKt : windKt;
      const dist = Math.max(distMin, Math.min(distMax, toInterpPanel(p3, ref2, windSigned)));
      const grAltKeys = [0,2000,4000,6000,8000];
      let grRef1; let grFound = false;
      for (let i = 0; i < grAltKeys.length-1; i++) {
      if (clamped >= grAltKeys[i] && clamped <= grAltKeys[i+1]) {
      const lo = toInterpList(semGRPanel1[grAltKeys[i]], oatC);
      const hi = toInterpList(semGRPanel1[grAltKeys[i+1]], oatC);
      grRef1 = lo + (hi-lo)*(clamped-grAltKeys[i])/(grAltKeys[i+1]-grAltKeys[i]);
      grFound = true; break;
      }
      }
      if (!grFound) grRef1 = toInterpList(semGRPanel1[8000], oatC);
      const grRef2 = toInterpPanel(semGRPanel2, grRef1, Math.max(2750, Math.min(3800, weightLbs)));
      const groundRoll = Math.max(400, Math.min(1100, toInterpPanel(semGRPanel3, grRef2, windSigned)));
      const approachSpeed = Math.round(
      weightLbs >= 3800 ? 75 :
      weightLbs >= 3200 ? 75 - (75-72)*(3800-weightLbs)/(3800-3200) :
      weightLbs >= 2700 ? 72 - (72-67)*(3200-weightLbs)/(3200-2700) :
      67 - (67-62)*(2700-weightLbs)/(2700-2500)
      );
      return {
      distFt: Math.round(dist),
      groundRollFt: Math.round(groundRoll),
      approachSpeed,
      isaDeviation: getISADeviation(altFt, oatC),
      isaTemp: getISATemp(altFt),
      };
    }
    function SeminoleLandingViz({ result, airportRunways, runway, runwayFull }) {
      const C = useC();
      const dist50 = result.distFt;
      const wc = result.windComponents;
      const markerColor50 = C.warm;
      const centerlineColor = C.rwyStripe;
      const animRef = React.useRef(null);
      const [t, setT] = React.useState(0);
      const [done, setDone] = React.useState(false);
      React.useEffect(() => {
      setT(0); setDone(false);
      let start = null;
      const duration = 3000;
      function step(ts) {
      if (!start) start = ts;
      const raw = Math.min((ts - start) / duration, 1);
      const eased = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
      setT(eased);
      if (raw < 1) animRef.current = requestAnimationFrame(step);
      else setDone(true);
      }
      animRef.current = requestAnimationFrame(step);
      return () => cancelAnimationFrame(animRef.current);
      }, [result]);
      const yRwy = 95;
      const xObs = 95;
      const xStop = 405;
      const grFrac = result.groundRollFt / dist50;
      const xTd = xStop - Math.round((xStop - xObs) * grFrac);
      const xStart = 8, yStart = 14;
      const cp1X = xObs - 40, cp1Y = 12;
      const cp2X = xTd - 30,  cp2Y = yRwy - 20;
      const approachFrac = 0.50;
      let px, py, angle;
      if (t <= approachFrac) {
      const tc = t / approachFrac;
      const inv = 1 - tc;
      px = inv*inv*inv*xStart + 3*inv*inv*tc*cp1X + 3*inv*tc*tc*cp2X + tc*tc*tc*xTd;
      py = inv*inv*inv*yStart + 3*inv*inv*tc*cp1Y + 3*inv*tc*tc*cp2Y + tc*tc*tc*yRwy;
      const dx = 3*inv*inv*(cp1X-xStart) + 6*inv*tc*(cp2X-cp1X) + 3*tc*tc*(xTd-cp2X);
      const dy = 3*inv*inv*(cp1Y-yStart) + 6*inv*tc*(cp2Y-cp1Y) + 3*tc*tc*(yRwy-cp2Y);
      const rawAngle = Math.atan2(dy, dx) * 180 / Math.PI;
      angle = Math.max(-3, Math.min(6, rawAngle)) - 3;
      } else {
      const tg = (t - approachFrac) / (1 - approachFrac);
      px = xTd + (xStop - xTd) * tg;
      py = yRwy;
      angle = -2;
      }

      );
    }
    function AircraftMenu({ onSelect, theme, toggleTheme }) {
      const C = useC();
      const mobile = useIsMobile();
      const aircraft = [
      {
      id: "pa28",
      name: "PA-28-181",
      sub: "Archer III",
      desc: "VB-2749 · Issued Dec 2017",
      tags: ["W&B", "Takeoff", "Landing", "Climb", "Time·Fuel·Dist", "Cruise", "Glide", "Speeds"],
      available: true,
      },
      {
      id: "c172s",
      name: "C172S",
      sub: "Skyhawk SP",
      desc: "NAV III · GFC 700 AFCS",
      tags: ["W&B", "Takeoff", "Landing", "Climb", "Time·Fuel·Dist", "Cruise", "Speeds"],
      available: true,
      },
      {
      id: "pa44",
      name: "PA-44-180",
      sub: "Seminole",
      desc: "Twin Engine · Multi-Engine Trainer",
      tags: ["Takeoff", "Landing", "Climb", "Cruise", "OEI Performance"],
      available: true,
      },
      ];
      return (
      <MobileContext.Provider value={mobile}>
      <div style={{ minHeight: "100vh", background: C.bg, fontFamily: mono, color: C.text, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: mobile ? "24px 16px" : "48px 24px" }}>
      <div style={{ width: "100%", maxWidth: "760px", display: "flex", justifyContent: "flex-end", marginBottom: "16px" }}>
      <button onClick={toggleTheme} style={{ background: "none", border: `${C.cardBorder} solid ${C.borderDim}`, borderRadius: "3px", padding: "6px 12px", color: C.dim, fontFamily: mono, fontSize: "11px", letterSpacing: "2px", cursor: "pointer" }}>
      {theme === "dark" ? "☀ LIGHT" : "☾ DARK"}
      </button>
      </div>
      <div style={{ textAlign: "center", marginBottom: mobile ? "32px" : "48px" }}>
      <div style={{ fontSize: mobile ? "11px" : "14px", letterSpacing: "6px", color: C.green, marginBottom: "12px" }}>POH PERFORMANCE CALCULATOR · v1.5.0</div>
      <div style={{ fontSize: mobile ? "28px" : "42px", fontWeight: "bold", letterSpacing: "2px" }}>AERO</div>
      <div style={{ fontSize: mobile ? "28px" : "42px", fontWeight: "bold", letterSpacing: "2px", color: C.green }}>CALC</div>
      <div style={{ fontSize: mobile ? "12px" : "14px", color: C.dim, marginTop: "12px", letterSpacing: "2px" }}>SELECT AIRCRAFT</div>
      <div style={{ fontSize: "11px", color: C.isLight ? C.dim : C.dimmest, fontWeight: C.isLight ? "600" : "normal", marginTop: "8px", letterSpacing: "2px" }}>v1.5.0</div>
      </div>
      <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", flexWrap: "wrap", gap: "16px", width: "100%", maxWidth: "760px" }}>
      {aircraft.map(ac => (
      <button key={ac.id} onClick={() => ac.available && onSelect(ac.id)}
      style={{
      flex: 1, background: ac.available ? C.card : C.bg,
      border: `1px solid ${ac.available ? C.border : C.borderDim}`,
      borderRadius: "6px", padding: "28px 24px", textAlign: "left",
      cursor: ac.available ? "pointer" : "default",
      opacity: ac.available ? 1 : 0.5,
      transition: "border-color 0.15s",
      fontFamily: mono,
      }}
      onMouseEnter={e => { if (ac.available) e.currentTarget.style.borderColor = C.green; }}
      onMouseLeave={e => { if (ac.available) e.currentTarget.style.borderColor = C.border; }}
      >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px" }}>
      <div>
      <div style={{ fontSize: "22px", fontWeight: "bold", color: ac.available ? C.text : C.dim, letterSpacing: "2px" }}>{ac.name}</div>
      <div style={{ fontSize: "14px", color: ac.available ? C.green : C.dimmest, letterSpacing: "3px", marginTop: "2px" }}>{ac.sub}</div>
      </div>
      {ac.available
      ? <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.green, background: "rgba(106,170,122,0.15)", border: `1px solid ${C.green}55`, padding: "3px 8px", borderRadius: "2px" }}>AVAILABLE</div>
      : <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.warm, background: C.warm + "15", border: `1px solid ${C.warm}55`, padding: "3px 8px", borderRadius: "2px" }}>COMING SOON</div>
      }
      </div>
      <div style={{ fontSize: "11px", color: C.isLight ? C.dim : C.dimmest, fontWeight: C.isLight ? "600" : "normal", letterSpacing: "1px", marginBottom: "16px" }}>{ac.desc}</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
      {ac.tags.map(tag => (
      <div key={tag} style={{ fontSize: "10px", letterSpacing: "1px", color: ac.available ? C.dim : C.dimmest, background: C.input, border: `${C.cardBorder} solid ${C.borderDim}`, padding: "2px 7px", borderRadius: "2px" }}>{tag}</div>
      ))}
      </div>
      {ac.available && (
      <div style={{ marginTop: "20px", fontSize: "12px", letterSpacing: "3px", color: C.isLight ? C.dim : C.green, fontWeight: C.isLight ? "600" : "normal", display: "flex", alignItems: "center", gap: "6px" }}>
      OPEN CALCULATOR <span style={{ fontSize: "16px" }}>→</span>
      </div>
      )}
      </button>
      ))}
      </div>
      <div style={{ marginTop: "40px", fontSize: "11px", color: C.isLight ? C.dim : C.dimmest, fontWeight: C.isLight ? "600" : "normal", letterSpacing: "2px" }}>AEROCALC v1.5.0 · POH PERFORMANCE CALCULATOR</div>
      <div style={{ marginTop: "8px", fontSize: "10px", color: C.isLight ? C.dim : C.dimmest, fontWeight: C.isLight ? "600" : "normal", letterSpacing: "1px" }}>(Calc is short for calculator)</div>
      </div>
      </MobileContext.Provider>
      );
    }
    function Root() {
      const [aircraft, setAircraft] = useState(null);
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem("aerocalc-theme") || "dark"; } catch(e) { return "dark"; }
      });
      const toggleTheme = () => setTheme(t => {
        var next = t === "dark" ? "light" : "dark";
        try { localStorage.setItem("aerocalc-theme", next); } catch(e) {}
        return next;
      });
      React.useEffect(() => {
      document.body.style.background = THEMES[theme].bg;
      document.body.style.color = THEMES[theme].text;
      document.body.classList.toggle("light-mode", theme === "light");
      }, [theme]);
      if (!aircraft) return <ThemeContext.Provider value={theme}><AircraftMenu onSelect={setAircraft} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
      if (aircraft === "c172s") return <ThemeContext.Provider value={theme}><C172App onBack={() => setAircraft(null)} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
      if (aircraft === "pa44")  return <ThemeContext.Provider value={theme}><SeminoleApp onBack={() => setAircraft(null)} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
      return <ThemeContext.Provider value={theme}><App onBack={() => setAircraft(null)} theme={theme} toggleTheme={toggleTheme} /></ThemeContext.Provider>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);</script>
</body>
</html>
