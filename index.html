    // Fig 5-11: Range Profile — 45 min reserve, 53 gal usable, std temp
    const c172RangeData = {
      45: [[0,630],[2000,631],[4000,633],[6000,635],[8000,636],[10000,639],[12000,640]],
      55: [[0,584],[2000,586],[4000,589],[6000,593],[8000,597.5],[10000,601],[12000,604]],
      65: [[0,536],[2000,540],[4000,545],[6000,550],[8000,555],[10000,561],[12000,566]],
      75: [[0,493],[2000,498],[4000,503],[6000,510],[8000,516],[8500,518],[10000,538],[12000,565]],
    };
    function calculateC172Range(altFt, pctMCP) {
      const powerKeys = [45,55,65,75];
      const clampedPct = Math.max(45, Math.min(75, pctMCP));
      function interpAltOnCurve(curve, alt) {
        const c = Math.max(curve[0][0], Math.min(curve[curve.length-1][0], alt));
        for (let i=0;i<curve.length-1;i++) { if(c>=curve[i][0]&&c<=curve[i+1][0]){const t=(c-curve[i][0])/(curve[i+1][0]-curve[i][0]);return curve[i][1]+t*(curve[i+1][1]-curve[i][1]);} }
        return curve[curve.length-1][1];
      }
      for (let i=0;i<powerKeys.length-1;i++) {
        if (clampedPct>=powerKeys[i]&&clampedPct<=powerKeys[i+1]) {
          const t=(clampedPct-powerKeys[i])/(powerKeys[i+1]-powerKeys[i]);
          return interpAltOnCurve(c172RangeData[powerKeys[i]],altFt)+t*(interpAltOnCurve(c172RangeData[powerKeys[i+1]],altFt)-interpAltOnCurve(c172RangeData[powerKeys[i]],altFt));
        }
      }
      return interpAltOnCurve(c172RangeData[powerKeys[powerKeys.length-1]], altFt);
    }

    // Fig 5-10: Endurance Profile — 45 min reserve, 53 gal usable, std temp
    const c172EnduranceData = {
      45: [[0,6.98],[2000,6.91],[4000,6.84],[6000,6.80],[8000,6.76],[10000,6.71],[12000,6.69]],
      55: [[0,5.80],[2000,5.74],[4000,5.70],[6000,5.68],[8000,5.64],[10000,5.63],[12000,5.62]],
      65: [[0,4.95],[2000,4.91],[4000,4.89],[6000,4.86],[8000,4.84],[10000,4.84],[12000,4.85]],
      75: [[0,4.30],[2000,4.28],[4000,4.28],[6000,4.26],[8000,4.25],[8500,4.25],[10000,4.51],[12000,4.84]],
    };
    function calculateC172Endurance(altFt, pctMCP) {
      const powerKeys = [45,55,65,75];
      const clampedPct = Math.max(45, Math.min(75, pctMCP));
      function interpAltOnCurve(curve, alt) {
        const c = Math.max(curve[0][0], Math.min(curve[curve.length-1][0], alt));
        for (let i=0;i<curve.length-1;i++) { if(c>=curve[i][0]&&c<=curve[i+1][0]){const t=(c-curve[i][0])/(curve[i+1][0]-curve[i][0]);return curve[i][1]+t*(curve[i+1][1]-curve[i][1]);} }
        return curve[curve.length-1][1];
      }
      for (let i=0;i<powerKeys.length-1;i++) {
        if (clampedPct>=powerKeys[i]&&clampedPct<=powerKeys[i+1]) {
          const t=(clampedPct-powerKeys[i])/(powerKeys[i+1]-powerKeys[i]);
          return interpAltOnCurve(c172EnduranceData[powerKeys[i]],altFt)+t*(interpAltOnCurve(c172EnduranceData[powerKeys[i+1]],altFt)-interpAltOnCurve(c172EnduranceData[powerKeys[i]],altFt));
        }
      }
      return interpAltOnCurve(c172EnduranceData[powerKeys[powerKeys.length-1]], altFt);
    }

    function calculateC172Cruise(altFt, rpm, oatC) {
      const altKeys = Object.keys(c172CruiseTable).map(Number).sort((a,b) => a-b);
      const clampedAlt = Math.max(altKeys[0], Math.min(altKeys[altKeys.length-1], altFt));
      const isaStdTemp = getISATemp(altFt);
      const isaDev = oatC - isaStdTemp;
      // ISA deviation clamped to -20..+20 for interpolation (t=0 at -20, 0.5 at std, 1 at +20)
      const isaT = Math.max(0, Math.min(1, (isaDev + 20) / 40));

      function interpISA(row) {
        // row = [isaMinus20, isaStd, isaPlus20]
        if (isaT <= 0.5) {
          const t = isaT * 2;
          return {
            pct:  row[0].pct  + t * (row[1].pct  - row[0].pct),
            ktas: row[0].ktas + t * (row[1].ktas - row[0].ktas),
            gph:  row[0].gph  + t * (row[1].gph  - row[0].gph),
          };
        } else {
          const t = (isaT - 0.5) * 2;
          return {
            pct:  row[1].pct  + t * (row[2].pct  - row[1].pct),
            ktas: row[1].ktas + t * (row[2].ktas - row[1].ktas),
            gph:  row[1].gph  + t * (row[2].gph  - row[1].gph),
          };
        }
      }

      function interpRPMandISA(altData) {
        const rpmKeys = Object.keys(altData).map(Number).sort((a,b) => a-b);
        const clampedRPM = Math.max(rpmKeys[0], Math.min(rpmKeys[rpmKeys.length-1], rpm));
        for (let i = 0; i < rpmKeys.length-1; i++) {
          if (clampedRPM >= rpmKeys[i] && clampedRPM <= rpmKeys[i+1]) {
            const t = (clampedRPM - rpmKeys[i]) / (rpmKeys[i+1] - rpmKeys[i]);
            const lo = interpISA(altData[rpmKeys[i]]);
            const hi = interpISA(altData[rpmKeys[i+1]]);
            return { pct: lo.pct+t*(hi.pct-lo.pct), ktas: lo.ktas+t*(hi.ktas-lo.ktas), gph: lo.gph+t*(hi.gph-lo.gph) };
          }
        }
        return interpISA(altData[rpmKeys[rpmKeys.length-1]]);
      }

      // Interpolate altitude
      for (let i = 0; i < altKeys.length-1; i++) {
        if (clampedAlt >= altKeys[i] && clampedAlt <= altKeys[i+1]) {
          const t = (clampedAlt - altKeys[i]) / (altKeys[i+1] - altKeys[i]);
          const lo = interpRPMandISA(c172CruiseTable[altKeys[i]]);
          const hi = interpRPMandISA(c172CruiseTable[altKeys[i+1]]);
          const pct  = lo.pct  + t*(hi.pct  - lo.pct);
          const ktas = lo.ktas + t*(hi.ktas - lo.ktas);
          const gph  = lo.gph  + t*(hi.gph  - lo.gph);
          return { pct: Math.round(pct), ktas: Math.round(ktas), gph: Math.round(gph*10)/10, isaDev, isaStdTemp };
        }
      }
      const res = interpRPMandISA(c172CruiseTable[altKeys[altKeys.length-1]]);
      return { pct: Math.round(res.pct), ktas: Math.round(res.ktas), gph: Math.round(res.gph*10)/10, isaDev, isaStdTemp };

    // Liftoff and 50ft speeds by weight
    const c172TakeoffSpeeds = {

    function calculateC172Takeoff(altFt, oatC, weightLbs, windKt, windDir) {
      const altKeys = [0,1000,2000,3000,4000,5000,6000,7000,8000];
      const oatKeys = [0,10,20,30,40];
      const weightKeys = [2200,2400,2550];
      const clampedAlt = Math.max(0, Math.min(8000, altFt));
      const clampedOAT = Math.max(0, Math.min(40, oatC));
      const clampedWt  = Math.max(2200, Math.min(2550, weightLbs));

      // Interpolate OAT within an alt row for a given weight table
      function interpOAT(wtTable, alt, oat) {
        const row = wtTable[alt];
        for (let i=0;i<oatKeys.length-1;i++) {
          if (oat>=oatKeys[i]&&oat<=oatKeys[i+1]) {
            const t=(oat-oatKeys[i])/(oatKeys[i+1]-oatKeys[i]);
            return [row[oatKeys[i]][0]+t*(row[oatKeys[i+1]][0]-row[oatKeys[i]][0]),
                    row[oatKeys[i]][1]+t*(row[oatKeys[i+1]][1]-row[oatKeys[i]][1])];
          }
        }
        return row[oatKeys[oatKeys.length-1]];
      }

      // Interpolate altitude for a given weight table
      function interpAltOAT(wtTable, alt, oat) {
        for (let i=0;i<altKeys.length-1;i++) {
          if (alt>=altKeys[i]&&alt<=altKeys[i+1]) {
            const t=(alt-altKeys[i])/(altKeys[i+1]-altKeys[i]);
            const lo=interpOAT(wtTable,altKeys[i],oat);
            const hi=interpOAT(wtTable,altKeys[i+1],oat);
            return [lo[0]+t*(hi[0]-lo[0]), lo[1]+t*(hi[1]-lo[1])];
          }
        }
        return interpOAT(wtTable, altKeys[altKeys.length-1], oat);
      }

      // Interpolate weight between tables
      let gr, dist50;
      const wtIdx = weightKeys.findIndex((w,i) => clampedWt>=w && (i===weightKeys.length-1||clampedWt<=weightKeys[i+1]));
      if (wtIdx < weightKeys.length-1 && clampedWt <= weightKeys[wtIdx+1]) {
        const t=(clampedWt-weightKeys[wtIdx])/(weightKeys[wtIdx+1]-weightKeys[wtIdx]);
        const lo=interpAltOAT(c172TakeoffData[weightKeys[wtIdx]], clampedAlt, clampedOAT);
        const hi=interpAltOAT(c172TakeoffData[weightKeys[wtIdx+1]], clampedAlt, clampedOAT);
        gr    = lo[0]+t*(hi[0]-lo[0]);
        dist50= lo[1]+t*(hi[1]-lo[1]);
      } else {
        const res=interpAltOAT(c172TakeoffData[weightKeys[wtIdx]], clampedAlt, clampedOAT);
        gr=res[0]; dist50=res[1];
      }

      // Wind correction per POH
      // Headwind: -10% per 9kt; Tailwind: +10% per 2kt
      let windFactor = 1.0;
      if (windDir === 'head' && windKt > 0) windFactor = 1 - (windKt / 9) * 0.10;
      if (windDir === 'tail' && windKt > 0) windFactor = 1 + (windKt / 2) * 0.10;
      windFactor = Math.max(0.1, windFactor);

      // Interpolate liftoff/barrier speeds by weight
      function interpSpeed(field) {
        const wks = [2200,2400,2550];
        for (let i=0;i<wks.length-1;i++) {
          if (clampedWt>=wks[i]&&clampedWt<=wks[i+1]) {
            const t=(clampedWt-wks[i])/(wks[i+1]-wks[i]);
            return Math.round(c172TakeoffSpeeds[wks[i]][field]+t*(c172TakeoffSpeeds[wks[i+1]][field]-c172TakeoffSpeeds[wks[i]][field]));
          }
        }
        return c172TakeoffSpeeds[wks[wks.length-1]][field];
      }

      return {
        groundRollFt: Math.round(gr * windFactor),
        dist50Ft:     Math.round(dist50 * windFactor),
        liftoffSpeed: interpSpeed('liftoff'),
        barrierSpeed: interpSpeed('barrier'),
        isaDeviation: getISADeviation(altFt, oatC),
        isaTemp:      getISATemp(altFt),
        windFactor,
      };
    }

    function C172RunwayViz({ result }) {
      const [t, setT] = useState(0);

        const step = (ts) => {
          if (!startRef.current) startRef.current = ts;
          const raw = Math.min((ts - startRef.current) / DURATION, 1);
          const ease = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
          setT(ease);
          if (raw < 1) animRef.current = requestAnimationFrame(step);
        };
        animRef.current = requestAnimationFrame(step);

      const yRwy = 95, xGr = 18 + grPct * 420, x50 = 18 + dist50Pct * 420;
      const xEnd = Math.min(x50 + 55, 448), yEnd = 32;
      const cp1X = xGr + (x50-xGr)*0.4, cp1Y = yRwy - 6;
      const cp2X = xGr + (x50-xGr)*0.75, cp2Y = yEnd + 8;
      const grFrac = grPct / (dist50Pct + 0.08);

      // Cubic bezier position
      function bezier(t2) {
        const u=1-t2;
        return {
          x: u*u*u*xGr + 3*u*u*t2*cp1X + 3*u*t2*t2*cp2X + t2*t2*t2*xEnd,

        };
      }
      function bezierAngle(t2) {
        const dt=0.01, t3=Math.min(t2+dt,1);
        const p1=bezier(t2), p2=bezier(t3);
        return Math.atan2(-(p2.y-p1.y), p2.x-p1.x)*180/Math.PI;
      }

      let planeX, planeY, planeAng;
      if (t <= grFrac) {
        const gt = grFrac > 0 ? t/grFrac : 0;
        planeX = 18 + gt*(xGr-18);
        planeY = yRwy;
        planeAng = 0;

        const bt = (t - grFrac) / (1 - grFrac);

        planeX = pos.x;
        planeY = pos.y;
        planeAng = bezierAngle(bt);

            {/* Ground */}
            <rect x="0" y="112" width="460" height="53" fill="#080c06"/>
            {/* Runway */}
            <rect x="18" y="84" width="424" height="30" rx="2" fill="url(#rwyGradC172)" stroke="#2a3a1a" strokeWidth="1"/>
            {[0,1,2,3].map(i => <rect key={i} x={22+i*6} y="88" width="3" height="22" rx="1" fill="#2a3a1a"/>)}
            {Array.from({length:18}).map((_,i) => <rect key={i} x={55+i*22} y="98" width="12" height="2" rx="1" fill="#3a4a2a"/>)}
            {result.rwyNum && <text x="36" y="102" textAnchor="middle" fill="#4a6a3a" fontSize="11" fontFamily="Courier New" fontWeight="bold">{String(result.rwyNum).padStart(2,"0")}</text>}
            {/* Climb arc */}
            <path d={`M ${xGr} ${yRwy} C ${cp1X} ${cp1Y} ${cp2X} ${cp2Y} ${xEnd} ${yEnd}`} fill="none" stroke={c50} strokeWidth="1.5" strokeDasharray="5,3" opacity="0.5"/>

    function C172TakeoffTab({ savedState, onStateChange }) {
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [weight, setWeight] = useState(savedState.weight || "");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [surface, setSurface] = useState(savedState.surface || "paved");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, weight, runway, windHeading, windSpeed, surface, result });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, surface, result]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum * 10) % 360;
        const angle = (windHdg - rwyHdg + 360) % 360;
        const rad = angle * Math.PI / 180;
        const headwind = Math.round(windSpd * Math.cos(rad) * 10) / 10;
        const crosswind = Math.round(Math.abs(windSpd * Math.sin(rad)) * 10) / 10;
        const crossDir = (angle > 0 && angle < 180) ? "R" : "L";
        return { headwind, crosswind, crossDir, angle, rwyHdg };
      }

      const windSpd = parseFloat(windSpeed) || 0;
      const rwyNum  = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum) && !isNaN(windHdg) && windSpd > 0 && rwyNum >= 1 && rwyNum <= 36)
        ? getWindComponents(rwyNum, windHdg, windSpd) : null;

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal = parseFloat(alt);
        let oatC = parseFloat(oat);
        const weightVal = parseFloat(weight) || 2550;
        if (isNaN(altVal) || isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit === "F") oatC = (oatC-32)*5/9;
        if (altVal < 0 || altVal > 8000) { setError("Altitude must be 0 – 8,000 ft."); return; }
        if (weightVal < 2200 || weightVal > 2550) { setError("Weight must be 2,200 – 2,550 lbs."); return; }
        if (isNaN(rwyNum)||rwyNum<1||rwyNum>36) { setError("Please enter a valid runway number (01–36)."); return; }
        if (isNaN(windHdg)||windHdg<0||windHdg>360) { setError("Please enter a valid wind direction (0–360°)."); return; }
        const wc = windComponents || { headwind:0, crosswind:0, crossDir:"R", angle:0 };
        const hwKt = wc.headwind;
        const wDir = hwKt >= 0 ? "head" : "tail";
        const windActual = Math.abs(hwKt);
        const MAX_TAIL = 10;
        const windClamped = wDir === "tail" ? Math.min(windActual, MAX_TAIL) : windActual;
        const windWasClamped = windActual > windClamped;
        setResult({
          ...calculateC172Takeoff(altVal, oatC, weightVal, windClamped, wDir),
          windComponents: wc, windSpd, windActual, windClamped, windWasClamped, windDir: wDir, rwyNum, weightLbs: weightVal,
          densityAlt: getDensityAlt(altVal, oatC),
        });
      }, [alt, oat, tempUnit, weight, runway, windHeading, windSpeed, windComponents, windSpd, rwyNum, windHdg]);

      const markerColorRoll = C.green, markerColor50 = "#ddaa55";

      return (

                  }}>{opt.label}</button>

          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop:"28px" }}>
              <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />

              {/* Runway visualization */}
              <C172RunwayViz result={result} />

              {result.windWasClamped && (
                <div style={{ background:"#1a1200", border:`1px solid ${C.warm}`, borderRadius:"3px", padding:"10px 14px", marginBottom:"12px", display:"flex", alignItems:"center", gap:"10px" }}>
                  <div style={{ color:C.warm, fontSize:"16px" }}>⚠</div>
                  <div style={{ fontSize:"12px", color:C.note, letterSpacing:"1px" }}>
                    Tailwind clamped to <strong style={{color:C.warm}}>{result.windClamped} kt</strong> (chart max 10 kt)
                  </div>

              )}
              {/* Density altitude */}
              {(() => {
                const da=result.densityAlt, daColor=da>5000?C.error:da>3000?C.warm:C.green;

              })()}
              <Grid2 style={{ marginBottom:"12px" }}>
                {(() => {
                  const grassAdj = surface === "grass" ? Math.round(result.groundRollFt * 0.15) : 0;
                  const grDisplay = result.groundRollFt + grassAdj;
                  const d50Display = result.dist50Ft + grassAdj;
                  return (<>
                    <div style={{ background:C.input, border:`1px solid ${markerColorRoll}`, borderRadius:"3px", padding:"16px", textAlign:"center" }}>

                      <div style={{ fontSize:"44px", color:C.text, lineHeight:1, fontWeight:"bold" }}>{grDisplay}</div>
                      <div style={{ fontSize:"13px", color:C.dim, marginTop:"6px", letterSpacing:"3px" }}>FEET</div>
                      {surface==="grass" && <div style={{ fontSize:"10px", color:C.warm, marginTop:"4px", letterSpacing:"1px" }}>+{grassAdj} FT DRY GRASS</div>}
                    </div>
                    <div style={{ background:C.input, border:`1px solid ${markerColor50}`, borderRadius:"3px", padding:"16px", textAlign:"center" }}>
                      <div style={{ fontSize:"15px", letterSpacing:"2px", color:markerColor50, marginBottom:"8px" }}>OVER 50 FT</div>
                      <div style={{ fontSize:"44px", color:C.text, lineHeight:1, fontWeight:"bold" }}>{d50Display}</div>
                      <div style={{ fontSize:"13px", color:C.dim, marginTop:"6px", letterSpacing:"3px" }}>FEET</div>
                      {surface==="grass" && <div style={{ fontSize:"10px", color:C.warm, marginTop:"4px", letterSpacing:"1px" }}>+{grassAdj} FT DRY GRASS</div>}
                    </div>
                  </>);
                })()}
              </Grid2>
              {/* Safety buffer */}
              <Grid2 style={{ marginBottom:"12px" }}>
                {(() => {
                  const grassAdj = surface === "grass" ? Math.round(result.groundRollFt * 0.15) : 0;
                  const grDisplay = result.groundRollFt + grassAdj;
                  const d50Display = result.dist50Ft + grassAdj;
                  return (<>
                    {[{val:Math.round(grDisplay*1.5),label:"GND ROLL ×1.5",color:markerColorRoll},
                      {val:Math.round(d50Display*1.5),label:"OVER 50 FT ×1.5",color:markerColor50}].map(({val,label,color})=>(
                      <div key={label} style={{ background:"#0a0c10", border:`1px solid ${color}55`, borderRadius:"3px", padding:"12px 16px", textAlign:"center" }}>

                      </div>
                    ))}

                })()}
              </Grid2>
              {/* Speeds */}
              <div style={{ background:C.input, border:`1px solid ${C.borderDim}`, borderRadius:"3px", padding:"12px 16px", marginBottom:"12px", display:"flex", justifyContent:"space-around", alignItems:"center" }}>
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:"11px", letterSpacing:"2px", color:C.dim, marginBottom:"4px" }}>LIFTOFF</div>
                  <div style={{ fontSize:"28px", fontWeight:"bold", color:markerColorRoll }}>{result.liftoffSpeed}<span style={{ fontSize:"13px", color:C.dim, marginLeft:"4px" }}>KIAS</span></div>
                </div>
                <div style={{ width:"1px", height:"40px", background:C.borderDim }} />
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:"11px", letterSpacing:"2px", color:C.dim, marginBottom:"4px" }}>50 FT BARRIER</div>
                  <div style={{ fontSize:"28px", fontWeight:"bold", color:markerColor50 }}>{result.barrierSpeed}<span style={{ fontSize:"13px", color:C.dim, marginLeft:"4px" }}>KIAS</span></div>
                </div>
              </div>
              <NoteBox text={`Short field technique (Sec. 4). Flaps 10°, full throttle before brake release. Lean mixture above 3,000 ft. Wind correction applied per POH (−10% per 9kt HW, +10% per 2kt TW).${surface === "grass" ? " +15% of ground roll applied to both distances for dry grass." : ""}`} />
            </div>
          )}
        </Card>
      );
    }

    // Fig 5-11: Short Field Landing Distance at 2550 LB
    // Flaps FULL, Power IDLE, Paved/Level/Dry, Max braking
    // Wind: -10% per 9kt HW, +10% per 2kt TW (max 10kt)
    // Dry grass: +45% of ground roll to both distances
    // Flaps up: +9 KIAS approach, +35% to both distances
    const c172LandingData = {
      0:    { 0:[545,1290],  10:[565,1320],  20:[585,1350],  30:[605,1380],  40:[625,1415]  },
      1000: { 0:[565,1320],  10:[585,1350],  20:[605,1385],  30:[625,1420],  40:[650,1450]  },
      2000: { 0:[585,1355],  10:[610,1385],  20:[630,1420],  30:[650,1455],  40:[670,1490]  },
      3000: { 0:[610,1385],  10:[630,1425],  20:[655,1460],  30:[675,1495],  40:[695,1530]  },
      4000: { 0:[630,1425],  10:[655,1460],  20:[675,1495],  30:[700,1535],  40:[725,1570]  },
      5000: { 0:[655,1460],  10:[680,1500],  20:[705,1535],  30:[725,1575],  40:[750,1615]  },
      6000: { 0:[680,1500],  10:[705,1540],  20:[730,1580],  30:[755,1620],  40:[780,1660]  },
      7000: { 0:[705,1545],  10:[730,1585],  20:[760,1625],  30:[785,1665],  40:[810,1705]  },
      8000: { 0:[735,1585],  10:[760,1630],  20:[790,1670],  30:[815,1715],  40:[840,1755]  },
    };

    function calculateC172Landing(altFt, oatC, windKt, windDir, surface, flaps) {
      const altKeys = [0,1000,2000,3000,4000,5000,6000,7000,8000];
      const oatKeys = [0,10,20,30,40];
      const clampedAlt = Math.max(0, Math.min(8000, altFt));
      const clampedOAT = Math.max(0, Math.min(40, oatC));

      function interpOAT(row, oat) {
        for (let i=0;i<oatKeys.length-1;i++) {
          if (oat>=oatKeys[i]&&oat<=oatKeys[i+1]) {
            const t=(oat-oatKeys[i])/(oatKeys[i+1]-oatKeys[i]);
            return [row[oatKeys[i]][0]+t*(row[oatKeys[i+1]][0]-row[oatKeys[i]][0]),
                    row[oatKeys[i]][1]+t*(row[oatKeys[i+1]][1]-row[oatKeys[i]][1])];
          }
        }
        return row[oatKeys[oatKeys.length-1]];
      }

      let gr, dist50;
      for (let i=0;i<altKeys.length-1;i++) {
        if (clampedAlt>=altKeys[i]&&clampedAlt<=altKeys[i+1]) {
          const t=(clampedAlt-altKeys[i])/(altKeys[i+1]-altKeys[i]);
          const lo=interpOAT(c172LandingData[altKeys[i]], clampedOAT);
          const hi=interpOAT(c172LandingData[altKeys[i+1]], clampedOAT);
          gr    = lo[0]+t*(hi[0]-lo[0]);
          dist50= lo[1]+t*(hi[1]-lo[1]);
          break;
        }
      }
      if (gr === undefined) {
        const res = interpOAT(c172LandingData[altKeys[altKeys.length-1]], clampedOAT);
        gr=res[0]; dist50=res[1];
      }

      // Wind correction
      let windFactor = 1.0;
      if (windDir==="head" && windKt>0) windFactor = 1-(windKt/9)*0.10;
      if (windDir==="tail" && windKt>0) windFactor = 1+(windKt/2)*0.10;
      windFactor = Math.max(0.1, windFactor);
      gr    *= windFactor;
      dist50*= windFactor;

      // Dry grass: +45% of ground roll to both
      const grassAdj = surface==="grass" ? gr*0.45 : 0;
      gr    += grassAdj;
      dist50+= grassAdj;

      // Flaps up: +35% to both distances
      const flapsAdj = flaps==="up" ? 0.35 : 0;
      gr    *= (1+flapsAdj);
      dist50*= (1+flapsAdj);

      return {
        groundRollFt: Math.round(gr),
        dist50Ft:     Math.round(dist50),
        approachSpeed: flaps==="up" ? 70 : 61, // 61 + 9 for flaps up
        isaDeviation:  getISADeviation(altFt, oatC),
        isaTemp:       getISATemp(altFt),
        windFactor, grassAdj: Math.round(grassAdj), flapsAdj,
      };
    }

    function C172LandingViz({ result }) {
      const [t, setT] = useState(0);
      const animRef = useRef(null);
      const startRef = useRef(null);
      const DURATION = 3000;

      useEffect(() => {
        setT(0); startRef.current = null;
        const step = (ts) => {
          if (!startRef.current) startRef.current = ts;
          const raw = Math.min((ts - startRef.current) / DURATION, 1);
          const ease = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
          setT(ease);
          if (raw < 1) animRef.current = requestAnimationFrame(step);
        };
        animRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(animRef.current);
      }, [result]);

      const cRoll = C.green, c50 = "#ddaa55";
      const yRwy = 95, xObs = 95, xTd = 185, xStop = 405;
      const xStart = 8, yStart = 14;
      const cp1X = xObs - 40, cp1Y = 12;
      const cp2X = xTd - 30, cp2Y = yRwy - 20;
      const approachFrac = 0.50;
      const wc = result.windComponents;

      let px, py, angle;
      if (t <= approachFrac) {
        const tc = t / approachFrac;
        const inv = 1 - tc;
        px = inv*inv*inv*xStart + 3*inv*inv*tc*cp1X + 3*inv*tc*tc*cp2X + tc*tc*tc*xTd;
        py = inv*inv*inv*yStart + 3*inv*inv*tc*cp1Y + 3*inv*tc*tc*cp2Y + tc*tc*tc*yRwy;
        const dx = 3*inv*inv*(cp1X-xStart) + 6*inv*tc*(cp2X-cp1X) + 3*tc*tc*(xTd-cp2X);
        const dy = 3*inv*inv*(cp1Y-yStart) + 6*inv*tc*(cp2Y-cp1Y) + 3*tc*tc*(yRwy-cp2Y);
        const rawAngle = Math.atan2(dy, dx) * 180 / Math.PI;
        angle = Math.max(-3, Math.min(6, rawAngle)) - 3;
      } else {
        const tg = (t - approachFrac) / (1 - approachFrac);
        px = xTd + (xStop - xTd) * tg;
        py = yRwy;
        angle = -2;
      }

      return (
        <div style={{ background:"#060a0f", border:`1px solid ${C.border}`, borderRadius:"4px", padding:"14px 14px 10px", marginBottom:"14px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
            <div style={{ fontSize:"15px", letterSpacing:"3px", color:C.green }}>SHORT FIELD LANDING</div>
            <div style={{ fontSize:"13px", letterSpacing:"2px", color:C.dimmer }}>FLAPS {result.flaps==="up"?"UP":"FULL"} · IDLE · MAX BRAKING</div>
          </div>
          <svg viewBox="0 0 460 165" style={{ width:"100%", display:"block" }}>
            <defs>
              <linearGradient id="rwyGradC172Ldg" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#141c10"/>
                <stop offset="100%" stopColor="#1e2818"/>
              </linearGradient>
            </defs>
            <rect x="0" y="112" width="460" height="53" fill="#080c06"/>
            <rect x="18" y="84" width="424" height="30" rx="2" fill="url(#rwyGradC172Ldg)" stroke="#2a3a1a" strokeWidth="1"/>
            {Array.from({length:18}).map((_,i)=><rect key={i} x={55+i*22} y="98" width="12" height="2" rx="1" fill="#3a4a2a"/>)}
            {result.rwyNum && <text x="424" y="102" textAnchor="middle" fill="#4a6a3a" fontSize="11" fontFamily="Courier New" fontWeight="bold">{String(result.rwyNum).padStart(2,"0")}</text>}
            {/* Approach path */}
            <path d={`M ${xStart} ${yStart} C ${cp1X} ${cp1Y} ${cp2X} ${cp2Y} ${xTd} ${yRwy}`} fill="none" stroke={c50} strokeWidth="1.5" strokeDasharray="5,3" opacity="0.5"/>
            {/* 50ft obstacle */}
            <line x1={xObs} y1="52" x2={xObs} y2="114" stroke={c50} strokeWidth="2"/>
            <rect x={xObs-8} y="52" width="17" height="11" rx="1.5" fill={c50}/>
            <text x={xObs} y="61" textAnchor="middle" fill="#0a0e1a" fontSize="11" fontFamily="Courier New" fontWeight="bold">50</text>
            {/* Touchdown marker */}
            <line x1={xTd} y1="84" x2={xTd} y2="116" stroke={cRoll} strokeWidth="1.5" strokeDasharray="3,2"/>
            <circle cx={xTd} cy={yRwy} r="2.5" fill={cRoll}/>
            {/* Ground roll bracket — ABOVE runway */}
            <line x1={xTd} y1="75" x2={xStop} y2="75" stroke={cRoll} strokeWidth="1" opacity="0.7"/>
            <line x1={xTd} y1="72" x2={xTd} y2="78" stroke={cRoll} strokeWidth="1"/>
            <line x1={xStop} y1="72" x2={xStop} y2="78" stroke={cRoll} strokeWidth="1"/>
            {(() => { const label=`${result.groundRollFt} FT · GROUND ROLL`, boxW=label.length*6.6+14, cx2=(xTd+xStop)/2; return (<>
              <rect x={cx2-boxW/2} y="61" width={boxW} height="15" rx="2" fill="#060a0f" stroke={cRoll} strokeWidth="0.8"/>
              <text x={cx2} y="72" textAnchor="middle" fill={cRoll} fontSize="11" fontFamily="Courier New">{label}</text>
            </>); })()}
            {/* 50ft bracket — BELOW runway */}
            <line x1={xObs} y1="122" x2={xStop} y2="122" stroke={c50} strokeWidth="1" opacity="0.7"/>
            <line x1={xObs} y1="119" x2={xObs} y2="125" stroke={c50} strokeWidth="1"/>
            <line x1={xStop} y1="119" x2={xStop} y2="125" stroke={c50} strokeWidth="1"/>
            {(() => { const label=`${result.dist50Ft} FT · OVER 50 FT`, boxW=label.length*6.6+14, cx2=(xObs+xStop)/2; return (<>
              <rect x={cx2-boxW/2} y="127" width={boxW} height="15" rx="2" fill="#060a0f" stroke={c50} strokeWidth="0.8"/>
              <text x={cx2} y="138" textAnchor="middle" fill={c50} fontSize="11" fontFamily="Courier New">{label}</text>
            </>); })()}
            {/* Wind compass — top right */}
            {wc && (() => {
              const svgDeg=(180+wc.angle)%360, rad2=svgDeg*Math.PI/180;
              const cx2=420, cy2=35, len=28;
              const dx=Math.cos(rad2)*len, dy=Math.sin(rad2)*len;
              const x1=cx2-dx*0.5, y1=cy2-dy*0.5, x2=cx2+dx*0.5, y2=cy2+dy*0.5;
              const hLen=7, hAng=0.4;
              return (<g opacity="0.9">
                <circle cx={cx2} cy={cy2} r="22" fill="#060a0f" stroke={C.border} strokeWidth="1"/>
                {[0,45,90,135,180,225,270,315].map(a=>{const r2=(a-90)*Math.PI/180;return <line key={a} x1={cx2+Math.cos(r2)*16} y1={cy2+Math.sin(r2)*16} x2={cx2+Math.cos(r2)*20} y2={cy2+Math.sin(r2)*20} stroke={C.borderDim} strokeWidth="1"/>;} )}
                <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={C.cool} strokeWidth="2"/>
                <polygon points={`${x2},${y2} ${x2-hLen*Math.cos(rad2-hAng)},${y2-hLen*Math.sin(rad2-hAng)} ${x2-hLen*Math.cos(rad2+hAng)},${y2-hLen*Math.sin(rad2+hAng)}`} fill={C.cool}/>
                <text x={cx2} y={cy2-27} textAnchor="middle" fill={C.dimmest} fontSize="8" fontFamily="Courier New" letterSpacing="1">WIND / RWY</text>
                <text x={cx2} y={cy2+33} textAnchor="middle" fill={C.cool} fontSize="9" fontFamily="Courier New">{result.windSpd}KT/{wc.angle===0?"HW":wc.angle===180?"TW":`XW-${wc.crossDir}`}</text>
              </g>);
            })()}
            <C172Plane x={px} y={py} ang={angle} color={cRoll} />
          </svg>
        </div>
      );
    }

    function C172LandingTab({ savedState, onStateChange }) {
      const [alt, setAlt] = useState(savedState.alt || "");
      const [oat, setOat] = useState(savedState.oat || "");
      const [tempUnit, setTempUnit] = useState(savedState.tempUnit || "C");
      const [runway, setRunway] = useState(savedState.runway || "");
      const [windHeading, setWindHeading] = useState(savedState.windHeading || "");
      const [windSpeed, setWindSpeed] = useState(savedState.windSpeed || "");
      const [surface, setSurface] = useState(savedState.surface || "paved");
      const [flaps, setFlaps] = useState(savedState.flaps || "full");
      const [result, setResult] = useState(savedState.result || null);
      const [error, setError] = useState("");

      useEffect(() => {
        onStateChange({ alt, oat, tempUnit, runway, windHeading, windSpeed, surface, flaps, result });
      }, [alt, oat, tempUnit, runway, windHeading, windSpeed, surface, flaps, result]);

      function getWindComponents(rwyNum, windHdg, windSpd) {
        const rwyHdg = (rwyNum*10)%360;
        const angle  = (windHdg-rwyHdg+360)%360;
        const rad    = angle*Math.PI/180;
        const headwind  = Math.round(windSpd*Math.cos(rad)*10)/10;
        const crosswind = Math.round(Math.abs(windSpd*Math.sin(rad))*10)/10;
        const crossDir  = (angle>0&&angle<180)?"R":"L";
        return { headwind, crosswind, crossDir, angle, rwyHdg };
      }

      const windSpd = parseFloat(windSpeed)||0;
      const rwyNum  = parseInt(runway);
      const windHdg = parseInt(windHeading);
      const windComponents = (!isNaN(rwyNum)&&!isNaN(windHdg)&&windSpd>0&&rwyNum>=1&&rwyNum<=36)
        ? getWindComponents(rwyNum,windHdg,windSpd) : null;

      // Store the last valid base inputs so surface/flaps can auto-update
      const baseRef = useRef(null);

      const handleCalculate = useCallback(() => {
        setError(""); setResult(null);
        const altVal=parseFloat(alt);
        let oatC=parseFloat(oat);
        if (isNaN(altVal)||isNaN(oatC)) { setError("Please fill in altitude and OAT."); return; }
        if (tempUnit==="F") oatC=(oatC-32)*5/9;
        if (altVal<0||altVal>8000) { setError("Altitude must be 0 – 8,000 ft."); return; }
        if (isNaN(rwyNum)||rwyNum<1||rwyNum>36) { setError("Please enter a valid runway number (01–36)."); return; }
        if (isNaN(windHdg)||windHdg<0||windHdg>360) { setError("Please enter a valid wind direction (0–360°)."); return; }
        const wc = windComponents||{headwind:0,crosswind:0,crossDir:"R",angle:0};
        const hwKt=wc.headwind, wDir=hwKt>=0?"head":"tail";
        const windActual=Math.abs(hwKt);
        const windClamped=wDir==="tail"?Math.min(windActual,10):windActual;
        const windWasClamped=windActual>windClamped;
        baseRef.current = { altVal, oatC, windClamped, wDir, wc, windSpd, windActual, windWasClamped, rwyNum, densityAlt: getDensityAlt(altVal,oatC) };
        setResult({
          ...calculateC172Landing(altVal, oatC, windClamped, wDir, surface, flaps),
          windComponents:wc, windSpd, windActual, windClamped, windWasClamped, windDir:wDir, rwyNum,
          densityAlt:getDensityAlt(altVal,oatC), surface, flaps,
        });
      }, [alt,oat,tempUnit,runway,windHeading,windSpeed,surface,flaps,windComponents,windSpd,rwyNum,windHdg]);

      // Auto-update when surface or flaps change if we have valid base inputs
      useEffect(() => {
        if (!baseRef.current) return;
        const b = baseRef.current;
        setResult({
          ...calculateC172Landing(b.altVal, b.oatC, b.windClamped, b.wDir, surface, flaps),
          windComponents:b.wc, windSpd:b.windSpd, windActual:b.windActual, windClamped:b.windClamped,
          windWasClamped:b.windWasClamped, windDir:b.wDir, rwyNum:b.rwyNum,
          densityAlt:b.densityAlt, surface, flaps,
        });
      }, [surface, flaps]);

      const cRoll=C.green, c50="#ddaa55";

      return (
        <Card>
          <div style={{ marginBottom:"28px", paddingBottom:"20px", borderBottom:`1px solid ${C.border}` }}>
            <div style={{ fontSize:"12px", letterSpacing:"4px", color:C.green, marginBottom:"6px" }}>LANDING PERFORMANCE</div>
            <div style={{ fontSize:"28px", fontWeight:"bold", letterSpacing:"2px" }}>SHORT FIELD</div>
            <div style={{ fontSize:"13px", color:C.dimmer, marginTop:"6px", letterSpacing:"1px" }}>FLAPS FULL · IDLE POWER · 2,550 LB · FIG 5-11</div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"20px", marginBottom:"28px" }}>
            <InputField label="PRESSURE ALTITUDE" unit="FT" value={alt} onChange={setAlt} placeholder="e.g. 2000" hint="0 – 8,000 ft" />
            <TempField label="OAT" value={oat} onChange={setOat} unit={tempUnit} onUnitChange={setTempUnit} hint="0°C to 40°C chart range" />
            <div>
              <div style={{ fontSize:"12px", letterSpacing:"3px", color:C.green, marginBottom:"8px" }}>WIND</div>
              <Grid3 style={{ marginBottom:"8px" }}>
                <div>
                  <div style={{ fontSize:"11px", color:C.dim, letterSpacing:"2px", marginBottom:"4px" }}>RUNWAY</div>
                  <input type="number" value={runway} onChange={e=>setRunway(e.target.value.slice(0,2))} placeholder="e.g. 28"
                    style={{ width:"100%", boxSizing:"border-box", background:C.input, border:`1px solid ${C.border}`, borderRadius:"3px", padding:"11px 14px", color:C.text, fontFamily:mono, fontSize:"18px" }}/>
                </div>
                <div>
                  <div style={{ fontSize:"11px", color:C.dim, letterSpacing:"2px", marginBottom:"4px" }}>WIND DIR °</div>
                  <input type="number" value={windHeading} onChange={e=>setWindHeading(e.target.value)} placeholder="e.g. 270"
                    style={{ width:"100%", boxSizing:"border-box", background:C.input, border:`1px solid ${C.border}`, borderRadius:"3px", padding:"11px 14px", color:C.text, fontFamily:mono, fontSize:"18px" }}/>
                </div>
                <div>
                  <div style={{ fontSize:"11px", color:C.dim, letterSpacing:"2px", marginBottom:"4px" }}>SPEED KT</div>
                  <input type="number" value={windSpeed} onChange={e=>setWindSpeed(e.target.value)} placeholder="e.g. 10"
                    style={{ width:"100%", boxSizing:"border-box", background:C.input, border:`1px solid ${C.border}`, borderRadius:"3px", padding:"11px 14px", color:C.text, fontFamily:mono, fontSize:"18px" }}/>
                </div>
              </Grid3>
              {windComponents && (() => {
                const hw=windComponents.headwind, xw=windComponents.crosswind;
                const hwColor=hw>=0?C.green:C.error, hwLabel=hw>=0?"HEADWIND":"TAILWIND";
                return (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginTop:"4px" }}>
                    <div style={{ background:C.input, border:`1px solid ${hwColor}55`, borderRadius:"3px", padding:"8px 12px", textAlign:"center" }}>
                      <div style={{ fontSize:"11px", letterSpacing:"2px", color:hwColor, marginBottom:"3px" }}>{hwLabel}</div>
                      <div style={{ fontSize:"22px", fontWeight:"bold", color:hwColor }}>{Math.abs(hw)} <span style={{ fontSize:"12px", color:C.dim }}>KT</span></div>
                    </div>
                    <div style={{ background:C.input, border:`1px solid ${xw>17?C.error:C.cool}55`, borderRadius:"3px", padding:"8px 12px", textAlign:"center" }}>
                      <div style={{ fontSize:"11px", letterSpacing:"2px", color:xw>17?C.error:C.cool, marginBottom:"3px" }}>CROSSWIND {windComponents.crossDir}{xw>17?" ⚠":""}</div>
                      <div style={{ fontSize:"22px", fontWeight:"bold", color:xw>17?C.error:C.cool }}>{xw} <span style={{ fontSize:"12px", color:C.dim }}>KT</span></div>
                      {xw>17&&<div style={{ fontSize:"9px", color:C.error, letterSpacing:"1px", marginTop:"2px" }}>EXCEEDS 17KT DEMO LIMIT</div>}
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize:"13px", color:C.dimmest, marginTop:"6px", letterSpacing:"1px" }}>Max 10kt tailwind · headwind reduces distance per POH</div>
            </div>
            <div>
              <div style={{ fontSize:"12px", letterSpacing:"3px", color:C.green, marginBottom:"8px" }}>RUNWAY SURFACE</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                {[{val:"paved",label:"PAVED / DRY"},{val:"grass",label:"DRY GRASS"}].map(opt=>(
                  <button key={opt.val} onClick={()=>setSurface(opt.val)} style={{
                    padding:"10px", background:surface===opt.val?C.green:C.input,
                    border:`1px solid ${surface===opt.val?C.green:C.border}`, borderRadius:"3px",
                    color:surface===opt.val?"#0a0e1a":C.dim, fontFamily:mono, fontSize:"11px", letterSpacing:"1px", cursor:"pointer",
                  }}>{opt.label}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:"12px", letterSpacing:"3px", color:C.green, marginBottom:"8px" }}>FLAPS</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                {[{val:"full",label:"FULL (NORMAL)"},{val:"up",label:"FLAPS UP"}].map(opt=>(
                  <button key={opt.val} onClick={()=>setFlaps(opt.val)} style={{
                    padding:"10px", background:flaps===opt.val?C.green:C.input,
                    border:`1px solid ${flaps===opt.val?C.green:C.border}`, borderRadius:"3px",
                    color:flaps===opt.val?"#0a0e1a":C.dim, fontFamily:mono, fontSize:"11px", letterSpacing:"1px", cursor:"pointer",
                  }}>{opt.label}</button>
                ))}
              </div>
              {flaps==="up" && <div style={{ fontSize:"11px", color:C.warm, marginTop:"6px", letterSpacing:"1px" }}>⚠ +35% distances · approach speed +9 KIAS</div>}
            </div>
          </div>
          {error && <ErrorBox msg={error} />}
          <CalcButton onClick={handleCalculate} />
          {result && (
            <div style={{ marginTop:"28px" }}>
              <ISABadgeRow label="RESULTS" isaLabel={formatISA(result.isaDeviation)} isaDeviation={result.isaDeviation} isaTemp={result.isaTemp} />
              <C172LandingViz result={result} />
              {result.windWasClamped && (
                <div style={{ background:"#1a1200", border:`1px solid ${C.warn}`, borderRadius:"3px", padding:"10px 14px", marginBottom:"12px", display:"flex", alignItems:"center", gap:"10px" }}>
                  <div style={{ color:C.warm, fontSize:"16px" }}>⚠</div>
                  <div style={{ fontSize:"12px", color:C.note, letterSpacing:"1px" }}>Tailwind clamped to <strong style={{color:C.warm}}>{result.windClamped} kt</strong> (chart max 10 kt)</div>
                </div>
              )}
              {/* Density altitude */}
              {(() => {
                const da=result.densityAlt, daColor=da>5000?C.error:da>3000?C.warm:C.green;
                return (
                  <div style={{ background:C.input, border:`1px solid ${daColor}55`, borderRadius:"3px", padding:"10px 16px", marginBottom:"12px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:"11px", letterSpacing:"3px", color:C.dim, marginBottom:"2px" }}>DENSITY ALTITUDE</div>
                      <div style={{ fontSize:"11px", color:daColor }}>{da>5000?"HIGH DA — PERF. SIGNIFICANTLY DEGRADED":da>3000?"ELEVATED DA — REDUCED PERFORMANCE":"NORMAL DA"}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ fontSize:"32px", fontWeight:"bold", color:daColor }}>{da.toLocaleString()}</span>
                      <span style={{ fontSize:"13px", color:C.dim, marginLeft:"6px" }}>FT</span>
                    </div>
                  </div>
                );
              })()}
              <Grid2 style={{ marginBottom:"12px" }}>
                <div style={{ background:C.input, border:`1px solid ${cRoll}`, borderRadius:"3px", padding:"16px", textAlign:"center" }}>
                  <div style={{ fontSize:"15px", letterSpacing:"2px", color:cRoll, marginBottom:"8px" }}>GROUND ROLL</div>
                  <div style={{ fontSize:"44px", color:C.text, lineHeight:1, fontWeight:"bold" }}>{result.groundRollFt}</div>
                  <div style={{ fontSize:"13px", color:C.dim, marginTop:"6px", letterSpacing:"3px" }}>FEET</div>
                  {result.grassAdj>0 && <div style={{ fontSize:"10px", color:C.warm, marginTop:"4px" }}>+{result.grassAdj} FT DRY GRASS</div>}
                  {result.flapsAdj>0 && <div style={{ fontSize:"10px", color:C.warm, marginTop:"2px" }}>+35% FLAPS UP</div>}
                </div>
                <div style={{ background:C.input, border:`1px solid ${c50}`, borderRadius:"3px", padding:"16px", textAlign:"center" }}>
                  <div style={{ fontSize:"15px", letterSpacing:"2px", color:c50, marginBottom:"8px" }}>OVER 50 FT</div>
                  <div style={{ fontSize:"44px", color:C.text, lineHeight:1, fontWeight:"bold" }}>{result.dist50Ft}</div>
                  <div style={{ fontSize:"13px", color:C.dim, marginTop:"6px", letterSpacing:"3px" }}>FEET</div>
                  {result.grassAdj>0 && <div style={{ fontSize:"10px", color:C.warm, marginTop:"4px" }}>+{result.grassAdj} FT DRY GRASS</div>}
                  {result.flapsAdj>0 && <div style={{ fontSize:"10px", color:C.warm, marginTop:"2px" }}>+35% FLAPS UP</div>}
                </div>
              </Grid2>
              {/* Safety buffer */}
              <Grid2 style={{ marginBottom:"12px" }}>
                {[{val:Math.round(result.groundRollFt*1.5),label:"GND ROLL ×1.5",color:cRoll},
                  {val:Math.round(result.dist50Ft*1.5),label:"OVER 50 FT ×1.5",color:c50}].map(({val,label,color})=>(
                  <div key={label} style={{ background:"#0a0c10", border:`1px solid ${color}55`, borderRadius:"3px", padding:"12px 16px", textAlign:"center" }}>
                    <div style={{ fontSize:"12px", letterSpacing:"2px", color:`${color}99`, marginBottom:"6px" }}>{label}</div>
                    <div style={{ fontSize:"32px", color:`${color}cc`, lineHeight:1, fontWeight:"bold" }}>{val}</div>
                    <div style={{ fontSize:"11px", color:C.dimmest, marginTop:"5px", letterSpacing:"2px" }}>FEET</div>
                  </div>
                ))}
              </Grid2>
              {/* Approach speed */}
              <div style={{ background:C.input, border:`1px solid ${C.borderDim}`, borderRadius:"3px", padding:"12px 16px", marginBottom:"12px", textAlign:"center" }}>
                <div style={{ fontSize:"11px", letterSpacing:"2px", color:C.dim, marginBottom:"4px" }}>APPROACH SPEED AT 50 FT</div>
                <div style={{ fontSize:"32px", fontWeight:"bold", color:cRoll }}>{result.approachSpeed}<span style={{ fontSize:"13px", color:C.dim, marginLeft:"4px" }}>KIAS</span></div>
                {result.flapsAdj>0 && <div style={{ fontSize:"11px", color:C.warm, marginTop:"4px", letterSpacing:"1px" }}>FLAPS UP — +9 KIAS FROM NORMAL 61 KIAS</div>}
              </div>
              <NoteBox text={`Short field technique (Sec. 4). Flaps ${result.flaps==="up"?"UP (+35% distances, +9kt approach)":"FULL"}, idle power, max braking.${result.grassAdj>0?" +45% of ground roll applied to both distances for dry grass.":""} Wind correction per POH. Always verify against official POH charts.`} />
            </div>
          )}
        </Card>
      );
    }

                      : <div style={{ fontSize: "11px", letterSpacing: "2px", color: C.dimmest, background: C.input, border: `1px solid ${C.borderDim}`, padding: "3px 8px", borderRadius: "2px" }}>SOON</div>
                    }
                  </div>
                  <div style={{ fontSize: "11px", color: C.dimmest, letterSpacing: "1px", marginBottom: "16px" }}>{ac.desc}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {ac.tags.map(tag => (
                      <div key={tag} style={{ fontSize: "10px", letterSpacing: "1px", color: ac.available ? C.dim : C.dimmest, background: C.input, border: `1px solid ${C.borderDim}`, padding: "2px 7px", borderRadius: "2px" }}>{tag}</div>
                    ))}
                  </div>
                  {ac.available && (
                    <div style={{ marginTop: "20px", fontSize: "12px", letterSpacing: "3px", color: C.green, display: "flex", alignItems: "center", gap: "6px" }}>
                      OPEN CALCULATOR <span style={{ fontSize: "16px" }}>→</span>
                    </div>
                  )}
                </button>
              ))}
            </div>

            <div style={{ marginTop: "40px", fontSize: "11px", color: C.dimmest, letterSpacing: "2px" }}>PA-28-181 ARCHER III · VB-2749 · ISSUED DEC 2017</div>
          </div>
        </MobileContext.Provider>
      );
    }

    function Root() {
      const [aircraft, setAircraft] = useState(null);
      if (!aircraft) return <AircraftMenu onSelect={setAircraft} />;
      if (aircraft === "c172s") return <C172App onBack={() => setAircraft(null)} />;
      return <App onBack={() => setAircraft(null)} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
